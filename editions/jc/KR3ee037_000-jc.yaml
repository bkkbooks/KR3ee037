front:
  text: 序醫用針灸由來久矣嘗見痼疾沉疴藥力所不能愈者得針灸而奏效獨奇自穴道難明業醫者憚於窮究遂藉口泄氣極力詆訶俾患者視為畏途致令內經素問心法終於就湮可慨也今歲夏偶遇明師以針灸集成相示因取而讀之漸覺豁然有得竊以為下手用功處在熟穴法熟極則巧自生而余性健忘深慮旋得旋失因將原書考正穴法韻以五言用當記誦並遵御纂醫宗金鑑參互考究正其訛舛且近取諸身時嘗尋按至忘寢食更覺胸有把握益信古人救世深心金針度盡特患不甚研求耳余自維留京五載年已四十文章無靈終不能進蓬瀛一步雖平日於天文算學地學以及卜巫壬遁星命諸學時深探討究無補於斯世獨得此一端可以衛生並可以濟人殆所謂思之思之鬼神通之者耶歌既成將銅人圖按法縮繪小幅以便案頭搜討坊友饒君松圃謂是可益初學樂為梓行附諸針灸集成之後因記其爰起如此湖南淥江廖潤鴻逵賓氏敘於同治十三年甲戌冬十月
