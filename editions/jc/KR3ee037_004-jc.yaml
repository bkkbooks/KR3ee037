壯三報之千金兼璇璣治尪羸喘促玉龍賦治五淋須更針三里又兼照海陰交曲泉關元同瀉治七疝小腹痛如神席弘賦針三陰與氣海專司白濁久遺精百證賦兼血海療五淋靈光賦一傳治小腸氣痛傷寒腹痛氣脹水鼓黃腫四時宜多灸陰交在臍下一寸針八分灸五壯一曰灸百壯孕婦不可灸主治衝脈生病從少腹衝心而痛不得小便疝痛陰汗濕癢奔豚腰膝拘攣婦人月事不調崩中帶下陰癢產後惡露不止繞臍冷痛治臍下冷疼可灸二十一壯神農經大小便不通灸三壯轉胞灸隨年壯又治水腫氣上下灸百壯千金云兼三里水分治鼓脹玉龍賦兼照海曲泉關元氣海同瀉治七疝小腹痛如神又云治小腸氣撮痛連臍急瀉此穴更於湧泉取氣甚妙又云兼百會太衝照海治咽喉疾席弘賦陰交陽別定血暈標幽賦兼三里治中邪霍亂又云無子取陰交石關之多百證賦一傳治腹內風寒走痛脹疼神闕在當臍中灸三壯禁針針之令人惡瘍潰矢死不治一曰納炒乾淨鹽滿臍上加厚姜一片蓋定灸百壯或以川椒代鹽也妙主治陰證傷寒中風不省人事腹中虛冷傷憊腸鳴泄瀉不止水腫鼓脹小兒乳痢不止腹大風癇角弓反張脫肛婦人血冷不受胎者灸此永不脫胎此穴在諸傢俱不言灸只云禁針銅人云宜灸百壯有徐平者卒中不省得桃源為灸臍中百壯始蘇更數月復不起鄭糾云有一親卒中風醫者為灸五百壯而蘇後年逾八十向使徐平灸至三五百壯安知其不永年耶故神闕之灸須填細鹽然後灸之以多為良若灸至三五百壯不唯愈疾亦以延年若灸少則時或暫愈後恐復發必難救矣但夏月人神在臍乃不宜灸納鹽臍中灸三壯治淋病又云凡霍亂納鹽臍中灸七壯並治脹滿千金水分在臍上一寸下脘下一寸禁針灸五壯甲乙經曰針一寸孕婦不可灸主治水病腹堅黃腫如鼓沖胸不得息繞臍痛腸鳴泄瀉小便不通小兒陷囟若水病脹滿堅硬不能食灸之大良日七壯至四百壯止但不可針針而水盡即死腹脹水腫可灸十四壯至二十一壯神農經治反胃吐食灸二十壯又治腹脹繞臍結痛堅不能食灸百壯又霍亂轉筋入腹欲死用四人持其手足灸四五壯自不動即勿持之灸至十四壯千金腹脹瀉此兼三里陰谷利水消腫太乙歌兼陰交三里治鼓脹玉龍賦兼陰陵能去水腫盈臍百證賦兼氣海治水腫席弘賦兼建里治肚腹浮腫脹膨膨天星秘訣下脘在建里下一寸臍上二寸針八分灸五壯一云二七壯至百壯孕婦不可灸主治臍上厥氣堅痛腹脹滿寒穀不化虛腫癖塊連臍瘦弱少食翻胃小便赤兼中脘治腹堅靈光賦兼陷谷能平腹內腸鳴百證賦建里臍上三寸中脘下一寸針五分留十呼灸五壯一云宜針不宜灸孕婦尤忌之主治腹脹身腫心痛上氣腸鳴嘔逆不食主霍亂腸鳴腹脹可針八分瀉五吸疾出針日灸二七壯至百壯千金云兼內關掃盡胸中之苦悶百證賦兼水分治肚腹腫脹天星秘訣中脘在臍上四寸上脘下一寸針八分灸七壯一云二七壯至百壯孕婦不可灸主治心下脹滿傷飽食不化五隔五噎翻胃不食心脾煩熱疼痛積聚痰飲面黃傷寒飲水過多腹脹氣喘溫瘧霍亂吐瀉寒熱不已或因讀書得奔豚氣上攻伏梁心下寒癖結氣凡脾冷不可忍心下脹滿飲食不進不化氣結疼痛雷鳴者皆宜灸之此為腑會故凡腑病者當治之虛勞吐血嘔逆不下食多飽多睡百病灸三百壯又治脹滿水腫氣聚寒冷灸呼灸三壯主治咳嗽喘息上氣吐沫舌縱舌下腫難言舌根急縮不食涎出口瘡兼中衝堪攻舌下腫痛百證賦承漿在頤前下唇稜下陷中針二分留五呼灸三壯主治偏風半身不遂口眼喎斜口禁不開暴喑不能言針三分徐徐引氣而出及治任之為病其苦內結男子為七疝女於為瘕聚一云療偏風口喎面腫消渴飲水不休口齒疳蝕生瘡灸之亦佳日可七壯至七七壯止即血脈宣通其風應時立愈艾炷不必大但令當脈即能愈疾小兒唇緊灸三壯又云凡噦令人惋恨灸七壯炷如小麥又十三鬼穴云此名鬼市治百邪癲狂當在第八次下針千金云瀉牙疼而即移百證賦治頭項強通玄賦任脈流注及孔穴任脈者起於中極之下以上毛際循腹裡上關元穴名至咽喉承漿穴屬陰脈之海也中行凡二十四穴銅人任即妊也所謂生養之源女子之主入門頤前承漿一穴一名懸漿一名天池在頤前唇下宛宛中開口取之針入三分可灸七壯銅人頷下廉泉一穴一名舌本在頷下結喉上舌本間針入三分可灸三壯銅人膺上天突一穴一名天瞿一名五戶在頤結喉下四寸宛宛中針入五分留三呼針宜橫下不得低可灸三壯銅人璇璣一穴在天突下一寸陷中仰頭取之針入三分可灸五壯銅人華蓋一穴在璇璣下一寸六分陷中仰頭取之針入三分可灸五壯銅人紫宮一穴在華蓋下一寸六分陷中仰頭取之針入三分可灸五壯銅人玉堂一穴一名玉英在紫宮下一寸六分陷中仰頭取之針入三分可灸五壯銅人膻中一穴一名元兒一名元見在玉堂下一寸六分銅人橫直兩乳間陷中仰臥取之綱目在鳩尾上二寸資生可灸七壯至七七壯止禁不可針入門中庭一穴在膻中下一寸六分陷中仰頭取之銅人在鳩尾上一寸入門針入三分可灸五壯銅人腹中鳩尾一穴一名𩩲骭一名尾翳在臆前蔽骨下五分人無蔽骨者從歧骨之際量取一寸此穴灸之則令人少心力又健忘且大難針大好手方可下針不然取氣多令人夭故並禁針灸銅人巨闕一穴心之募也在鳩尾下一寸鳩尾短者少令強一寸中人有鳩尾拒之針入六分留七呼得氣即瀉可灸七壯至七七壯銅人上脘一穴一名上管一名胃脘在巨闕下一寸三分去蔽骨三寸針入八分先補後瀉可灸二七壯至百壯銅人中脘一穴一名太倉胃之募也在臍上四寸銅人中脘居心蔽骨與臍之中上下各四寸資生針入八分留七呼瀉五吸可灸二七壯至一百壯銅人建里一穴在中脘下一寸針入五分留十呼可灸五壯銅人下脘一穴在建里下一寸針入八分留三呼瀉五吸可灸七壯至百壯銅人水分一穴一名分水一名中守在下脘下臍上一寸針入八分留三呼瀉五吸若水病灸之大良可灸七壯至百壯禁不可針針則水盡則斃銅人神闕一穴一名氣合在臍中央禁不可針可灸百壯銅人禁針者刺之使人臍中惡瘍潰屎出者死資生針則成水蠱病死綱目中風不省人事可灸百壯至五百壯即蘇資生陰交一穴在臍下一寸針入八分得氣即瀉可灸百壯銅人氣海一穴一名脖胦一名下肓在陰交下五分臍下一寸五分銅人氣海者是男子生氣之海也一切氣疾皆灸之資生針入八分得氣即瀉可灸百壯銅人針入一寸二分灸三十壯年高者百壯入門石門一穴一名利機一名精露三焦之募也在臍下二寸針入五分可灸二七壯至百壯婦人不可針針終身絕子銅人關元一穴一名丹田一名大中極小腸之募也針入八分留三呼瀉五吸可灸百壯至三百壯銅人一云針入二寸可灸三十壯至三百壯入門中極一穴一名氣原一名玉泉膀胱之募也在關元下一寸臍下四寸針入八分留十呼得氣即瀉可灸百壯至三百壯婦人斷緒四度針針則有子也銅人一云針入一寸二分日灸三十壯至二百壯入門曲骨一穴一名回骨在橫骨之上毛際陷中動脈應手銅人在中極下一寸臍下五寸入門針入二寸可灸七壯至七七壯銅人一云針入一寸半灸五壯入門會陰一穴一名屏翳在兩陰間銅人在肛門之前前陰後兩陰間入門針入二寸可灸三壯銅人督脈共二十八穴長強在脊骶骨端伏地取之主治腰脊脊強急不可俯仰狂病大小便難腸風下血五痔五淋下部疳蝕洞泄失精嘔血小兒囟陷驚癇瘛瘲脫肛瀉血此穴為五痔之本一經驗治少年注夏羸瘦灸此最效治赤白下痢灸窮骨頭百壯多多為佳又下漏五痔疳蟲食下部針三寸伏地取之以大痛為度灸亦良日三十壯至七日止但不及針又灸尾翠骨七壯治脫肛神良千金作龜尾即窮骨也千金翼兼承山灸痔最妙玉龍賦連大杼行針治小腸氣痛又云小兒脫肛患多時先灸百會後長強席弘賦兼百會穴專治脫肛又云針長強與承山善主腸風新下血百證賦百會龜尾治痢疾靈光賦兼大敦治小腸疝氣天星秘訣腰俞在二十一椎節下間宛宛中針二分留七呼灸五壯一曰針五分灸七七壯主治腰脊重痛不得俯仰舉動腰以下至足冷痹不仁強急不能坐臥灸隨年壯溫瘧汗不出婦人經閉溺赤灸後忌房勞強力腰卒痛去窮骨上一寸灸七壯者即止千金云兼環跳燒針治冷風冷痹陽關在十六椎節下間伏而取之針五分灸三壯主治膝痛不可屈伸風痹不仁筋攣不行命門在十四椎節下間伏而取之針五分灸三壯一曰針三分灸二十七壯若年二十以上者灸恐絕子主治腎虛腰痛赤白帶下男子泄精耳鳴手足冷痹攣疝驚恐頭眩頭痛如破身熱如火骨蒸汗不出痎瘧瘛瘲裡急腹痛腰痛不得動者令病人正立以竹杖柱地度至臍乃取杖度背脊灸杖頭盡處隨年壯良丈夫痔漏下血脫肛不食長泄痢婦人崩中去血帶下淋濁赤白皆灸之此挾兩旁各一寸橫三間寸灸之治腰痛可灸七壯神農經治老人便多兼腎俞著艾玉龍賦兼肝俞能使瞽士視秋毫之末標幽賦一俗傳以此穴灸寒熱多效懸樞在十三椎節下伏而取之針三分灸三壯五壯主治腰強不得屈伸腹中積氣上下疼痛水穀不化瀉痢不止脊中在十一椎節下間伏而取之針五分禁灸灸則令人僂主治風癇癲邪腹滿不食五痔積聚下痢小兒痢下赤白秋末脫肛每廁則肛痛不可忍者灸之亦無妨中樞在第十椎節下間俯而取之針五分禁灸灸之令人腰背傴僂一傳云此穴能退熱進飲食可灸三壯常用常效未見傴僂筋縮在九椎節下間俯而取之針五分灸三壯五壯主治癲疾驚狂脊強風癇目上視兼水道專治脊強百證賦至陽在七椎節下問俯而取之針五分灸三壯主治腰脊強痛胃中寒不食少氣難言胸脅支滿羸瘦身黃淫濼脛酸四肢重痛寒熱解㑊一云灸三壯治喘氣立已治寒熱脛酸四肢重痛咳嗽可灸三壯至七壯神農經卻疸治神疲玉龍賦靈臺在六椎節下間俯而取之針三分灸三壯甲乙經無此穴出氣府論注主治今俗以灸氣喘不能臥及風冷久嗽火到便愈神道在五椎節下間俯而取之針五分留五呼灸五壯一曰可灸七七壯至百壯禁針主治傷寒頭痛寒熱往來痎瘧悲愁健忘驚悸牙車急張口不合小兒風癇瘛瘲可灸七壯兼心俞治風癇常發自寧百證賦身柱在三椎節下間俯而取之針五分留五呼灸五壯一曰灸七七壯主治腰脊痛癲癇狂走怒欲殺人瘛瘲身熱妄言見鬼小兒驚癇治咳嗽可灸十四壯神農經能蠲嗽除膂痛玉龍賦兼本神穴治癲疾妙百證賦同陶道肺俞膏肓治虛損五勞七傷緊要法一傳治四時傷寒陶道在一椎節下間俯而取之針五分留五呼灸五壯一曰針三分主治痎瘧寒熱灑淅脊強煩滿汗不出頭重目瞑瘛瘲恍惚不樂兼身柱肺俞膏肓治虛損五勞七傷乾坤生意兼中膂俞治歲熱時行一傳此穴善退骨蒸之熱大椎在第一椎上陷者中針五分留五呼灸五壯一云以年為壯大椎為骨會骨病者可灸之主治五勞七傷乏力風勞食氣痎瘧久不愈肺脹脅滿嘔吐上氣背膊拘急項頸強不得回顧一云能瀉胸中之熱及諸熱氣若灸寒熱之法先大椎次長強以年為壯數一云治身痛寒熱風氣痛一云治衄血不止灸二三十壯斷根不發凡瘧有不可瘥者從未發前灸大椎至發時滿百壯無不瘥又云諸煩熱時氣溫病灸大椎百壯針三分瀉之又治氣短不語灸隨年壯又治頸癭灸百壯及大椎兩邊相去各一寸半少垂下各三十壯百勞止虛汗玉龍賦治小兒急慢驚風神農經治諸虛寒熱灸此竇太師治熱不至肩捷徑云時傳以此治百病啞門在項後入髮際五分宛宛中仰頭取之針二分不可深禁灸灸之令人啞主治頸項強急不語諸陽熱盛衄血不止脊強反折瘛瘲癲疾頭風疼痛汗不出寒熱風痙中風屍厥暴死不省人事兼關衝治舌緩不語為緊要百證賦風府在項入髮際一寸大筋內宛宛中針三分留三呼禁灸灸則令人喑主治中風舌緩暴喑不語振寒汗出身重偏風半身不遂傷風頭痛項急不得回顧目眩反視鼻衄咽痛狂走悲恐驚悸欲自殺一云主瀉胸中之熱與大杼缺盆中府同風府風池尋得到傷寒百病一時消又云陽明二日尋風府又云從來風府最難尋須用功夫度淺深倘若膀胱氣未散更宜三里穴中尋風傷項急求風府通玄賦一傳治感冒風寒嘔吐不止邪病臥冥冥不自知風府主之又十三鬼穴云此名鬼枕治百邪癲狂當在第六次下針千金云腦戶在枕骨下強間後一寸五分入髮際二寸禁針灸針中腦戶入腦立死亦不可灸令人喑強間在後項後一寸主分針二分灸五壯一曰禁灸主治頭痛項強目眩腦旋煩心嘔吐涎沫狂走兼豐隆治頭痛難禁百證賦後頂在百會後一寸五分枕骨上針二分灸五壯主治頸項強急額顱上痛偏頭痛惡風目眩不明百會在前頂後一寸五分頂中央容豆許直兩耳尖針二分灸五壯甲乙經曰針三分灸三壯一曰灸頭頂不得過七七壯主治頭風頭痛耳聾鼻塞鼻衄中風言語蹇滯口噤不開或多悲哭偏風半身不遂風癇卒厥角弓反張吐沫心神恍惚驚悸健忘痎瘧女人血風胎前產後風疾小兒風癇驚風脫肛久不瘥一曰百病皆治宜針此二分得氣即瀉若灸至百壯停三五日後繞四畔用三稜針出血以井花水淋之令氣宣通否則恐火氣上壅令人目暗一曰治悲笑欲死四肢冷氣欲絕身口溫可針人中三分灸百會三壯即蘇扁鵲治虢太子屍厥針取三陽五會而蘇史記載治頭風可灸三壯小兒脫肛可灸三壯至五壯艾炷如小麥神農經兼囟會治卒暴中風玉龍賦兼龜尾治痢疾靈光賦小兒脫肛患多時先灸百會後尾骶又云兼太陽照海陰交治咽喉疾席弘賦前頂在囟會後一寸五分骨陷中針二分灸五壯一曰灸七七壯主治頭風目眩面赤腫小兒驚癇瘛瘲鼻多清涕頸項腫痛治小兒急慢驚風可灸三壯艾炷如小麥神農經兼水溝治面腫虛浮囟會在上星後一寸陷中針二分灸五壯一曰灸二七壯至七七壯主治腦虛冷痛頭風腫痛項痛飲酒過多頭皮腫風癇清涕一云治目眩面腫鼻塞不聞香臭驚癇戴目昏不識人可灸二七壯至七七壯初灸即不痛病去即痛痛即罷灸若是鼻塞灸至四日漸退七日頓愈針入二分留三呼得氣即瀉頭風生白屑多睡針之彌佳針訖以末鹽生麻油相和揩髮根下即頭風永除治頭風疼痛可灸三壯小兒急慢驚風灸三壯炷如小麥神農經邪病鬼癲囟上主之一名鬼門千金云兼百會治卒暴中風玉龍賦連玉枕療頭風百證賦上星在鼻直上入髮際一寸陷者中可容豆針三分留六呼灸五壯一云宜三稜針出血以瀉諸陽熱氣主治頭風頭痛頭皮腫面虛惡寒痎瘧寒熱汗不出鼻血臭涕鼻塞不聞香臭目眩睛痛不能遠視以細三稜針刺之即宣泄諸陽熱氣無令上衝頭目鼻中瘜肉灸二百壯又云兼大椎灸瘧至發時令滿百壯炷如黍米又治鬼魅灸百壯又十三鬼穴此名鬼堂主百邪癲狂當在第十次下針治頭風鼻淵玉龍賦神庭在直鼻上入髮際五分發高者際邊是穴發低者高二三分灸三壯禁針針之令人癲狂目失明一曰灸七壯至三七壯止主治發狂登高妄走風癇癲疾角弓反張目上視不識人頭風鼻淵流涕不止頭痛目淚煩滿喘渴驚悸不得安寢專理頭風玉龍賦素髎在鼻端準頭針一分禁灸主治鼻中瘜肉不消喘息不利多涕喎噼衄血一曰治酒酢風用三稜針出血水溝在鼻下人中陷中針三分留六呼得氣即瀉灸三壯至七壯炷如小麥然灸不及針主治中風口噤牙關不開卒中惡邪鬼擊不省人事癲癇卒倒消渴多飲水氣遍身浮腫瘟疫口眼喎噼俱宜針之若風水面腫針此一穴出水盡即頓愈一云水氣腫病但宜針此三分徐徐出之以泄水氣若針他穴水盡則死治小兒急慢驚風可灸三壯炷如小麥神農經兼曲池穴治痿僕又云兼委中穴治腰脊閃痛又云合大陵頻瀉之全除口氣玉龍賦人中治癲功最高十三鬼穴不須饒席弘賦此穴為鬼市治百邪癲狂此當在第一次下針凡人中惡先掐鼻下是也鬼擊卒死者須即灸之千金云兼前頂治面腫虛浮百證賦水溝兼間使治邪癲靈光賦兌端在上唇端針三分留六呼灸三壯炷如大麥主治癲癇吐沫齒齦痛消渴衄血口噤口瘡臭穢不可近小便赤澀兌端獨瀉太陽經百證賦齦交在唇內上齒縫中針三分逆針之灸三壯主治面赤心煩痛鼻生瘜肉不消頭額中痛頸項強目淚多眵赤痛牙疳腫痛小兒面瘡久癬不除點烙亦佳專治鼻痔百證賦督脈流注及孔穴督脈者起於下極之腧並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海中行凡二十七穴銅人督之為言都也陽脈都會男子之主也入門鼻下素髎一穴一名面正在鼻柱上端一云準頭針入三分禁不可灸銅人水溝一穴一名人中在鼻柱下人中中直唇取之針入三分留五呼可灸三壯風水面腫針此穴即愈銅人兌端一穴在唇上端一云在上唇中央尖尖上針入三分留六呼可灸三壯銅人齦交一穴在唇內齒上齦縫筋中銅人在唇內齒上縫中央入門針入三分可灸三壯入門額上神庭一穴在額前直鼻上入髮際五分可灸七壯禁不可針入門上星一穴在神庭後入髮際一寸銅人在額顱上鼻直中入髮際一寸陷中容豆是穴也針入三分留十呼可灸三壯不宜多灸銅人囟會一穴在上星後一寸陷者中可灸二七壯至七七壯初灸不痛病去即痛止灸禁不可針銅人前頂一穴在囟會後一寸五分骨陷中針入一分可灸二壯至七七壯銅人百會一穴一名三陽五會一名天滿在前頂後一寸五分頂中央旋毛中可容豆針入二分得氣即瀉可灸七壯凡灸頭頂不得過七七壯緣頭頂皮膚淺薄灸不宜多銅人頂後後頂一穴一名交沖在百會後一寸五分枕骨上針入三分可灸五壯銅人強間一穴一名大羽在後頂後一寸五分針入三分可灸五壯銅人腦戶一穴一名匝風一名合顱在枕骨上強間後一寸五分禁不可針令人啞可灸七壯亦不可妄灸銅人風府一穴一名舌本在項入髮際一寸腦戶後一寸五分項大筋內宛宛中銅人在項後髮際上一寸疾言其肉立起言休立下針入二分禁不可灸銅人啞門一穴一名舌腫一名舌厭在風府後五分入髮際五分宛宛中入系舌本仰頭取之銅人在項中央入髮際五分宛宛中去風府一寸資生針入二分禁不可灸令人啞銅人背脊大椎一穴在項後第一椎上陷中針入五分留三呼瀉五吸若灸隨年為壯銅人凡灸椎骨當灸骨節突處方驗灸節下當骨則無驗以魚肉骨參之其言為可信盡依其言當骨節灸之資生椎皆作節下皆作外入門陶道一穴在項後大椎節下間俯而取之針入五分可灸五壯銅人身柱一穴在第三椎節下間俯而取之針入五分可灸五壯銅人神道一穴在第五椎節下間俯而取之可灸七七壯至百壯禁不可針銅人靈臺一穴在第六椎節下間俯而取之可灸五壯禁不可針銅人至陽一穴在第七椎節下間俯而取之針入五分可灸三壯銅人筋縮一穴在第九椎節下間俯而取之針入五分可灸三壯銅人脊中一穴一名神宗一名脊俞在第十一椎節下間俯而取之針入五分禁不可灸銅人懸樞一穴在第十三椎節下間伏而取之針入三分可灸三壯銅人命門一穴一名屬累在第十四椎節下間伏而取之針入五分可灸三壯銅人背部中行自項中央直脊至命門穴與臍相對若取一杖正身立地以杖從地起量至臍切斷卻移向後量脊杖頭盡處是命門穴也綱目陽關一穴在第十六椎節下間伏而取之針入五分可灸三壯銅人腰俞一穴一名背解一名髓孔一名腰柱一名腰戶一名髓空在第二十一椎節下間宛宛中銅人以挺伏地舒身兩手相重支額縱四體開然後巧取乃得真穴綱目針入八分留三呼瀉五吸可灸七壯至七七壯止銅人長強一穴一名氣之陰郄督脈別絡在脊骶端下陷中伏地取之乃得其穴針入二分留七呼可灸三十壯至二百壯銅人經外奇穴頭部前神聰去前頂五分自神庭至此穴共四寸主治中風風癇灸三壯後神聰去百會一寸主治中風風癇灸三壯髮際平眉上三寸是穴主治頭風眩暈疼痛延久不愈灸三壯陽維在耳後引耳令前弦筋上是穴耳風聾雷鳴灸五十壯千金翼當陽當目瞳子直入髮際內一寸去臨泣五分是穴主治風眩不識人鼻塞症灸三壯針三分蝦蟆瘟針當陽及太陽多出惡血繼以綢系其肩下臑上即針刺左右尺澤大小血絡及委中血絡並棄血如糞則不日而飲水神效耳上穴耳上髮際治癭氣灸風池及耳上髮際各百壯千金翼千金作兩耳後髮際太陽穴在兩額角眉後青絡針出血治偏頭風又治風目眶爛太陽當陽尺澤皆針棄血如糞神效明堂在鼻直上入髮際一寸主治頭風鼻塞多涕即上星面部印堂在兩眉中間治小兒急慢驚風可灸三壯艾炷如小麥大善治驚搐玉龍海泉在舌下中央脈上主治消渴針出血左金津右玉液在舌下兩旁紫脈上主治消渴口瘡舌腫喉痹三稜針針出血唇里穴唇里正當承漿邊逼齒齦針三鋥主治馬黃黃疸千金翼夾承漿穴夾承漿兩邊各一寸主治馬黃急疫千金翼燕口在口吻兩旁燕口處赤白肉際主治狂瘋罵詈撾斫人名為熱陽瘋灸此穴各一壯千金翼狂邪鬼語灸十五壯小兒大小便不通灸各一壯鼻交頞中在鼻交頞中主治癲風角弓反張羊鳴大風青風面風如蟲行卒風多睡健忘心中憒憒口禁卒倒不識人黃疸急黃此一穴皆主之針入六分得氣即瀉留三呼瀉五吸不補亦宜灸然不及針慎酒面生冷醋滑豬魚蒜蕎麥漿水魚尾在目眥外頭兼睛明太陽治目證玉龍顳顬在眉尾中間上下有來去絡脈是針灸之所鼻準在鼻柱尖主治鼻上酒渣針出血睛中二穴在眼黑珠正中取穴之法先用布搭目外以冷水淋一刻方將三稜針於目外角離黑珠一分許針入半分之微然後入金針約數分深旁入自上層轉撥向瞳人輕輕而下斜插定目角即能見物一飯頃出針輕扶偃臥仍用青布搭目外再以冷水淋三日夜止初針盤膝正坐將箸一把兩手握於胸前寧心正視其穴易得治一切內障年久不能視物頃刻光明神秘穴也凡學針人眼先試針內障羊眼能針羊眼復明方針人眼不可造次頸項部機關在耳下八分近前凡卒中風口噤不開灸此二穴五壯即愈一曰隨年為壯僻者逐左右灸之千金翼百勞在大椎向髮際二寸點記將其二寸中摺墨記橫布於先點上左右兩端盡處是主治瘰癧灸七壯神效又瘰癧聯珠瘡灸百勞三七壯至百壯肘尖百壯又先問審知初出核以針貫核正中即以石雄黃末和熟艾作炷灸核上針穴三七壯諸核從此亦消矣膺部龍頷在鳩尾上一寸半主治心痛冷氣上灸百壯勿針千金翼乳上穴治乳癰妒乳以繩橫度口以度從乳上行灸度頭二七壯通谷在乳下二寸主心痛惡氣上脅痛急灸五十壯千金腋下穴治噦噫膈中氣閉塞腋下聚毛下附肋宛宛中灸五十壯神良千金翼旁廷在腋下四肋間高下正與乳相當乳後二寸陷中俗名注布舉腋取之主卒中惡飛屍遁注胸脅滿針入五分灸五十壯肋頭治瘕癖患左灸左患右灸右第一屈肋頭近第二肋下即是灸處第二肋頭近第三肋下向肉翅前亦是灸處初日三壯次日五壯後七壯周而復始至十壯止惟忌大蒜肋罅治飛屍諸疰以繩量病人兩乳間中屈之乃從乳頭向外量使當肋罅於繩頭盡處是穴灸隨年壯千金云三壯或六壯男左女右凡中屍壯飛屍遁屍風屍沉屍屍注其狀皆腹脹痛急不得息氣上衝心胸兩脅或踝踴起或攣引腰脊灸乳後三寸男左女右可二七壯如不止多其壯數愈乳下正居乳下一寸主胃脘痛肝俞脾俞下三里膈俞太衝獨陰無乳下一寸各灸二十壯腹部長谷在挾臍相去五寸一名循脊主治下痢不嗜食食不消灸五十壯三報之千金羸瘦食不化灸長谷胃俞挾臍旁各二寸各七壯腸遺挾中極旁相去二寸半治大便難灸隨年壯千金肓募以乳頭斜度至臍中乃屈去其半從乳下量至盡處是穴主治結氣囊裹針藥不及者灸隨年壯脅堂在腋下二骨間陷中舉腋取之主治胸腋氣滿噦噫喘逆目黃遠視䀮䀮可灸五壯身交在少腹下橫紋中治白崩中灸少腹橫紋當臍孔直下一百壯及治胞落㿗須三報之又治大小便不通又治尿床者可灸七壯胞門子戶子臟閉塞不受精妊娠不成若墮胎胞漏見赤灸胞門五十壯關元左邊二寸是也右邊名子戶若胞衣不出及子死腹中或腹中積聚皆針入胞門一寸氣門胎孕不成灸氣門穴在關元旁三寸各五十壯又漏胎下血不禁灸百壯臍下六寸兩旁各開一寸是穴灸三七壯內關太衝三壯獨陰五壯治冷氣衝心疼臍旁穴以蠟繩量患人口兩角為一寸作三摺成三角以一角安臍心兩角在臍下兩旁盡處點記灸二七壯治冷心痛立差治奔豚氣繞臍上衝灸二七壯兩丸蹇塞亦灸左取右右取左並灸氣衝七壯經中穴在臍下寸半兩旁各三寸治大小便不通灸百壯胞門五十壯營沖三壯大腸俞三壯膀胱俞三壯丹田二七壯背部魂舍在挾臍兩旁相去一寸主治小腸瀉痢膿血灸百壯小兒減之後腋下穴治頸漏背後兩邊腋下後紋頭灸隨年壯脊背五穴治大人癲疾小兒驚癇背第二椎上及下穹骨尖二處乃以繩度量上下中折復量至脊骨上點記之共三處畢復斷此繩取其半者為三折而三合如字樣以上角對中央一穴其二角正夾脊兩邊同灸之凡五處也各百壯千金翼巨闕俞第四椎名巨闕俞主胸膈中氣灸隨年壯督俞在第六椎下兩旁相去各二寸禁針可灸一名高蓋氣海俞在第十五椎下兩旁相去各二寸針三分留六呼可灸關元俞在十七椎下兩旁相去各二寸針三分留六呼可灸治瀉痢虛脹小便難婦人瘕聚諸疾夾脊穴治霍亂轉筋令病者合面臥伸兩手著身以繩橫牽兩肘尖當脊間繩下兩旁相去各一寸半所灸百壯無不差者此華佗法下極俞在第十五椎名下極俞主治腹中疾腰痛膀胱寒飲澼注下灸隨年壯千金翼十七椎穴主轉胞腰痛灸第十七椎五十壯千金翼胛縫二穴在背端骨下直腋縫尖及臂主治肩背痛連胛針入三分瀉二吸精宮在背第十四椎下各開三寸專主夢遺灸七壯神效濁浴挾膽俞旁行相去五寸名濁浴主治胸中膽病恐畏多驚少力口苦無味灸隨年壯腰眼其法令病人平眠以筆於兩腰眼宛宛中點二穴各灸七壯此穴諸書所無而居家必用載三云其累試屢驗主治諸勞瘵已深之難治者於癸亥日二更盡入三更時令病人平眠取穴灸三壯一傳治傳屍勞瘵已至滅門絕戶者有之此症因寒熱煎作血凝氣滯有化而為蟲者內食臟腑每致傳人百方難治唯灸可攻其法於癸亥日二更後將交夜半乃六神皆聚之時毋使人知令病者解去下衣舉手向上略轉後些則腰間兩旁自有微陷可見是名鬼眼穴即俗人所謂腰眼也正身直立用墨點記然後上床合面而臥用小艾炷灸七壯或九壯十一壯尤好其蟲必於吐瀉中而出燒燬遠棄之此比四花等穴尤易且效千金翼云治腰痛灸腰目髎在尻上約左右又曰在腎俞下三寸夾脊兩旁各一寸半以指按陷中主治消渴此二說似皆指此穴夾脊穴量三椎下近四椎上從脊骨上兩旁各五分灸三七壯至七七壯立差神效尾穹骨穹骨上一寸左有各一寸有三穴治腰痛不能屈伸兼腎俞委中各七壯膝旁主治腰痛不能伸曲腳痠難久立在曲䐐橫紋頭四處各灸三壯並一時吹火使之一時自滅一處不到其疾不愈脊骨旁治腰背傴僂在脊骨旁左右突起浮高處以針深刺灸五百壯至七八百壯若病歇則不必盡其數矣手部大骨空在手大指第二節前尖上屈指當骨節中灸二七壯禁針主治內瘴久痛及吐瀉拳尖在中指本節前骨尖上握拳取之主治風眼翳膜疼痛患左灸右患右灸左炷如小麥五虎在手食指無名指背間本節前骨尖上各一穴握拳取之主治手指拘攣中魁在手中指第二節前骨尖上握指得之又曰在手腕中上側兩筋間陷中灸二七壯蓋陽谿穴也手中指第一節穴治牙齒疼灸兩手中指背第一節前有陷處七壯下火立愈中泉在手腕外間陽池陽谿中間陷中灸七壯主治胸中氣滿不得臥肺脹滿彭彭然目中白翳掌中熱胃氣上逆唾血及心腹中諸氣痛又治少腹積聚腰脊周痹咳嗽大便難腎俞以年壯肺俞大腸俞肝俞太衝各七壯中泉獨陰曲池同手掌後白肉際穴主治霍亂轉筋在兩臂及胸中灸手掌後白肉際七壯虎口治小兒唇緊灸此穴男左女右七壯兼承漿三壯煩熱頭疼針三分心痛灸兩虎口白肉際七壯手足髓孔手髓孔在腕後尖骨頭宛宛中腳髓孔在足外踝後一寸俱主痿退風半身不遂可灸百壯兩手研子骨治豌豆瘡灸兩手腕研子骨尖上三壯男左女右河口治狂走驚癇灸河口五十壯在手腕後陷中動脈肘尖屈兩肘尖骨頭治腸癰各灸百壯則下膿血者自愈又云正灸肘頭銳骨二白四穴在掌後橫紋上四寸手厥陰脈兩穴相併一穴在兩筋中一穴在大筋外主治痔漏下血癢痛針入三分瀉兩吸龍元在列缺上青脈中主治下牙痛灸七壯兼合谷下三里神門列缺各三壯呂細二七壯治牙頰痛大指甲根排刺三針治雙蛾重者一日再刺手大指甲後第一節橫紋頭白肉際兼肝俞各灸一壯治大人小兒雀目手大指內側橫紋頭治目生白翳兼小指本節尖各灸三壯手五指不能曲伸灸一壯神效手掌後臂間穴掌後橫紋後五指許男左女右治疔腫灸七壯即驗已用得效又云治風牙疼以繩量自手中頭至掌後橫紋折為四分乃復自橫紋比量向後放臂中盡處兩筋間是穴灸三壯隨左右灸之兩患者灸兩臂至驗手表腕上踝骨尖端治上下齒痛灸此處如不愈更灸七壯左痛灸右右痛灸左神效高骨二穴在掌後寸部前五分針一寸半灸七壯治手病鬼眼四穴在手大拇指去爪甲角如韭葉兩指並起用帛縛之當兩指歧縫中是穴又二穴在足大趾取穴亦如在手者同治五癇等症發疾灸之效甚足部膝眼在膝頭骨下兩旁陷中刺五分禁灸主治膝冷痛不已兼髖骨治腳腿腫痛髖骨在膝蓋上梁丘旁外開一寸主治兩腳膝紅腫痛寒濕走注白虎歷節風痛腿風不能舉動交儀治婦人漏下赤白月水不利灸交儀穴在內踝上五寸營池在內踝前後兩邊池上脈一名陰陽主婦人下血漏赤白灸營池四穴三十壯漏陰治婦人漏下赤白四肢酸削灸漏陰三十壯穴在內踝下五分微動脈上足太陰太陽穴治婦人逆產足先出刺太陰入三分足入乃出針胞衣不出刺足太陽入四分在內踝後一寸宛宛中足踝治小兒重舌灸右足踝上七壯又云灸兩足外踝上三壯又治齒疼灸外踝上高骨前交脈上七壯又治轉筋十指拘攣灸足外踝骨上七壯又治翻胃吐食灸內踝下稍斜向前有穴三壯或曰向前一指又治諸惡漏中冷瘜肉出灸足內踝上各三壯二年六壯外踝尖在外踝尖上三寸主治外轉筋可灸七壯或刺出血踝尖在足內踝尖上主治下牙痛又曰腳足轉筋不忍內筋急內踝尖七壯外筋急外踝尖七壯內崑崙在足內踝後陷中主治轉筋針入六分氣至瀉之承命在內踝後上行三寸動脈中治狂邪驚癇灸三十壯一曰七壯足踵治霍亂轉筋灸湧泉三七壯如不止灸足踵聚筋上白肉際七壯立愈陰陽穴在足拇趾下屈里表頭白肉際治婦人下漏赤白注瀉灸隨年壯三報之獨陰在足第二趾下橫紋中主治乾嘔吐伏梁奔豚積聚小腸疝氣死胎胎衣不下胸痛吐冷酸水太衝三壯內關二壯獨陰五壯足大趾內初節橫紋中三壯尾穹骨五十壯治臍下結塊如盆關元間使各三十壯太衝太谿三陰交各三壯腎俞以年壯獨陰五壯陰卵偏大入腹灸太衝獨陰三陰交關元足第二指上穴灸足第二趾上一寸隨年壯治水病手足小指穴主治食注灸手小指尖頭男左女右隨年壯又治消渴症初灸兩手足小指頭及項椎隨年壯又灸膀胱俞橫三間寸灸之亦隨年壯五日一報之又治㿗疝灸手小指端七壯左灸右右灸左呂細二穴在足內踝尖主治上牙痛灸二七壯營沖即營池足大趾橫紋穴在三毛中治卒中惡悶熱毒欲死灸足大趾橫紋隨年為壯治陰腫欲潰困憊灸大拇趾本節橫紋中五壯一曰隨年壯治㿗卵疝氣灸足大趾本節間三壯又治㿗疝灸足大趾內側去端一寸白肉際隨年壯甚驗若雙㿗灸兩處又治㿗疝卵腫如瓜入腹欲死灸足大趾下橫紋中隨年壯即腫邊灸之神驗又治老少大便失禁灸兩腳大趾去甲一寸所三壯又治卒癲病灸聚毛中七壯又治鼻衄時癢灸足大趾節橫理三毛中十壯劇者百壯並主陰腫又治久魘不醒者灸兩足大趾聚毛中二十一壯手足大指爪甲穴治卒中邪魅鼻下人中及手足大指爪甲令艾炷半在爪上半在肉上灸七壯不止十四壯炷如雀矢風市在膝上七寸外側兩筋間又取法令正身平立直垂兩手著腿當中指盡處陷中是穴針五分灸三五壯病輕者不可減百壯重者灸五六百壯千金主治腰腿痠痛足脛麻頑腳氣起坐艱難先瀉後補風痛先補後瀉此風病冷痛之要穴兼陰市能驅腿腳之乏力玉龍治偏風半身不遂兩腿疼痛灸二十一壯神農經阿是穴即天應穴兼風門肩井風池崑崙天柱風府絕骨治項強詳其經絡治之兼針阿是穴隨痛隨針之法能行則無不神效足大趾甲根治積年胸痛灸足大趾爪甲之本根爪甲之半當中七壯男左女右太衝三壯獨陰五壯章門七壯立愈若或不愈更灸陰疝針一分灸三壯踝下在內踝下白肉際治滿身卒腫面浮洪大灸三壯立效足大趾節治癲癇在足大趾本節內紋及獨陰穴灸七壯陰部橫骨婦人遺尿不知時出灸橫骨當陰門七壯又治㿗疝在橫骨兩旁夾莖灸之泉陰在橫骨旁三寸治㿗疝偏大灸泉陰百壯三報之千金翼陰囊下橫紋治風氣若眼反口噤腹中切痛灸陰囊下第一橫理十四壯千金翼又胸痛口噤陰囊下十字紋期門大陵神門各灸三壯陰莖治卒癲病灸陰莖上宛宛中三壯得小便通即瘥當尿孔上是穴又灸陰莖頭三壯羊矢在會陰旁三寸股內橫紋中按皮肉間有核如羊矢可針三分灸七壯勢頭治癲癇穴在陰莖頭尿孔上宛宛中灸三七壯著火哀乞即差不問男女重者七七壯輕者五壯七壯禁針穴目錄神庭腦戶承靈顱息囟會神道靈臺肩井膻中客主人鳩尾水分神闕會陰石門絡卻玉枕雲門承泣缺盆合谷五里氣衝人迎乳中伏兔三陰交然谷青靈角孫橫骨三陽絡承筋箕門犢鼻肺俞心俞肝俞膽俞脾俞腎俞四白天樞禁針穴神庭禁針針之令人癲狂目失明腦戶禁針灸刺中腦戶入腦立死承靈禁針顱息禁針出血多則殺人囟會小兒八歲以前禁針蓋其囟門未合針之不幸令人夭神道禁針靈臺肩井此足陽明之會連五臟氣若針深令人悶倒連補足三里須臾平復凡針肩井者皆以三里下其氣一曰此臟氣所聚之處不宜補膻中禁針針之不幸令人夭客主人針之則呿不能欠甲乙經曰針太深令人耳無聞一曰禁針一曰針上關不得深鳩尾禁針灸水分禁針水腫病不可針針而水盡即死神闕禁針針之惡瘍潰矢死不治會陰禁針唯卒死者針一寸補之溺死者令人倒馱出水用針補之尿屎出則活余不可針石門婦人禁針灸犯之絕孕絡卻禁針玉枕禁針雲門針太深令人並息承泣陽蹻任脈足陽明三脈之會禁不宜針灸缺盆為五臟六腑之道針太深令人逆息孕婦禁針合谷孕婦不宜針針之墮胎五里玉板篇曰迎之五里中道而止五至而已五往而藏氣盡矣小針解曰奪陰者死皆謂此穴故禁針氣衝氣街之中膽胃脈也膽之脈循脅裡出氣街繞毛際胃之脈夾臍入氣街中禁不可針灸之不幸使人不得息人迎針過深殺人乳中針灸之生蝕瘡伏兔三陰交妊娠不可針針之墮胎然谷針不宜見血青靈角孫橫骨三陽絡禁針承筋禁針箕門禁針犢鼻刺禁論曰刺膝臏出液為跛肺俞刺中肺三日死心俞刺中心一日死肝俞刺中肝五日死膽俞刺中膽一日半死脾俞刺中脾十日死腎俞刺中腎六日死四白針深令人目烏色天樞魂魄之舍不可針孕婦不宜灸禁灸穴目錄天柱承光頭維攢竹睛明禾髎迎香顴髎下關人迎天牖天府周榮乳中腹哀肩貞陽池中衝少商魚際經渠隱白漏谷條口犢鼻伏兔陰市脾關申脈委中殷門心俞承泣承扶瘛脈耳門絲竹空白環俞陰陵泉氣衝四白天樞啞門風府淵腋鳩尾脊中陽關石門腦戶地五會頭臨泣素髎禁灸穴天柱禁灸承光禁灸頭維禁灸攢竹睛明禁灸禾髎迎香禁灸顴髎禁灸下關禁灸人迎足陽明少陽之會禁灸針天牖不宜灸灸則令人面腫天府禁灸灸之令入氣逆周榮乳中禁灸腹哀肩貞陽池禁灸中衝少商魚際經渠禁灸灸則傷人神明隱白漏谷條口犢鼻伏兔禁灸陰市禁灸髀關禁灸申脈委中禁灸殷門心俞禁灸承泣禁灸承扶瘛脈禁灸耳門禁灸絲竹空禁灸灸之不幸令人目小及盲白環俞禁灸陰陵泉氣衝灸之不幸使人不得息四白禁灸天樞孕婦不宜灸啞門禁灸灸之令人啞風府禁灸灸則令人喑淵腋禁灸灸之不幸生腫蝕馬刀瘍內潰者死鳩尾禁灸脊中禁灸灸之令人僂陽關足少陽經穴禁灸石門婦人灸之絕孕腦戶灸之令人喑地五會禁灸灸之令人瘦不出三年死頭臨泣禁灸素髎禁灸
