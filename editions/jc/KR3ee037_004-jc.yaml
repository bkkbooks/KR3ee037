毛自此交入足厥陰是動則病口苦善太息心脅痛不能轉側甚則面微塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小趾次趾不用盛者人迎大一倍於寸口虛者人迎反小於寸口也靈樞子時自耳門交與瞳子髎循頭耳側脅下行至足竅陰穴止入門少陽根於竅陰結於窗籠窗籠者耳中也靈樞足少陽膽經左右凡九十穴竅陰二穴在足小趾次趾之端外側去爪甲角如韭葉足少陽脈之所出為井針入一寸留三呼可灸三壯銅人俠谿二穴在足小趾次趾歧骨間本節前陷中足少陽之脈之所溜為滎針入二分留三呼可灸三壯銅人地五會二穴在足小趾次趾本節之後陷中去俠谿一寸針入二分不可灸灸則使人羸瘦不出三年死銅人臨泣二穴在足小趾次趾本節後間去俠谿一寸半陷中足少陽脈之所注為輸針入三分留三呼可灸三壯銅人丘墟二穴在足外踝下微前陷中去臨泣三寸足少陽脈之所過為原針入五分留七呼可灸三壯銅人懸鐘二穴一名絕骨在足外踝上三寸動脈中足三陽之大絡按之陽明脈絕乃取之針入六分留七呼可灸三壯銅人陽輔二穴在足外踝上四寸輔骨前絕骨端如前三分去丘墟七寸足少陽脈之所行為經針入五分留七呼可灸三壯銅人光明二穴在足外踝上五寸少陽絡別走厥陰針入六分留七呼可灸五壯銅人外丘二穴在足外踝上七寸骨陷中足少陽郄針入三分可灸三壯銅人陽交二穴一名別陽一名足髎在外踝上七寸斜屬三陽分肉之間針入六分留七呼可灸三壯銅人陽陵泉二穴在膝下一寸外廉陷中伸而得之銅人在膝下外尖骨前資生在膝品骨下一寸外廉兩骨陷中蹲坐取之足少陽脈之所入為合針入六分留十呼得氣即瀉可灸七壯至七七壯銅人陽關二穴一名關陽一名關陵在陽陵泉上三寸犢鼻外陷中針入五分禁不可灸銅人中瀆二穴在髀骨外膝上五寸分肉間陷中針入五分留七呼禁不可灸銅人風市二穴在膝上外廉兩筋間正立以兩手著腿中指盡處是穴入門在膝上外廉五寸得效針入五分可灸五壯入門環跳二穴在髀樞中側臥伸下足屈上足取之銅人在髀樞碾子骨一作硯子後宛宛中入門針入一寸留十呼可灸五十壯銅人居髎二穴在章門下八寸三分監骨上陷中針入八分可灸三壯銅人維道二穴在章門下五寸三分針入八分可灸三壯銅人五樞二穴在帶脈下三寸水道旁一寸五分陷中針入一寸可灸五壯銅人帶脈二穴在季肋下一寸八分針入六分可灸五壯銅人京門二穴腎之募也一名氣府一名氣腧在監骨下腰中季脅本挾脊針入八分留十呼可灸三壯銅人日月二穴膽之募也一名神光在期門下五分陷中直乳第二肋下銅人在乳下二肋端入門針入七分可灸五壯銅人輒筋二穴在腋下三寸腹前行一寸著脅銅人在淵腋前一寸入門針入六分可灸三壯銅人淵腋二穴在側腋下三寸宛宛中舉臂取之針入三分禁不可灸銅人肩井二穴一名膊井在肩上陷罅中缺盆上大骨前一寸半以三指按取之當中指下陷中是可灸七壯禁不宜針銅人風池二穴在顳顬即腦空穴後髮際陷中銅人在耳後一寸半橫挾風府入門針入三分留七呼可灸七壯銅人腦空二穴一名顳顬在承靈後一寸半挾玉枕骨下陷中銅人挾玉枕旁枕骨下陷中搖耳有空入門針入五分得氣即瀉可灸三壯曹魏公苦患頭風目眩華佗針此穴即愈銅人承靈二穴在正營後一寸五分針入三分可灸五壯銅人正營二穴在目窗後一寸五分針入三分可灸五壯銅人目窗二穴一名至榮在臨泣後一寸針入三分可灸五壯今附三度刺目大明銅人臨泣二穴在當目直上入髮際五分針入三分留七呼禁不可灸銅人陽白二穴在眉上一寸直目瞳子針入二分可灸三壯銅人本神二穴在曲差旁一寸五分直耳上銅人在臨泣外一寸半入門針入三分可灸七壯銅人完骨二穴在耳後入髮際四分針入三分可灸七壯銅人竅陰二穴在完骨上枕骨下搖耳有空針入三分可灸七壯銅人側頭部在耳後者十二穴醫風帖耳瘛脈次之顱息又次之完骨又次之浮白最後竅陰又居浮白之上綱目浮白二穴在耳後入髮際一寸針入三分可灸七壯銅人角孫二穴在耳郭中間上開口有空針入三分可灸三壯側頭部在耳上者六穴率谷最上天衝次之角孫最下綱目天衝二穴在耳上如前三分承靈後一寸半針入三分可灸七壯銅人率谷二穴在耳上入髮際一寸五分針入三分可灸三壯銅人曲賓二穴在耳上入髮際曲隅陷中鼓頷有空銅人以耳掩前尖處是穴入門在耳上將耳掩前正尖上是穴資生針入三分可灸七壯銅人側頭部在耳前者八穴頷厭在腦空上廉懸顱在腦空中廉懸釐在腦空下廉皆直頭角上至耳前曲鬢又在懸釐之後綱目懸釐二穴在曲周上顳顬下廉銅人從額斜上頭角下陷入門針入三分留三呼可灸三壯銅人懸顱二穴在曲周上顳顬中銅人斜上額角中在懸釐間入門針入三分可灸三壯銅人頷厭二穴在曲周下顳顬上廉銅人對耳額角外入門在曲角下腦空之上上廉曲周皆當作曲角資生針入五分留七呼可灸三壯銅人客主人二穴一名上關在耳前上廉起骨開口有空動脈宛宛中可灸七壯禁不可針若針必須側臥張口取之禁不可針深問曰何以不得針深曰上關若刺深令人欠而不得㰦下關若久留針即㰦而不得欠牙關急是故上關不得刺深下關不得久留針也銅人聽會二穴一名聽呵一名後關在耳珠微前陷中開口有空銅人在上關下一寸動脈宛宛中張口得之綱目針入三分留三呼可灸五壯至二七壯銅人瞳子髎二穴一名太陽一名前關在目外眥去眥五分針入三分禁不可灸銅人足厥陰肝經共一十四穴大敦足大趾爪甲根後四分節前針二分留十呼灸三壯主治卒心痛汗出腹脹腫滿中熱喜寐五淋七疝小便頻數不禁陰痛引小腹陰挺出血崩屍厥如死病左取右病右取左孕婦產前產後皆不宜灸一云凡疝氣腹脹足腫者皆宜灸之以泄肝木而脾胃之土自安兼期門能治堅痃疝氣玉龍賦大便難灸四壯又五淋灸三十壯又失尿不禁灸七壯小兒灸一壯又尿血灸隨年壯千金大便秘結宜燒此席弘賦兼照海善蠲寒證百證賦能除七疝之偏墜通玄賦兼長強治小腸氣痛天星秘訣兼三陰交治小腸氣痛又一切冷氣連臍腹結痛小便遺溺乾坤生意行間大趾次趾合縫後五分針三分留十呼灸三壯主治嘔逆咳血心胸痛腹脅脹色蒼蒼如死狀終日不得息中風口喎四逆嗌乾煩渴瞑不欲視目中淚出太息癲疾短氣肝積肥氣痎瘧洞泄遺尿癃閉崩漏白濁寒疝少腹腫腰痛不可俯仰小兒驚風一曰主便赤溺難白濁胸背心腹脹痛瀉行間火而熱自清木氣自下治小腹脹心疼寒濕肺氣可灸七壯神農經小兒重舌灸行間隨年壯又莖中痛灸五十壯又失尿不禁灸七壯千金兼睛明可治雀目肝氣又兼湧泉療消渴百證賦治膝腫腰疼通玄賦兼膻中水分關元三里三陰交治血蠱捷法太衝在行間後寸半橫距陷谷一寸少針三分留十呼灸三壯主治虛勞嘔血恐懼氣不足嘔逆發寒肝瘧令人腰痛嗌乾胸脅支滿太息浮腫小腹滿腰引少腹痛足寒或大小便難陰痛遺溺溏泄小便淋癃小腹疝氣腋下馬刀瘍瘻䯒酸踝痛女子月水不通或漏血不止小兒卒疝治寒濕腳氣痛行步難可灸三壯神農經產後出汗不止針太衝急補之又凡上氣冷發嘔逆不食腹中雷鳴不限壯數從痛灸至不痛止炷如雀矢又氣短下氣灸五十壯此穴並主肺痿又不得尿灸五十壯又虛勞浮腫灸百壯千金云兼合谷治手連肩脊痛難忍又兼百會照海陰交治咽喉疾又腳痛膝腫針三里懸鐘三陰交二陵更向太衝引氣席弘賦能除心脹咽痛標幽賦治行步難移最奇通玄賦能治生死病能醫驚癇風咽喉並心脹兩足不能動七疝偏墜腫眼目似云矇亦能療腰痛針下有神功馬丹陽中封在內踝前一寸微下些針四分留七呼灸三壯千金云五十壯主治痎瘧色蒼蒼然善太息如將死狀振寒溲白大便難小便腫痛五淋足厥冷不嗜食身體不仁寒疝痿厥筋攣失精陰縮入腹相引痛或身微熱一云能止汗出夢泄遺精陰縮灸五十壯又五淋不得尿灸二七壯又鼓脹灸二百壯又癭氣灸隨年壯千金云合三里治行步艱楚玉龍賦蠡溝在內踝前上五寸針二分留三呼灸三壯主治疝痛小腹滿痛癃閉臍下積氣如石數噫恐悸少氣足脛寒酸屈伸難腰背拘急不可俯仰月經不調溺下赤白中都在蠡溝上二寸半針三分留六呼灸五壯主治腸癖㿉疝小腹痛濕痹足熱脛寒不能行立婦人崩中產後惡露不絕膝關在犢鼻下一寸二分向里橫開寸半下直中都相距五寸針四分灸五壯主治風痹膝內腫痛引臏不可屈伸及寒濕走注白虎歷節風痛不能舉動咽喉中痛曲泉在橫紋頭針六分留七呼灸三壯主治㿉疝陰股痛小便難少氣泄痢膿血腹脅支滿膝痛筋攣四肢不舉不可屈伸風勞失精身體極痛膝脛冷陰莖痛實則身熱目痛汗不出目䀮䀮發狂衄血喘呼痛引咽喉女子陰挺出少腹痛陰癢血瘕男子失精膝脛冷疼灸百壯千金云兼照海陰交更求氣海關元同瀉治七疝小腹痛神效席弘賦陰包在股內廉膝上三寸橫直陰市針六分灸三壯七壯主治腰尻引小腹痛小便難遺尿月水不調五里橫直髀關針六分灸五壯主治腸風熱閉不得溺風勞嗜臥四肢不能舉陰廉在五里上一寸大些針八分留三呼灸二壯主婦人不妊若經不調未有孕者灸三壯即有子急脈在陰毛中陰上兩旁相去同身寸之二寸半按之隱指堅然甚按則痛引上下其左者中寒則上引少腹下引陰丸善為痛為少腹急中寒此兩脈皆厥陰之大絡通行其中故曰厥陰急脈即睪之系也可灸而不可針病疝少腹痛者即可灸之章門臍上二寸橫開八寸針六分留六呼灸三壯一云百壯主治兩脅積氣如卵石膨脹腸鳴食不化胸脅痛煩熱支滿嘔吐咳喘不得臥腰脊冷痛不得轉側肩臂不舉傷飽身黃瘦弱泄瀉四肢懈惰善恐少氣厥逆臟會季脅臟病治此難疏奔豚積聚堅滿脹痛吐逆不下食腰脊冷疼小便白濁灸脾募百壯三極之又狂走癲癇灸三十壯又尿血灸百壯又治石水灸然谷氣衝四滿章門千金云治胸脅支滿百證賦一傳治久瀉不止癖塊脹疼期門在乳直下四寸乳根下微外些日月上橫直巨關針四分灸五壯七壯主治傷寒胸中煩熱奔豚上下目青而嘔霍亂瀉痢腹硬胸脅積痛支滿嘔酸善噫食不下喘不得臥一婦人患傷寒熱入血室醫者不識許學士曰大柴胡以遲當針期門予不能針請善針者針之如言而愈主奔豚灸百壯上氣咳逆胸滿痛徹胸背灸巨闕期門各五十壯兼大敦能治堅痃疝氣玉龍賦期門穴主傷寒患六日過徑猶未汗但向乳根二肋間又治婦人坐產難席弘賦兼溫溜治傷寒項強百證賦期門退胸滿血膨而可止通玄賦兼三里治傷寒過徑不出汗天星秘訣治產後噎捷徑足厥陰肝經流注足厥陰之脈起於大趾聚毛之際大敦穴上循足跗上廉本節前行間穴本節後太衝穴去內踝一寸中封穴上踝八寸交出太陰之後上膕內廉曲泉穴循股陰入毛中環陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙額也運目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺口自此交入手太陰是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆洞泄狐疝遺尿閉癃盛者寸口大一倍於人迎虛