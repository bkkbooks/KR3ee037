喉痛百證賦中渚在手無名指後本節後骨直對針二分留三呼灸三壯主治熱病汗不得出臂指痛不得屈伸頭痛目眩生翳不明耳聾咽腫久瘧手臂紅腫瀉之出血灸五壯針久患腰疼背痛太乙歌兼液門治手臂紅腫玉龍賦治久患傷寒肩背痛席弘賦脊心後痛針此立愈通玄賦五指不便取中渚靈光賦陽池在手表腕上陷中自本節後骨直對腕中針二分留六呼灸三壯主治消渴口乾煩悶寒熱瘧或因折傷手腕捉物不得臂不能舉消渴口乾灸五十壯千金治手腕疼無力不能上舉至頭可炙七壯神農經外關在陽池後二寸兩筋間陷中針三分留七呼灸三壯主治耳聾渾焞無聞肘臂五指痛不能握若脅肋痛者瀉之治肘臂不得屈伸五指盡疼不能握物可灸七壯神農經兼大陵支溝治肚痛秘結玉龍賦支溝在陽池後三寸針二分留七呼灸七壯主治熱病汗不出肩臂酸重脅腋痛四肢不舉霍亂嘔吐口噤暴喑鬼擊卒心痛產後血暈不省人事凡三焦相火熾盛及大便不通脅脅疼痛者俱宜瀉之治頸漏馬刀灸百壯千金兼照海能通大便之秘又合外關大陵治肚疼秘結會宗在陽池後三寸於支溝平微前五分針三分灸三壯一曰禁針主治五癇耳聾肌膚痛三陽絡在陽池後四寸對支溝灸五壯禁針主治暴喑不能言耳聾齒齲嗜臥身不欲動四瀆在三陽絡前五分上一寸四分針六分留七呼灸三壯一曰針三分主治暴氣耳聾下齒齲痛天井在肘微後些正中陷中針三分留七呼灸三壯甲乙經針一分主治咳嗽上氣胸痛不得言唾膿不嗜食寒熱悽悽不得臥驚悸悲傷瘛痎癲疾五癇風痹頭頸肩背痛耳聾目銳眥痛頰腫肘臂痛不得捉物及瀉一切瘰癧瘡腫癮疹治咳嗽上氣風痹肘疼可灸七壯神農經清冷淵在肘後寸半距天井一寸針三分灸三壯主治諸痹痛肩臂肘臑不能舉五般肘痛尋尺澤冷淵針後即收功席弘賦消濼在臂臑上二寸後開一寸少針五分灸五壯一曰針一分灸三壯主治風痹頸項強急腫痛寒熱頭痛肩背急一傳海南治牙疼灸此穴臑會在消濼上二寸微前針五分灸五壯主治肘臂氣腫痠痛無力不能舉項癭氣瘤寒熱瘰癧肩髎在肩髃後一寸三分微下些針七分灸三壯主治臂重肩痛不能舉天髎在肩井內一寸後開八分在肩外俞上一寸分針八分灸三壯主治肩臂痠痛缺盆痛汗不出胸中煩滿頸項急寒熱天牖在風池下一寸微外些針一分留七呼不宜補亦不宜灸灸即令人面腫資生經云灸一壯甲乙經云灸三壯主治暴聾不聰氣目不明夜夢顛倒面無顏色頭風面腫項強一曰若治面腫眼合先取譩譆後針天牖風池其病即瘥若不先針譩譆其病難愈翳風在耳根後距耳五分針三分灸七壯主治耳聾口眼喎斜口噤不開脫頷腫頰牙車急痛暴喑不能言一云耳紅腫痛瀉之耳虛鳴補之補多瀉少兼聽會治耳聾氣閉百證賦瘛脈在翳風上一寸稍近耳根針一分灸三壯銅人云針出血如豆汗不宜多出一云禁灸主治頭風耳鳴小兒驚癇瘛瘲嘔吐瀉痢無時驚恐目澀眵膏顱息在瘛脈上一寸大些以上翳風瘛脈顱息三穴自上而下緊耳後針一分灸七壯甲乙經灸三壯一曰禁針出血多則殺人主治耳鳴喘息小兒嘔吐瘛瘲驚恐發癇身熱頭痛不得臥聤耳腫流膿汁痓病非顱息不愈百證賦角孫在客主人上一寸針三分灸三壯主治目生翳齒齦腫不能嚼唇吻燥頸項強堪治耳齒之病耳門在耳前肉峰下缺口外針三分留三呼灸三壯一云禁灸主治耳聾聤耳膿汗耳生瘡齒齲唇吻強但患傷寒兩耳聾耳門聽會疾如風席弘賦兼絲竹空能住牙疼於頃刻百證賦耳鳴腰痛先五會後此穴及三里天星秘訣和髎在眉直後髮際針三分灸三壯一曰灸之目盲主治頭痛耳鳴牙車引急頸項腫口噼瘛瘲絲竹空在眉後陷中針三分留三呼禁灸灸之不幸令人目小及盲主治頭痛目赤目眩視物䀮䀮拳毛倒睫風癇戴眼發狂吐涎沫偏正頭風治頭風宜出血神農經兼耳門能治牙疼於頃刻百證賦治偏頭痛難忍通玄賦一傳主眼赤痛針一分出血手少陽三焦經流注手少陽之脈起於小指次指之端外側關衝穴上出兩指之間本節前液門穴本節後中渚穴循手表腕陽穴也出臂外兩骨之間支溝穴上貫肘天井穴循臑外上項挾耳後直上出耳上角以屈下頰至䪼䪼頰骨也其支者從耳後入耳中出走耳前過客主人前穴名交頰至目銳眥自此交入足少陽是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也靈樞亥時自中衝交與關衝循臂上行至耳門穴止入門手少陽三焦經左右凡四十六穴關衝二穴在手小指次指之端外側去爪甲角如韭葉握拳取之手少陽脈之所出為井針入一分留三呼可灸三壯銅人液門二穴在手小指次指間本節前陷中手少陽脈之所溜為滎握拳取之針入二分留三呼可灸三壯銅人中渚二穴在手小指次指本節後間陷中液門下一寸握掌取之手少陽脈之所注為輸針入三分留三呼可灸三壯銅人陽池二穴一名別陽在手表腕上陷中銅人在手掌背橫紋陷中手少陽脈之所過為原針入三分留三呼禁不可灸銅人外關二穴在腕後二寸陷中在陽池穴後二寸手少陽絡別走心主針入三分留七呼可灸三壯銅人支溝二穴在腕後三寸兩骨之間陷中陽池後三寸銅人在腕後臂外三寸資生手少陽脈之所行為經針入三分留七呼可灸二七壯銅人會宗二穴在腕後三寸空中一寸銅人在支溝外旁一寸空中入門針入三分可灸三壯銅人三陽絡二穴在臂上大交脈支溝上一寸銅人在陽池後四寸入門在肘前五寸外廉陷中資生可灸七壯禁不可針銅人四瀆二穴在肘前六寸外廉陷中針入六分留七呼可灸三壯銅