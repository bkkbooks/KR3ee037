body:
  text: 卷四足少陰腎經共二十七穴湧泉在足心陷中屈足卷趾宛宛之中針三分留三呼灸三壯主治屍厥面黑喘嗽有血目視䀮䀮無所見善恐心中結熱風疹風癇心痛不嗜食男子如蠱女子如妊咳嗽氣短身熱喉痹目眩頸痛胸脅滿小便痛腸澼泄瀉霍亂轉胞不得尿腰痛大便難轉筋足脛寒痛腎積奔豚熱厥五指盡痛足不踐地足下熱喘滿淳于意曰熱厥也針足心立愈陰中懊憹痛針入三分又鼻衄不止灸二百壯又霍亂轉筋灸三七壯灸足踵聚筋上白肉際七壯立愈千金兼關元豐隆治屍勞玉龍賦鳩尾能治五般癇若下湧泉人不死又小腸氣結連臍痛速瀉陰交良久針湧泉取氣甚妙席弘賦專治厥寒厥熱又兼行間治消渴腎竭百證賦治胸結身黃瀉此通玄賦治婦人疾並男蠱女孕兩病痊千金勿妄傳靈光賦兼陰陵治小腸連臍痛天星秘訣然谷在公孫後一寸針三分留三呼灸三壯一曰針不宜見血主治喘呼煩滿咳血喉痹消渴舌縱心恐少氣涎出小腹脹痿厥寒疝足跗腫䯒酸足一寒一熱不能久立男子遺精婦人陰挺出月經不調不孕初生小兒臍風撮口痿厥洞泄此穴主瀉腎臟之熱若治傷寒亦宜出血石水灸然谷氣衝四滿章門千金此穴易醒臍風百證賦太谿在足內踝後五分針三分留七呼灸三壯主治熱病汗不出傷寒手足逆冷嗜臥咳嗽咽腫衄血唾血溺赤消癉大便難久瘧咳逆煩心不眠脈沉手足寒嘔吐不嗜食善噫腹疼瘠瘦寒疝痃癖治牙疼可灸七壯一云牙疼紅腫者瀉之陰股內濕癢生瘡便毒先補後瀉又云腎瘧嘔吐多寒閉戶而處其病難已太谿大鐘主之腰脊痛大便難手足寒並針委中大鐘神農經合崑崙申脈善療足腫之迍玉龍賦兼商陽治寒瘧有驗百證賦大鐘在照海後一寸半針二分留三呼灸三壯主治氣逆煩悶實則小便淋閉洒洒腰脊強痛大便秘澀嗜臥口中熱虛則嘔逆多寒欲閉戶而處少氣不足胸脹喘息舌乾食噎不得下善驚恐不樂喉中鳴咳唾血兼通里治倦言嗜臥百證賦治心性之呆癡標幽賦照海在內踝下一寸針四分留六呼灸三壯一曰針三分灸七壯主治咽乾嘔吐四肢懈惰嗜臥善悲不樂大風偏枯半身不遂久瘧卒疝腹中氣痛小腹淋痛陰挺出月水不調兼支溝能通大便之秘又合內關能醫腹疾之塊玉龍賦治月事不行可灸七壯又兼公孫治傷寒四日太陰經再用內關施截法神農經治噤口喉風用三稜針出血即安攔江賦兼大敦治傷寒百證賦兼百會太衝陰交治咽喉疾又兼陰交曲泉關元氣海同瀉治七疝如神席弘賦二蹻二陵腳氣者取此四穴又兼三里同治腳氣並在腰之疾靈光賦兼陽維內關能下胎衣又治喉中之閉塞標幽賦水泉在內踝下微後直太谿下針四分灸五壯主治目䀮䀮不能遠視女子月事不來來即多心下悶痛小腹痛小便淋陰挺出兼天樞治月潮違限百證賦復溜在交信後五分與交信並排針三分留三呼灸五壯七壯主治腸澼痔疾腰脊內引痛不得俯仰善怒多言舌乾涎出足痿䯒寒不得履目視䀮䀮腸鳴腹痛四肢腫十種水病五淋盜汗齒齲脈微細治盜汗不收及面色痿黃可灸七壯神農經血淋灸五十壯千金針治腰脊閃挫疼痛遊風遍體太乙歌傷寒無汗宜瀉又起六脈之沉匿玉龍賦傷寒無汗先補合谷次瀉此穴攔江賦此穴專治氣滯在腰席弘賦治腫如神靈光賦交信在三陰交下一寸後開些針四分留五呼灸三壯主治五淋㿉疝陰急股腨內廉引痛瀉痢赤白大小便難女子漏血不止陰挺月事不調小腹痛盜汗兼合陽治女子少氣漏血百證賦築賓在三陰交直上二寸後開一寸二分針三分灸五壯主治小兒胎疝癲疾吐舌發狂罵詈腹痛嘔吐涎沫足腨痛陰谷在曲泉後橫直一寸半微下些針四分留七呼灸三壯主治舌縱涎下腹脹煩滿溺難小腹疝急引陰陰股內廉痛為痿為痹膝痛不可屈伸女人漏下不止少妊兼水分三里利小便消腫脹太乙歌治臍腹痛通玄賦橫骨在大赫下一寸肓俞下五寸去中行五分針五分灸三壯五壯甲乙經曰針一寸主治五淋小便不通陰器下縱引痛小腹滿目眥赤痛五臟虛兼肓俞瀉五淋久積百證賦兼大都治氣滯腰痛不能立席弘賦大赫在氣穴下一寸去中行五分針三分灸五壯千金云三十壯甲乙經作針一寸主治虛勞失精陰痿上縮莖中痛目赤痛女子赤帶氣穴在四滿下一寸去中行五分針三分灸五壯甲乙經作針一寸主治奔豚痛引腰脊瀉痢經不調四滿在中注下一寸去中行五分針三分灸三壯甲乙經云針一寸千金云灸百壯主治積聚疝瘕腸癖切痛石水奔豚臍下痛女人月經不調惡血㽲痛並無子可灸三十壯中注在肓俞下一寸去中行五分針一寸灸五壯一云針五分主治小腹熱大便堅燥腰脊痛目眥痛女子月事不調肓俞在商曲下一寸半直臍旁相去五分針一寸灸五壯一云針五分主治腹痛寒疝大便燥目赤痛從內眥始兼橫骨瀉五淋之久積商曲在石關下二寸去中行五分針一寸灸五壯一云針五分主治腹中切痛積聚不嗜食目赤痛內眥始石關在陰都下二寸少去中行五分針一寸灸三壯一云針五分主治噦噫嘔逆脊強腹痛氣淋小便不利大便燥閉目赤痛婦人無子或臟有惡血上衝腹痛不可忍治積氣疼痛可灸七壯孕婦禁灸神農經治噦噫嘔逆灸百壯千金兼陰交無子可搜百證賦陰都在通谷下二寸少去中行五分針三分灸三壯甲乙經曰針一寸千金云灸隨年壯主治心煩滿恍惚氣逆腸鳴肺脹氣搶嘔沫大便難脅下熱痛目痛寒熱痎瘧婦人無子藏有惡血腹絞痛通谷在幽門下二寸少去中行五分針五分灸五壯主治口喎暴喑積聚痃癖胸滿食不化膈結嘔吐目赤痛不明清涕項似拔不可回顧幽門在巨闕旁各五分針五分灸五壯主治胸中引痛心下煩悶逆氣裡急支滿不嗜食數咳乾噦嘔吐涎沫健忘泄痢膿血少腹脹滿女子心痛逆氣善吐食不下治心下痞脹飲食不化積聚疼痛可灸十四壯孕婦不可灸神農經兼玉堂能開徹煩心嘔噦百證賦步廊在中庭旁二寸針三分灸五壯主治胸脅滿痛鼻塞少氣咳逆不得息嘔吐不食臂不得舉神封在步廊上二寸少去中行二寸針三分灸五壯主治胸脅滿痛咳逆不得息嘔吐不食乳癰灑淅惡寒靈墟在神封上二寸少去中行二寸針三分灸五壯主治同神封神藏在靈墟上二寸少去中行二寸針三分灸五壯主治同上兼璇璣治胸滿項強已試百證賦彧中在神藏上二寸少去中行二寸針四分灸五壯主治咳逆不得喘息胸脅支滿多唾嘔吐不食治氣喘痰壅可灸十四壯神農經一傳治咳嗽哮病唾血俞府在彧中上二寸少去中行二寸針三分灸五壯主治咳逆上氣嘔吐不食中痛一云熱嗽瀉之冷嗽補之兼乳根能治氣嗽痰哮玉龍賦足少陰腎經流注足少陰之脈起於小趾之下斜趨足心湧泉穴出然骨之下然谷穴循內踝之後太谿穴別入跟中大鐘穴以上腨內復溜穴出膕內廉陰谷穴上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中自此交入手心主是動則病飢不欲食面黑如炭色咳唾則有血喉鳴而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕若人將捕之是謂骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸癖脊臀股內後廉痛痿厥嗜臥足下熱而痛灸則強食生肉勉強飲食以生肌肉緩帶披髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也靈樞酉時自至陰與湧泉循膝上行至胸俞府穴止入門少陰根於湧泉結於廉泉靈樞足少陰腎經左右凡五十四穴湧泉二穴在足陷中屈足卷趾宛宛中銅人湧泉者足心也跪而取之靈樞在腳心底宛中白肉際資生在腳掌中心入門足少陰脈之所出為井針入三分留七呼禁不可灸若灸廢人行動資生然谷二穴一名龍淵在足內踝前起大骨下陷中銅人然谷者然骨之下者靈樞在內踝前直下一寸資生足少陰脈之所溜為滎針入三分留三呼不宜見血刺之多見血使人立飢欲食可灸三壯靈樞太谿二穴一名呂細在足內踝後跟骨上動脈陷中銅人在內踝後五分跟骨間動脈陷中入門足少陰脈之所注為輸針入三分留七呼可灸三壯凡人病有此脈則生無則死銅人大鐘二穴在足跟後沖中太谿下五分足少陰絡別走太陽針入二分留七呼可灸三壯銅人照海二穴在足內踝下容爪甲陰蹻脈所生銅人令患人穩坐足底相對赤白肉際陷中綱目在內踝下四分微前小骨下入門針入三分可灸七壯銅人水泉二穴去太谿下一寸在內踝下足少陰郄針入四分可灸五壯銅人復溜二穴一名伏白一名昌陽在足內踝上二寸筋骨陷中銅人在內踝後上二寸動脈中入門上內踝二寸動而不休靈樞足少陰脈之所行為經針入三分留三呼可灸五壯銅人交信二穴在足內踝上二寸少陰前太陽後廉前筋骨間腨陰蹻之郄也銅人在內踝上二寸復溜前三陰交後筋骨間陷中入門針入四分留五呼可灸三壯銅人築賓二穴在內踝上二寸腨分中陰維之郄銅人在骨後大筋上小筋下屈膝取之針二分可灸五壯入門陰谷二穴在膝內輔骨後大筋下小筋上銅人在輔骨之後大筋之下小筋之上有動脈按之應手屈膝而得之靈樞足少陰脈之所入為合針入三分留七呼可灸三壯銅人橫骨二穴一名下極在大赫下一寸銅人在橫骨中央宛曲如仰月陷中曲骨外一寸半入門可灸三壯禁不可針銅人大赫二穴一名陰維一名陰關在氣穴下一寸針入三分可灸五壯銅人氣穴二穴一名胞門一名子戶在四滿下一寸針入三分可灸五壯銅人四滿二穴一名髓府在中注下一寸銅人挾丹田旁一寸半又云在心下八寸臍下橫紋是穴資生針入一寸可灸五壯入門中注二穴在肓俞下一寸針入一寸可灸五壯銅人肓俞二穴在商曲下一寸去臍旁五分銅人去臍旁各一寸半資生平神闕外一寸半為正入門針入一寸可灸五壯銅人商曲二穴在石關下一寸針入一對可灸五壯銅人石關二穴在陰都下一寸針入一寸可灸三壯銅人陰都二穴一名食宮在通谷下一寸針入一寸可灸三壯銅人通谷二穴在幽門下一寸銅人在上肱旁資生針入五分可灸五壯銅人幽門二穴一名上門在巨闕旁相去各五分銅人平巨闕外一寸半入門幽門挾巨闕一寸半四滿在丹田一寸半當以一寸半為正幽門至橫骨去腹中行皆當為一寸半資生針入五分可灸五壯銅人步廊二穴在神封下一寸六分陷中仰而取之銅人去中庭外二寸入門針入二分可灸五壯銅人神封二穴在靈墟下一寸六分陷中仰而取之針入三分可灸五壯銅人靈墟二穴在神藏下一寸六分陷中仰而取之針入三分可灸五壯銅人神藏二穴在彧中下一寸六分陷中仰而取之針入三分可灸五壯銅人彧中二穴在俞府下一寸六分陷中仰而取之針入四分可灸五壯銅人俞府二穴一名輸府在巨骨下璇璣旁各二寸陷中仰而取之針入三分可灸五壯銅人手厥陰心包絡經共九穴天池在乳後一寸下五分針三分灸三壯主治目䀮䀮不明頭痛胸脅煩滿咳逆臂腋腫痛四肢不舉上氣寒熱瘧熱病汗不出治頸漏瘰癧灸百壯千金兼委陽穴腋腫針而速散百證賦天泉在臂內極泉直下一寸大些針六分灸三壯一曰針二分主治惡風寒胸脅痛支滿咳逆膺背胛臂間痛曲澤在臂內廉橫紋正中居手太陰尺澤之後針三分留七呼灸三壯主治心痛善驚身熱煩渴臂肘搖動掣痛不可伸傷寒嘔吐氣逆兼少商治血虛口渴百證賦郄門在掌後去腕五寸針三分灸五壯主治嘔吐衄血心痛嘔噦驚恐神氣不足