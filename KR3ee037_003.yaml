風鼻䪼腫腳氣膝脛腫痛兼腎俞治胸膈停留瘀血地倉夾口吻旁四分針三分留五呼灸七壯或二七壯重者七七壯病左治右病右治左艾炷宜小如粗叉腳若過大口反喎卻灸承漿即愈主治偏風口眼歪斜牙關不開齒痛頰腫目不得閉失音不語飲食不收水漿漏落眼瞤動遠視䀮䀮昏夜無見地倉能止口流涎靈光賦兼頰車療口喎玉龍賦大迎在曲頷前一寸三分居頦下人迎上針三分留七呼灸三壯主治風痙口喑口噤不開唇吻瞤動頰腫牙痛舌強不能言目痛不能閉口喎數欠風壅面腫寒熱瘰癧兼顴髎治目眩百證賦頰車在耳下八分曲頰端近前陷中針三分灸三壯一曰灸七壯至七七壯炷如小麥主治中風牙關不開失音不語口眼歪斜頰腫牙痛不可嚼物頸強不得回顧凡口眼喎斜者喎則左瀉右補斜則左補右瀉針齒痛靈光賦兼地倉療口喎玉龍賦下關在客主人下聽會上耳前動脈針三分留七呼灸三壯本輸篇曰針之則欠不能呿者此也耳中有干拭禁不可灸一曰不可久留針主治偏風口眼喎咽斜耳鳴耳聾痛癢出膿失欠牙關脫臼頭維在額角入髮際夾本神旁一寸五分神庭旁四寸五分直率谷微高些針三分沒皮下向禁灸主治頭風疼痛如破目痛如脫淚出不明兼攢竹能治目疼頭疼玉龍賦兼臨泣可治淚出百證賦人迎在頸下夾結喉旁一寸五分大迎下水突上大動脈應手禁灸氣府論注曰針可入四分過深殺人主治吐逆霍亂胸滿喘呼不得息項氣悶腫食不下針入四分耳鳴腰痛先此後耳門及三里天星祕訣水突在頸大筋前直人迎下夾氣舍上內貼氣喉針三分灸三壯主治咳逆上氣咽喉癰腫短氣喘息不得臥氣舍在頸大筋前直人迎下針三分灸五壯主治咳逆上氣肩腫項強不能回顧喉痹硬咽食飲不下癭瘤缺盆在結喉旁橫骨陷者中對乳氣舍在裡近喉缺盆在外針三分留七呼灸三壯針太深令人逆息孕婦禁針主治喘急息賁咳嗽胸滿水腫瘰癧寒熱缺盆中腫外潰傷寒胸中熱不已喉痹汗出一曰主瀉胸中之熱治與大杼中府風府同氣戶在橫骨下夾俞府兩旁各二寸去中行四寸陷中仰而取之針三分灸三壯五壯主治咳逆上氣胸背痛支滿喘急不得息不知味此穴攻噎若不愈兼灸氣海席弘賦兼華蓋穴除脅痛有驗百證賦庫房在氣戶下一寸六分去中行四寸陷中仰而取之針三分灸三壯五壯主治胸脅滿咳逆上氣呼吸不利唾膿血濁沫屋翳在庫房下一寸六分去中行四寸陷中仰而取之針三分灸五壯主治咳逆上氣唾膿血濁痰身腫皮膚痛不可近衣淫濼瘛瘲不仁兼至陰穴治遍身風癢之疼多百證賦膺窗在屋翳下一寸六分巨骨下四寸八分去中行四寸陷中仰而取之針四分灸五壯主治胸滿短氣不得臥腸鳴注泄乳癰寒熱乳中當乳頭正中微針禁灸甲乙經曰禁不可針氣府論注曰針灸之生蝕瘡瘡中有清汁膿血者可治瘡中有瘜肉若蝕瘡者死一傳胎衣不下以乳頭向下盡處俱灸之即下乳根在乳中下一寸六分去中行四寸陷中仰而取之針三分灸三壯五壯主治胸下滿痛臂痛乳痛悽悽寒熱霍亂轉筋四厥治胸下滿痛上氣喘急可灸七壯神農經兼俞府治氣嗽痰哮玉龍賦治憂噎捷徑主膈氣不下食噎病華他明堂治反胃吐食上氣灸兩乳下各一寸以瘥為度千金又灸咳逆凡久病得咳逆最為惡候其法於乳下一指許正與乳相直間陷中女人即屈乳頭度之乳頭齊處是穴艾炷如小豆許灸三壯男左女右火到肌即瘥不瘥則不可治居家必用不容在幽門旁一寸五分去中行二寸對巨闕針五分灸五壯主治腹滿痃癖胸背肩脅引痛心痛唾血喘嗽嘔吐痰癖腹虛鳴不嗜食疝瘕承滿在不容下去中行二寸對上脘針三分灸五壯又針八分甲乙經主治腹脹腸鳴脅下堅痛上氣喘急食飲不下肩息隔氣唾血夾巨闕相去五寸名承滿主腸中雷鳴相逐痢下灸五十壯千金粱門在承滿下去中行二寸對中脘針三分灸五壯又針八分甲乙經孕婦禁灸主治胸脅積氣飲食不思氣塊疼痛大腸滑泄完穀不化可灸七壯至二十一壯關門在梁門下去中行二寸對建里針八分灸五壯一云五分三壯主治積氣脹滿腸鳴切痛泄痢不食走氣夾臍急痛痎瘧振寒遺溺太乙在關門下去中行二寸對下脘針八分灸五壯一云五分三壯主治心煩癲狂吐舌滑肉門在太乙下去中行二寸對水分針八分灸五壯一云五分三壯主治癲狂嘔逆吐血重舌舌強天樞在夾臍旁二寸去肓俞一寸五分陷中針五分留七呼灸五壯拔萃云百壯又千金魂魄之舍不可針孕婦不可灸主治奔豚泄瀉赤白痢水痢不止食不化水腫腹脹腸鳴上氣衝胸不能久立久積冷氣繞腸切痛時上衝心煩滿嘔吐霍亂寒瘧不嗜食身黃瘦女人癥瘕血結成塊漏下月水不調淋濁帶下久冷及婦人癥癖小便不通腸鳴瀉痢繞臍絞痛灸百壯三報又吐血腹痛雷鳴灸百壯又狂言恍惚灸百壯又霍亂先下痢灸二七壯不瘥更二七壯男左女右千金治虛損標幽賦兼水泉治月潮違限百證賦一傳治夾膝疼痛腹中氣塊久瀉不止虛損勞弱可灸二十一壯外陵在天樞下去中行二寸對陰交針三分灸五壯又甲乙經作針八分主治腹痛心下如懸下引臍痛大巨在外陵下去中行二寸對石門針五分灸五壯甲乙經針八分主治小腹脹滿煩渴小便難㿉疝四肢不收驚悸不眠水道在大巨下三寸去中行二寸針一寸五分灸五壯一曰針八分半主治肩背強急痠痛三焦膀胱腎氣熱結大小便不利疝氣偏墜婦人小腹脹痛引陰中月經至則腰腹脹痛胞中瘕子門寒主三焦膀胱腎中熱氣灸隨年壯千金兼筋縮專治脊強百證賦歸來在水道下二寸去中行二寸針八分灸五壯一曰針二分半主治奔豚九疝陰丸上縮入腹引痛婦人血藏積冷氣衝在歸來下鼠蹊上一寸動脈應手宛宛中去中行二寸橫骨在內氣衝在外衝門又外氣衝齊中極橫骨微下些衝門齊關元上直府舍下直髀關針三分留七呼灸七壯甲乙經灸之不幸使人不得息一云禁不可針艾炷如大麥主治逆氣上攻心腹脹滿不得正臥奔豚㿗疝淫濼大腸中熱身熱腹痛陰腫莖痛婦人月水不利小腹痛無子妊娠子上衝心産難胞衣不下此穴主瀉胃中之熱與三里巨虛上下廉同治石水灸然谷氣衝四滿章門千金兼衝門治帶下産崩百證賦主血多諸證以三稜針針此穴出血立愈髀關在膝上伏兔後斜行向里去膝一尺二寸針六分灸三壯一云針三分禁灸主治腰痛膝寒足麻木不仁黃疸痿痹股內筋絡急小腹引喉痛伏兔在膝上六寸起肉間正脆坐取之針五分禁灸千金云狂邪鬼語灸百壯亦可五十壯主治腳氣膝冷不得溫風痹婦人八部諸疾明市在膝上三寸伏兔下陷中拜而取之針三分留七呼禁灸針腰痛論伏兔下陷者中灸三壯即此主治腰膝寒如注水痿痹不仁不得屈伸寒疝小腹痛滿少氣水腫大腹灸隨年壯千金兼風市能驅腿足之乏力玉龍賦膝䯒痛陰市能醫通玄賦專治兩足拘攣靈光賦心疼手顫少海間若要除根覓陰市席弘賦梁丘在膝上二寸兩筋間主治腳膝痛冷痹不仁不可屈伸足寒大驚乳腫痛治膝痛屈伸不得可灸三壯七壯神農經犢鼻在膝臏下䯒骨上骨解大筋陷中形如牛鼻針六分灸三壯一曰針三分刺禁論針膝臏出液為跛故針此者不可輕也主治膝痛不仁難跪起腳氣若膝臏癰腫潰者不可治不潰者可療若犢鼻堅鞭勿便攻之先用洗尉而後微針之愈善治風邪濕三里在膝眼下三寸䯒骨外廉大筋內宛宛中坐而豎膝低跗取之極重按之則跗上動脈止矣針五分留七呼灸三壯千金云灸二百壯至五百壯主治胃中寒心腹脹痛逆氣上攻臟氣虛憊胃氣不足惡聞食臭腹痛腸鳴食不化大便不通腰痛膝弱不得俯仰小腸氣此穴主瀉胃中之熱與氣衝巨虛上下廉同諸病皆治食氣水氣蠱毒痃癖四肢腫滿膝䯒痠痛目不明秦承祖療五勞七傷羸瘦虛乏瘀血乳癰華他人年三十以外若不灸三里令氣上衝目使眼無光蓋以三里能下氣也一傳心疼者灸此穴及承山立愈以其中有瘀血故瀉此則愈三里內庭治肚腹病妙又身重腫坐不欲起風勞腳疼灸五十壯針五分補之邪病大呼罵走三里主之名鬼邪千金治心腹脹滿胃氣不足飲食不化痃癖氣塊吐血腹內諸疾五勞七傷灸七壯神農經兼束骨針治項強腫痛體重腰癱太乙歌兼絶骨三陰交能治連延腳氣又治心悸虛煩又兼水分陰交蠱脹宜針又合太衝中封治行步艱楚玉龍賦兼陰交治中邪霍亂百證賦治氣上壅又兼陽陵陰陵申脈照海治腳氣及在腰之疾靈光賦治手足上下疾亦治食癖氣塊虛喘宜尋三里中胃中有積針璇璣此穴功亦多又氣海專治五淋又須針三里又治耳內蟬鳴腰欲折須兼五會補瀉之始妙若針肩井須三里不針之時氣未調治腰連胯痛治腳腫腳痛須兼懸鐘陽陵陰陵三陰交太衝行氣並治指頭麻木又髖骨腿疼瀉此穴又兼風府針度淺深更尋三里治膀胱氣未散席弘賦能卻五勞之羸瘦又治冷痹通玄賦治食不充肌捷法耳鳴腰痛先五會後耳門三里又胃停宿食後尋三里起璇璣又兼二間治牙疼頭痛並喉痹又兼期門治傷寒過經不出汗天星祕決肚腹三里留四總穴能除心脅痛腹脹胃中寒腸鳴並泄瀉腿腫膝脛酸傷寒羸瘦損氣蠱及諸般年過三旬後針灸眼光全馬丹陽上巨虛在三里下三寸兩筋骨陷中舉足取之針三分灸三壯甲乙經作針八分又千金云灸以年為壯數主治臟氣不足偏風腳氣腰腿手足不仁足脛酸骨髓冷疼不能久立夾臍腹痛腸中切痛飧泄食不化喘息不能行腹脅支滿狂走此穴主瀉胃中之熱與氣衝三里下巨虛治同條口在三里下五寸下廉上一寸舉足取之針五分灸三壯甲乙經云針八分主治足膝麻木寒酸腫痛跌腫轉筋濕痹足下熱足緩不收不能久立兼衝陽絶骨治足緩難行天星祕訣下巨虛在上廉下三寸兩筋骨陷中蹲地舉足取之針三分灸三壯一曰針八分主治胃中熱毛焦肉脫汗不得出少氣不嗜食暴驚狂言喉痹面無顏色胸脅痛飧泄膿血小腸氣偏風腿痿足不履地熱風風濕冷痹䯒腫足跗不收女子乳癰此穴主瀉胃中之熱與氣衝三里上巨虛同豐隆在下廉下微後斜對絶骨之中針三分灸三壯主治頭痛面腫喉痹不能言風逆癲狂見鬼好笑厥逆胸痛如刺大小便難怠惰腿膝痠痛屈伸不便腹痛肢腫足清寒濕兼上脘刺心疼嘔吐傷寒吐蛔太乙歌兼肺俞治痰嗽又合湧泉關元可治尸勞玉龍賦專治婦人心痛席弘賦兼強間治頭痛難禁解溪在衝陽後一寸五分足跗上繫鞋帶處陷中針五分留五呼灸三壯主治風氣面浮頭痛目眩生翳厥氣上衝喘咳腹脹顛疾煩心悲泣驚瘛轉筋霍亂大便下重股膝䯒腫又瀉胃熱善飢不食食即支滿腹脹及療痎瘧寒熱須兼針厲兌三里解溪商丘出血治腹脹腳跗痛目眩頭疼可灸七壯神農經兼商丘丘墟堪追腳痛玉龍賦兼陽谷治驚悸怔忡百證賦一傳腹虛腫及足脛虛腫灸之效又氣逆發噎將死灸之效衝陽在足跗上五寸正中行高骨間動脈去陷谷二寸針三分留十呼灸三壯刺禁論針跗上中大脈血出不止死即此穴也主治偏風面腫口眼喎斜齒齲傷寒發狂振寒汗不出腹堅大不嗜食發寒熱足痿跗腫或胃瘧先寒後熱喜見日月光得火乃快然者於方熱時針之出血立寒兼條口絶骨治足緩難行天星祕訣陷谷在足面上去內庭二寸足大趾次趾本節後陷中針五分留七呼灸三壯一曰針三分主治面浮腫及水病善噫腸鳴腹痛汗不出振寒痎瘧瘧氣少腹痛或胃脈弦者瀉此則水平而胃氣自盛治水病灸隨年壯千金兼下脘能平腹內腸鳴百證賦內庭在次趾中趾之間腳丫紋盡處針三分留十呼灸三壯甲乙經針二分留二十呼主治四肢厥逆腹滿不得息惡聞人聲振寒咽痛口喎齒齲鼻衄癮疹赤白痢瘧不嗜食一傳主療久瘧不愈並腹脹兼臨泣能理小腹之䐜玉龍賦治腹膨休遲通玄賦三里內庭治肚腹病妙千金治石蠱又大便不通宜瀉此捷徑兼合谷治寒瘧面腫及腸鳴天星祕訣能治四肢厥喜靜惡聞聲癮疹咽喉痛數欠及牙疼瘧疾不思食耳鳴針便清馬丹陽厲兌在足次趾外側端去爪甲如韭葉針一分留一呼灸一壯主治尸厥口噤氣絶狀如中惡心腹滿水腫熱病汗不出寒熱瘧不食面腫喉痹齒齲惡風鼻不利多驚發狂好臥足寒膝臏腫痛與隱白相諧治夢魘不寧百證賦足陽明胃經流注足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外迎香穴入上齒中還出挾口環唇下交承漿穴名卻循頤後下廉出大迎穴名循頰車穴名上耳前過客主人穴名循髮際至額顱其支者從大迎前下人迎穴名循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣衝穴名中其支者起於胃口下循腹裡下至氣衝中而合以下髀關穴名抵伏兔穴名下入膝臏中腿下脛上接處曰膝臏謂膝之蓋骨也下循䯒外廉即上廉下解溪穴也下足跗月面曰跌衝陽穴也入中趾內間陷谷穴其支者下膝三寸而別下入中趾外間內庭穴其支者別跗上入大趾間出其端厲兌穴也自此交入足太陰是動則病灑灑然振寒善伸數欠顏黑顏即額也病至則惡人與火聞木音則惕然而驚心動欲獨閉戶牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥骭即脛之別名是主血所生病者狂瘧濕淫汗出鼻衄口喎唇疹脛腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔䯒外廉足跗上皆痛中指不用氣盛則身以前皆熱其有餘於胃則消穀善飢尿色黃氣不足則身以前皆寒栗胃中寒則脹滿盛者人迎大三倍於寸口虛者人迎反小於寸口也靈樞辰時自迎香穴交於承泣穴上行至頭維對人迎循胸腹下至足趾厲兌穴上入門陽明根於厲兌結於𡗗頁大𡗗頁大者鉗耳也靈樞足陽明胃經左右凡九十穴厲兌二穴在足大趾次趾端外側去爪甲如韭葉足陽明脈之所出為井針入一分可灸一壯銅人內庭二穴在足大趾次趾外間陷中銅人在足次趾與三趾歧骨間陷中入門足陽明脈之所溜為滎針入三分留十呼可灸三壯銅人陷谷二穴在足大趾次趾外間本節後陷中去內庭二寸足陽明脈之所注為輸針入一分留七呼可灸三壯銅人衝陽二穴一名會原在足跗上五寸骨間動脈去陷谷三寸銅人在內庭上五寸骨間動脈入門在足跗上五寸陷者中搖足而得之靈樞足陽明脈之所過為原針入五分留十呼可灸三壯銅人解溪二穴在衝陽後一寸半腕上陷中銅人上衝陽一寸半陷者中靈樞在足腕上系草鞋帶處去內庭上六寸半入門足陽明脈之行為經針入五分留五呼可灸三壯銅人豐隆二穴在外踝上八寸下廉䯒骨外廉間陷中足陽明絡別走太陰針入三分可灸三壯銅人下巨虛二穴一名下廉在上廉下三寸銅人在三里下六寸當舉足取之入門在上廉下三寸兩筋兩骨罅陷宛宛中蹲坐取之資生針入八分可灸三壯銅人條口二穴在下廉上一寸上廉下一寸銅人在三里下五寸舉足取之入門針入三分禁不可灸入門上巨虛二穴一名上廉在三里下三寸銅人在膝犢鼻下䯒外廉六寸舉足取之在三里下三寸兩筋兩骨罅陷宛宛中資生針入八分可灸三壯一云隨年數為壯銅人三里二穴在膝下三寸䯒骨外大筋內宛宛中銅人在膝下三寸陷中䯒骨外廉兩筋肉分間內經在犢鼻下三寸䯒骨外廉分入肉間入門以手約膝取中指梢盡處是穴得效深則足趺陽脈不見按之太衝脈不動是正穴資生足陽明脈之所入為合針入一寸可灸七壯一云三壯銅人明堂云人年三十以上若不灸三里令氣上衝目三里下三寸為上廉復下三寸為下廉大腸屬上廉小腸屬下廉足陽明胃脈也然則是大腸小腸皆屬於胃也靈樞點三里穴但按趺陽脈不應方是正穴丹心犢鼻二穴在膝臏下䯒骨上骨解大筋中銅人膝臏下䯒挾解大筋中資生在膝頭眼外側大筋陷中針入六分禁不可灸入門梁丘二穴在膝上二寸兩筋間足陽明之郤針入三分可灸三壯銅人陰市二穴一名陰鼎在膝上三寸伏兔下陷中銅人在膝內輔骨後大筋下小筋上屈膝得之資生在膝上當伏兔下行二寸臨膝取之綱目針入三分留七呼禁不可灸銅人伏兔二穴一名外丘在膝上六寸起肉是一云在膝蓋上七寸銅人在膝髀罅上六寸向里正跪正坐而取之入門針入五分禁不可灸銅人髀關二穴在膝上伏兔後交紋中銅人在膝上伏兔後胯骨橫紋中入門針入六分可灸三壯銅人氣衝二穴一名氣街在歸來下鼠蹊上一寸動脈中銅人在腹臍下橫骨兩端鼠蹊上資生在天樞下八寸動脈入門可灸七壯禁不可針銅人歸來二穴在水道下二寸銅人在天樞下七寸入門針入八分可灸五壯銅人水道二穴在大巨下三寸天樞下五寸針入二寸五分可灸五壯銅人大巨二穴在外陵下一寸針入五分可灸五壯銅人外陵二穴在天樞下一寸針入八分可灸五壯銅人天樞二穴一名長溪一名谷門大腸之募也在肓俞旁一寸五分夾臍二寸銅人魂魄之舍不可針合臍相去各三寸資生平臍旁各三寸入門針入八分留七呼可灸百壯銅人滑肉門二穴在太乙下一寸針入八分可灸五壯銅人大乙二穴在關門下一寸針入八分可灸五壯銅人關門二穴在梁門下一寸針入八分可灸五壯銅人粱門二穴在承滿下一寸針入八分可灸五壯銅人承滿二穴在不容下一寸銅人夾巨闕兩旁各一寸半資生針入八分可灸五壯銅人不容二穴在幽門旁相去一寸五分銅人