三分千金連囟會療頭風百證賦天柱在玉枕後二寸少去中行風府七分去風池六分針二分留六呼灸三壯一曰針五分禁灸主治頭旋腦痛鼻塞淚出項強肩背痛足不任身目瞑不欲視連養老治目中䀮䀮又連束骨治項強多惡風百證賦大杼在距中行陶道二寸微低二分針二分留七呼灸五壯七壯一曰禁灸非大急不可灸也主治傷寒汗不出腰脊項背強痛不得臥喉痹煩滿痎瘧頭痛咳嗽身熱目眩癲疾筋攣瘛瘲膝痛不可屈伸凡針瘧疾脈滿大者針此並譩嘻穴出血隨人肥瘦針之不已針委中風門立已大杼若連長強尋小腸氣痛即行針席弘賦風門在二椎下兩旁各去脊中二寸針五分留七呼灸五壯主治傷寒頭痛項強目瞑鼽嚏胸中熱嘔逆上氣喘臥不安身熱黃疸癰疽發背此穴能瀉一身熱氣常灸之永無癰疽瘡疥等患傷風咳嗽頭痛鼻流清涕可灸十四壯及治頭疼風眩鼻衄不止神農經上氣短氣咳逆胸背徹痛灸百壯千金肺俞在三椎下去脊中各二寸針三分留七呼灸三壯一云灸百壯素問曰針中肺三日死主治五勞傳尸骨蒸肺風肺痿咳嗽嘔吐上氣喘滿虛煩口乾目眩支滿汗不出腰脊強痛背僂如龜寒熱癭氣黃疸此穴主瀉五臟之熱與五臟俞治同治咳嗽吐血唾紅骨蒸虛勞可灸十四壯神農經治吐血唾血上氣咳逆喉痹灸隨年壯癭腫上氣短氣灸百壯又盜汗寒熱惡寒灸隨年壯針五分又氣短不語灸百壯又治水注口中湧水出灸肺俞及三陰交隨年壯千金兼豐隆治痰嗽玉龍賦兼天突治咳嗽連聲百證賦同陶道身柱膏肓治虛損五勞七傷緊要法乾坤生意厥陰俞在四椎下去脊中二寸正坐取之針三分灸七壯主治咳逆牙痛心痛結胸嘔吐煩悶主胸中膈氣積聚好吐灸隨年壯千金心俞在五椎下去脊中二寸正坐取之針三分留七呼主治偏風半身不遂食噎積結寒熱心氣悶亂煩滿恍惚心驚汗不出中風偃臥不得冒絶發癇悲泣嘔吐咳血發狂健忘此穴主瀉五臟之熱與五贓俞同小兒氣不足者數歲不能語可灸五壯艾炷如麥粒神農經兼腎俞治腰腎虛乏之夢遺玉龍賦兼神道治風癇常發自寧百證賦治憂噎捷徑一傳主療心虛遺精盜汗補之膈俞在七椎下去脊中二寸正坐取之針三分留七呼灸三壯一云灸至百壯主治心痛周痹膈胃寒痰暴痛心滿氣急吐食反胃痃癖五積氣塊血塊咳逆四肢腫痛怠惰嗜臥骨蒸喉痹熱病汗不出食不下腹脅脹滿此血會也諸血病者皆宜灸之如吐血衄血不已虛損昏暈血熱妄行心肺二經嘔血臟毒便血不止顱脹脅腹滿灸百壯三報之又治吐逆不得食今日食明曰吐灸百壯千金肝俞在九椎下去脊中二寸針三分留六呼灸三壯素問曰針中肝五日死主治氣短咳血多怒脅肋滿悶咳引兩脅脊背急痛不得息轉側難反折上視驚狂鼽衄眩暈痛循眉頭黃疸鼻酸熱病後目中出淚眼目諸疾熱痛生翳或熱病瘥後因食五辛患目嘔血或疝氣筋痙相引轉筋入腹此穴主瀉五臟之熱與五臟俞治同吐血酸削灸百壯又胸滿心腹積聚疼痛灸百壯又氣短不語灸百壯千金目昏血溢肝俞辨其虛實玉龍賦兼命門能使瞽者見秋毫標幽賦兼少澤可治攀睛百證賦一傳治氣痛項癧吐酸膽俞在十椎下去脊中二寸針五分留七呼灸三壯素問曰針中膽一日半死主治頭痛振寒汗不出腋下腫心腹脹滿口乾苦咽痛嘔吐翻胃食不下骨蒸勞熱目黃胸脅不能轉側兼陽綱可治目黃百證賦兼膈俞治勞噎捷徑脾俞在十一椎下去脊中各二寸針三分留七呼灸三壯素問曰針中脾十日死主治痃痹積聚脅下滿痎瘧寒熱黃疸腹脹痛吐食不食飲食不化或食飲倍多煩熱嗜臥身日羸瘦泄痢善欠體重四肢不收此穴主瀉五臟之熱與五臟俞同食不消化泄痢不作肌膚脹滿水腫灸隨年壯三報之又尿血白濁虛勞灸百壯千金兼聽宮能祛心下之悲悽又兼膀胱俞治脾虛穀食不消百證賦治思噎食噎捷徑一傳治水腫鼓脹氣滿泄瀉年久不止及久年積塊脹痛胃俞在十二椎下去脊中二寸針三分留七呼灸三壯一曰灸隨年壯主治胃寒吐逆翻胃霍亂腹脹支滿肌膚疲瘦腸鳴腹痛不嗜食脊痛筋攣小兒羸瘦食少不生肌肉及小兒痢下赤白秋末脫肛肚疼不可忍艾炷如大麥兼魂門治胃冷食不化百證賦一傳治水腫鼓脹氣膈不食泄瀉所久不止多年積塊三焦俞在十三椎下去脊中二寸針五分灸三壯一曰三分五壯主治傷寒身熱頭痛吐逆肩背急腰脊強不得俯仰臟腑積聚脹滿膈塞不通飲食不化羸瘦水穀不化腹痛下痢腸鳴目眩少腹堅大如盤盂胸腹脹滿飲食不消婦人癥聚瘦瘠灸三焦俞百壯三報之仍灸氣海百壯又主五臟六腑積聚心腹滿腰脊痛吐逆寒熱小便不利灸隨年壯又治尿血灸百壯千金腎俞在十四椎下去脊中二寸與臍平針三分留七呼灸三壯一曰灸以年為壯素問曰針中腎六日死主治虛勞羸瘦面目黃黑耳聾腎虛水臟久冷腰痛夢遺精滑腳膝拘急身熱頭重振寒心腹䐜脹兩脅滿痛引少腹少氣溺血便濁淫濼赤白帶下月經不調陰中痛五勞七傷虛憊無力足寒如冰洞泄食不化身腫如水男女久積氣痛變成勞疾此穴主瀉五臟之熱與五臟俞同腎風虛寒灸百壯又小便濁夢遺失精灸百壯又腎俞主五臟虛勞少腹弦急脹熱灸五十壯老少減之若虛冷可百壯橫三間寸灸之又消渴口乾同腰目灸之又尿血灸百壯又百病水腫灸百壯千金兼命門治老人便多又兼心俞治腰腎虛乏之夢遺玉龍賦能瀉盡腰股之痛通玄賦一傳治色欲過度虛腫耳痛耳鳴大腸俞在十六椎下去脊中二寸伏而取之針三分留六呼灸三壯主治脊強不得俯仰腰痛腹脹繞臍切痛腸澼瀉痢食不化大小便不利脹滿雷鳴灸百壯三報之千金治大便病靈光賦小腸俞在十八椎下去脊中二寸伏而取之針三分留六呼灸三壯主治膀胱三焦津液少便赤不利淋瀝遺尿小腹脹滿㽱痛瀉痢膿血腳腫心煩短氣五痔疼痛婦人帶下泄注五痢便膿血腹痛灸百壯又主三焦膀胱寒熱津液赤白洞泄腰脊痛小便不利婦人帶濁灸五十壯又消渴口乾不可忍者灸百壯橫三間寸灸之千金治小便病靈光賦膀胱俞在十九椎下去脊二寸伏而取之針三分留六呼灸三壯一云七壯主治小便赤澀遺尿泄痢腰脊腹痛陰瘡腳膝寒冷無力女子癥瘕兼脾俞治脾虛穀食不消百證賦中膂內俞在二十椎下去脊中二寸夾脊起肉間伏而取之針三分留六呼灸三壯主治腎虛消渴腰脊強痛不得俯仰腸冷赤白痢疝痛汗不出脅腹脹痛兼陶道治歲熱時行百證賦主腰痛夾脊膂上下按之從後項至此穴痛者灸之立愈捷徑白環俞在二十一椎下去脊中二寸伏而取之針五分灸三壯甲乙經云針八分得氣則瀉瀉訖多補之不可灸主治腰脊痛不得坐臥疝痛手足不仁二便不利溫瘧筋攣痹縮虛熱閉塞一云主治夢遺白濁腎虛腰痛先瀉後補赤帶瀉之白帶補之月經不調亦補之兼委中治背連腰痛大驗百證賦上髎在陽關下五分去中行一寸外直小腸俞針三分留十呼灸七壯主治大小便不利嘔逆腰膝冷痛寒熱瘧鼻衄婦人絶嗣陰中癢痛陰挺出赤白帶下次髎在上髎下直膀胱俞針三分留七呼灸七壯一曰三壯主治大小便淋赤不利心下堅脹腰痛足輕疝氣下墜引陰痛不可忍腸鳴泄瀉赤白帶下中髎在次髎下直中膂俞針二分留七呼灸三壯主治五勞七傷二便不利腹脹飧泄婦人少子帶下月經不調下髎在中髎下一寸二分針二分留十呼灸三壯一曰針二寸主治腸鳴泄瀉二便不利下血腰痛引小腹急痛女子淋濁不禁濕熱濕寒下髎定百證賦會陽長強外開二寸針二分灸五壯一曰針八分主治腹中寒氣泄瀉腸澼便血久痔陽氣虛乏陰汗濕附分在二椎下兩旁相去脊中各開三寸正坐取針三分灸五壯甲乙經作針八分主治肘臂不仁背拘急風客腠理頸痛不得回顧魄戶在三椎下去脊中各三寸半針五分灸五壯一曰針三分灸百壯主治虛勞肺痿肩膊胸背連痛五尸走疰項強喘逆煩滿嘔吐此穴主瀉五臟之熱與五臟俞同治虛勞發熱可灸十四壯神農經兼膏肓治勞瘵傳尸百證賦治體熱勞嗽標幽賦膏肓俞在四椎下五椎上去脊中各三寸半先令病人正坐屈脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂動乃從胛骨上角摸索至胛骨下頭其間當有四肋三間依胛骨之際相去骨際如容側指許按其中一間空處自覺牽引肩中是其穴也灸七七壯至百壯千壯灸後當灸足三里以引火實下主治百病無所不療虛羸瘦損五勞七傷諸病夢遺失精上氣咳逆痰火發狂健忘胎前産後可灸二七至七七壯兼魄戶治勞瘵傳尸百證賦治背脊痛風勞一切諸病靈光賦兼陶道身柱肺俞治虛損五勞七傷緊要之穴乾坤生意神堂在五椎下去脊中各三寸半針三分灸五壯主治腰脊強痛不可俯仰灑淅寒熱胸腹滿逆時噎譩嘻在肩膊內廉六椎下去脊各三寸半正坐取之針六分留七呼灸五壯一曰二七壯至百壯主治大風熱病汗不出勞損不得臥溫瘧久不愈胸腹脹悶氣噎肩背脅肋痛急目痛咳逆鼻衄忌莧菜白酒多汗瘧病灸五十壯千金膈關在七椎下去脊中各三寸半陷中正坐開肩取之針五分灸五壯主治背痛惡寒脊強嘔吐飲食不下胸中噎悶大小便不利此亦血會治諸血病魂門在九椎下相去脊中各三寸半陷中正坐取之針五分灸三壯主治尸厥走疰胸背連心痛食不下腹中雷鳴大便不節小便黃赤此穴主瀉五臟之熱與五臟俞同兼胃俞治胃冷食難化百證賦筋攣骨痛者補此標幽賦陽綱在十椎下去脊中三寸半陷中正坐取之針五分灸三壯七壯主治腸痛食不下小便澀身熱消渴目黃腹脹泄瀉兼膽俞治目黃百證賦意舍在十一椎下去脊中三寸半陷中正坐取之針五分灸七壯一云五十壯至百壯主治背痛腹脹大便泄小便黃嘔吐惡風寒飲食不下消渴目黃此穴主瀉五臟之熱與五臟俞同兼中府能除脹滿噎塞胸背脅痛惡寒嘔吐百證賦胃倉在十二椎下去脊中各三寸半正坐取之針五分灸五壯一云五十壯主治腹滿水腫食不下惡寒背脊痛不可俯仰肓門在十三椎下去脊中各三寸半又肋間陷中前與鳩尾相直正坐取之針五分灸三壯主治心下痛大便堅婦人乳痛有餘志室在十四椎下去脊中各三寸半陷中正坐取之針五分灸三壯七壯主治陰腫陰痛失精小便淋瀝背脊強腰脅痛腹中堅滿霍亂吐逆不食大便難此穴主瀉五臟之熱與五臟俞同胞肓在十九椎下去脊中各三寸半陷中伏而取之針五分灸五壯七壯主治腰脊痛惡寒小腹堅腸鳴大小便不利秩邊在二十一椎下去脊中各三寸半陷中伏而取之針五分灸三壯主治腰痛五痔小便赤澀承扶在尻臀下股陰上約紋中針七分留七呼灸三壯甲乙經作針二寸主治腰脊相引如解久痔臀腫大便難胞寒小便不利殷門在承扶下五寸三分針七分留七呼灸三壯主治腰脊不可俯仰惡血流注外股腫浮郤在殷門下一寸三分針五分灸三壯主治霍亂轉筋小腹膀胱熱大便結股外筋急髀樞不仁委陽在浮郤下一寸七分針七分留五呼灸三壯主治腰脊腋下腫痛不可俯仰引陰中不得小便胸滿身熱瘛瘲癲疾小腹滿飛尸遁注痿厥不仁三焦下輸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之本輸篇兼天池穴腋腫針而速散百證賦委中在膕中央約紋動脈陷中伏臥屈足取之針五分留七呼灸三壯一曰禁灸春月勿令出血蓋太陽合腎腎王於冬水衰於春故春無令出血主治大風眉發脫落太陽瘧從背起先寒後熱熇熇然汗出難已頭重轉筋腰脊背痛半身不遂遺溺小腹堅風痹髀樞痛膝痛足軟無力凡腎與膀胱實而腰痛者針出血妙虛者不宜針慎之此穴主瀉四肢之熱委中者血郤也凡熱病汗不出小便難衄血不止脊強反折瘛瘲癲疾足熱厥逆不得屈伸取其經血立愈虛汗盜汗補委中太乙歌合人中除腰脊痛閃之難制又兼居髎環跳除腿風濕痛玉龍賦兼白環俞治背連腰痛已試百證賦委中崑崙治腰背痛相連千金腰背委中求四總治腰痛不能舉酸沉引脊梁風癇及轉筋疼痛難移展風痹復無常熱病不能當膝頭難伸屈針入即安康馬丹陽合陽在委中下四寸大些針六分灸五壯主治腰脊強引腹痛陰股熱䯒酸腫寒疝偏墜女子崩帶不止兼交信治女子少氣下血百證賦承筋在合陽下二寸灸三壯禁針主治寒痹腰背拘急腋腫大便閉五痔腨酸腳跟痛引少腹轉筋霍亂鼽衄霍亂轉筋灸五十壯千金承山在委中下八寸半針七分灸五壯至七七壯然灸不及針主治頭熱鼻衄寒熱癲疾疝氣腹痛痔腫便血腰背痛膝腫脛酸跟痛霍亂轉筋戰栗不能行立凡有邪熱者可瀉之灸轉筋隨年壯神驗霍亂灸百壯千金兼長強灸痔最妙玉龍賦陰陵泉治心胸滿兼此穴而飲食自思又兼魚際崑崙治轉筋目眩立消席弘賦治轉筋並久痔靈光賦針長強兼承山善主腸風新下血百證賦兼內踝尖治轉筋並眼花又兼陰交治胸隔痞滿自喜飲食天星祕訣善治腰疼痛痔疾大便難腳氣並膝腫兩足盡寒酸展轉成時疫戰栗瘧憎寒霍亂及轉筋針之立便安馬丹陽飛揚在崑崙上五寸五分針三分灸三壯主治痔痛不得起坐腳痠腫不能立歷節風不得屈伸癲疾寒瘧頭目眩逆氣瘧實則腰背痛虛則鼻衄飛揚主之千金兼支正可治目眩百證賦附陽在崑崙上三寸針五分留七呼灸三壯一云七壯主治霍亂轉筋腰痛不能立髀樞股䯒痛痿厥風痹不仁頭重䪼痛或時有寒熱四肢不舉屈伸不能崑崙在外踝後五分跟骨上陷中細動脈應手針三分留七呼灸三壯主治腰尻腳氣足腨腫痛不能步立頭痛鼻衄肩背拘急咳喘目眩陰腫痛産難胞衣不下小兒發癇瘛瘲兼申脈太溪善療足腫之迍玉龍賦能住喘愈腳氣靈光賦治腰尻痛足痛不能履地肩背拘急可灸七壯又治小兒陰腫可灸三壯炷如小麥神農經兼魚際承山治轉筋目眩立消席弘賦胞衣不出針足太陽入四分穴在外踝下後一寸宛宛中者意必此穴又瘧多汗腰痛不能俯仰目如脫項似拔崑崙主之又兼委中治腰背痛相連千金治偏風捷徑治轉筋腰尻痛髆重更連陰頭痛脊背急暴喘滿衝心舉步行不得動足即呻吟若欲求安樂須尋此穴針又增治目䀮䀮如脫頭熱鼻衄肚脹痛不得息霍亂大便泄風癇口噤不開小兒陰腫頭眩轉筋吐逆尸厥中惡膝蓋暴痛馬丹陽僕參在崑崙直下二寸大些腳跟邊上針三分留七呼灸七壯主治腰痛足痿不收足跟痛霍亂轉筋吐逆尸厥癲癇狂言見鬼膝痛後跟痛在僕參求靈光賦申脈在金門直下腳邊上針三分留七呼灸三壯主治風眩癲疾腰腳痛膝䯒寒酸不能坐立如在舟車中氣逆腿足不能屈伸婦人氣血痛腳氣紅腫瀉之若麻木無力先瀉後補治腰痛可灸五壯神農經兼太溪崑崙善療足腫之迍玉龍賦兼金門治頭風頭痛標幽賦能除寒與熱偏正頭風及心驚耳鳴鼻衄胸中滿遇麻木者虛當補逢疼痛者瀉而迎攔江賦陽蹻陰蹻及陽陵陰陵四穴治腳氣取之又兼三里同治腳氣亦去在腰諸疾靈光賦此名鬼路當在第五次下火針治百邪癲狂千金方金門在外踝正下針一分灸三壯一云針三分灸七壯炷如小麥主治霍亂轉筋尸厥癲癇疝氣膝䯒酸不能立小兒張口搖頭身反折兼丘墟可醫轉筋百證賦兼申脈治頭風頭痛通玄賦京骨在申脈前三寸針三分留七呼灸七壯主治腰脊痛如折髀不可曲項強不能回顧筋攣善驚痎瘧寒熱目眩內眥赤爛頭痛鼻衄癲癇狂走束骨在京骨前二寸小趾外側大孤拐後針三分留三呼灸三壯主治腸澼泄瀉瘧痔癲癇發背癰疔頭痛目眩內眥赤痛耳聾腰膝痛項強不可回顧兼三里針治項強腫痛體重腰癱太乙歌連天柱治項強多惡風百證賦治風熱胎赤兩目眥爛秦承祖通谷在小趾外側本節前孤拐前腳邊紋頭針二分留五呼灸三壯主治頭痛目眩項痛鼻衄善驚目䀮䀮結積留飲食多下化失欠諸結積留飲澼囊胸滿飲食不消灸通谷五十壯千金至陰在足小趾外側去爪甲角如韭葉針一分留五呼灸三壯五壯主治風寒頭重鼻塞目痛生翳胸脅痛轉筋寒瘧汗不出煩心足下熱小便不利失精脈痹從足小趾起牽引上下兼屋翳治遍身癢痛之疾百證賦專治腳膝腫席弘賦又治婦人橫産手先出諸符藥不效為灸右腳小趾尖三壯炷如小麥下火立産足太陽膀胱經流注足太陽之脈起於目內眥睛明穴上額交巔上百會穴其支者從巔頂為中頂前曰囟頂後曰腦頂左右曰角至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中膕謂膝解之後屈腳之中也即委中穴其支者從膊內左右別下貫胛胛謂兩胛骨下豎起肉也挾脊內過脾樞髀骨節也即環跳穴循髀外後廉下合膕中以下貫腨內足肚曰腨出外踝之後崑崙穴循京骨穴名也至小趾外側端至陰穴也自此交入足少陰是動則病沖頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結腨如裂是謂踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼻衄項背腰尻膕腨腳皆痛小趾不用盛者人迎大再倍於寸口虛者人迎反小於寸口也靈樞申時自聽宮交與睛明循頭頸下背腰臀腿至足至陰穴止入門太陽根於至陰結於命門命門者目也靈樞足太陽膀胱經左右凡一百二十六穴至陰二穴在足小趾端外側去爪甲角如韭葉足太陽脈之所出為井針入一方留五呼可灸二壯銅人通谷二穴在足小趾本節之前外側陷中足太陽脈之所溜為滎針入二分留五呼可灸三壯銅人束骨二穴在足小趾本節之後外側陷中足太陽脈之所注為輸針入二分留五呼可灸三壯銅人京骨二穴在足外側大骨下赤白肉際陷中按而取之足太陽脈之所過為原針入三分留七呼可灸三壯銅人金門二穴一名關梁在足外踝下骨空陷中足太陽郤針入三分可灸三壯銅人申脈二穴在外踝下陷中容爪甲白肉際銅人外踝下五分資生陽蹻脈所生針入三分禁不可灸銅人僕參二穴一名安邪在足後跟骨下陷中拱足得之針入三分可灸七壯銅人崑崙二穴在足外踝後跟骨上陷中銅人在跟骨上陷中細脈動應手資生在外踝下一寸大筋下資生足太陽脈之所行為經針入五分留十呼可灸五壯靈樞附陽二穴在外踝上三寸飛陽下銅人陽蹻之郤太陽前少陽後筋骨間綱目針入五分留七呼可灸三壯銅人飛陽二穴一名厥陽在外踝上七寸骨後針入五分可灸三壯銅人承山二穴一名魚腹一名腸山一名肉柱在鋭腨腸下分肉間陷中銅人在腨股分肉間拱足舉地一尺取之入門在腿肚下分肉間資生針入七分可灸五壯銅人承筋二穴一名腨腸一名直腸在腨腸中央銅人在脛後腨股中央從腳跟上七寸入門可灸三壯禁不可灸入門合陽二穴在膝約紋中央下三寸一云二寸在直委中下一寸入門針入五分可灸五壯銅人委中二穴在膕中央約紋中動脈陷中銅人在膝腕內膕橫紋中央動脈入門委中者血郤也在膕中央可出血痼疹皆愈資生在曲瞅內兩筋兩骨中宛宛又云膝解後曲腳中背面取之資生又於四畔紫脈上出血如藤塊者不可出血血不止令人夭綱目宜針入一寸半一云五分留七呼禁不可灸綱目委陽二穴在承扶下六寸屈伸取之銅人三焦下輔腧也在足太陽後出於膕中外廉兩筋間資生在膝腕橫紋尖外廉兩筋間委中外二寸屈伸取之入門針入七分可灸三壯銅人銅人云委陽在足太陽前少陽之後出於膕中外廉兩筋間承扶下六寸此足太陽之別絡手少陽經也以今經文考之當云一尺六寸又按經文取委陽者屈伸而索之取陽陵泉者正豎膝與之齊下至委陽之前取之是知委者曲也委中即兩膕之中央委陽即曲瞅之陽分約紋之盡處兩筋間推其分野則正當太陽少陽之間內外廉之界故曰太陽之前少陽之後膕中外廉也其穴正在約紋兩筋之間只正膝與之齊陽陵泉正對其穴當為一尺六寸無疑矣綱目浮郤二穴在委陽上一寸展膝得之針入五分可灸三壯銅人殷門二穴在承扶下六寸針入五分留七呼禁不可灸銅人承扶二穴一名肉郤一名陰關一名皮部在尻臀下股陰衝上約紋中央銅人在尻臀下陰股上橫紋中入門針入五分禁不可灸入門秩邊二穴在第二十椎下兩旁相去各三寸陷中伏而取之針入五分可灸三壯銅人挾脊四寸是除脊則各一寸半也大杼下諸穴皆當除脊骨一寸則兩旁相去各一寸五分為正大凡脊骨廣一寸當除之資生胞肓二穴在第十九椎下兩旁相去各三寸伏而取之針入五分可灸五七壯銅人志室二穴在第十四椎下兩旁相去各三寸陷中針入五分可灸五壯銅人肓門二穴在第十三椎下兩旁相去各三寸叉肋間與鳩尾相直針入五分灸三十壯銅人胃倉二穴在第十二椎下兩旁相去各三寸針入五分可灸五七壯銅人意舍二穴在第十一椎下兩旁相去各三寸陷中正坐取之針入五分可灸五壯至百壯止銅人陽綱二穴在第十椎下兩旁相去各三寸陷中正坐取之針入五分可灸五壯銅人魂門二穴在第九椎下兩旁相去各三寸陷中正坐取之針入五分可灸五壯銅人膈關二穴在第七椎下兩旁相去各三寸陷中正坐取之針入五分可灸五壯銅人譩嘻二穴在肩膊內廉第六椎下兩旁相去各三寸正坐取之以手重按之病者言譩嘻是穴也銅人在膊內廉以手壓之令病人抱肘作譩嘻之聲則指下動矣入門針入六分留三呼瀉五吸可灸二七壯至一百壯止銅人神堂二穴在第五椎下兩旁相去各三寸陷中正坐取之針入三分可灸五壯銅人膏肓俞二穴在第四椎下兩旁相去各三寸取穴法詳見下可灸百壯至五百壯若能用心得正穴灸之無疾不愈銅人千金方於諸穴治病各分主之獨於膏肓三里湧泉特云治雜病蓋是三穴無所不治也資生魄戶二穴一名魂戶在第三椎下兩旁相去各三寸正坐取之銅人在三節外三寸入門針入五分可灸五壯一云可灸七壯至百壯綱目附分二穴在第二椎下附項內廉兩旁相去各三寸銅人在第二節外三寸附項內廉陷中正坐取之入門針入五分得氣即瀉日可灸七壯至百壯銅人會陽二穴一名利機在陰尾骶骨兩旁銅人在陰尾骨外各開一寸半入門針入八分可灸五壯銅人下髎二穴在第四空挾脊陷中針入二寸留十呼可灸三壯入門嘗見死人骸腰脊骨盡處有骨廣如人面大而四穴分兩行了然通透乃是八髎穴也中髎二穴在第三空挾脊陷中針入二寸留十呼可灸三壯入門次髎二穴在第二空挾脊陷中針入二寸可灸三壯入門上髎二穴在第一空腰髁下一寸挾脊陷中銅人在腰髁骨下第一空挾脊兩旁陷中餘三髎少斜上闊下狹針入一寸可灸六壯入門白環俞二穴在第二十一椎下兩旁相去各一寸五分銅人取如腰戶法挺杖伏地端身兩手相重支額縱息令皮膚俱緩乃取其穴綱目針入八分得氣先瀉後補禁不可灸銅人中膂內俞二穴一名脊內俞在二十椎下兩旁相去各一寸五分挾脊起肉間伏而取之針入三分留十呼可灸三壯銅人膀胱俞二穴在第十九椎下兩旁相去各一寸五分針入三分留六呼可灸三壯銅人小腸俞二穴在第十八椎下兩旁相去各一寸五分針入三分留六呼可灸三壯銅人大腸俞二穴在第十六椎下兩旁相去各一寸五分針入三分留六呼可灸三壯銅人腎俞二穴在第十四椎下兩旁相去各一寸五分與臍相對針入三分留七呼可灸隨年為壯銅人三焦俞二穴在第十三椎下兩旁相去各一寸五分針入五分留七呼可灸三壯銅人胃俞二穴在第十二椎下兩旁相去各一寸五分針入三分留七呼可灸隨年為壯數銅人脾俞二穴在第十一椎下兩旁相去各一寸五分針入三分留七呼可灸七壯銅人膽俞二穴在第十椎下兩旁相去各一寸五分正坐取之針入五分可灸三壯銅人肝俞二穴在第九椎下兩旁相去各一寸五分針入三分留六呼可灸三壯銅人膈俞二穴在第七椎下兩旁相去各一寸五分針入三分留七呼可灸三壯銅人心俞二穴在第五椎下兩旁相去各一寸五分針入三分留七呼得氣即瀉禁不可灸銅人厥陰俞二穴在第四椎下兩旁相去各一寸五分針入三分可灸七壯銅人肺俞二穴在第三椎下兩旁相去各一寸五分銅人肺俞與乳相對引繩度之資生以搭手左取右右取左當中指末是穴針入五分留七呼可灸一百壯止銅人風門二穴一名熱府在第二椎下兩旁相去各一寸五分針入五分留七呼可灸五壯今附云若頻刺泄諸陽熱氣背永不發癰疽銅人大杼二穴在第一椎下兩旁相去各一寸五分針入五分可灸七壯一云禁灸銅人天柱二穴在挾項後髮際大筋外廉陷中銅人在頸大筋外挾後髮際陷中針入五分可灸三壯入門玉枕二穴在絡卻後一寸五分挾腦戶旁一寸三分起肉枕骨上入髮際上三寸可灸三壯禁不可針銅人絡卻二穴一名強陽又名腦蓋在通天後一寸五分可灸三壯禁不可針銅人通天二穴一名天伯在承光後一寸五分針入三分留七呼可灸三壯銅人承光二穴在五處後一寸五分針入三分禁不可灸銅人五處二穴在上星旁一寸五分針入三分留七呼可灸三壯銅人曲差二穴入前髮際在挾神庭旁一寸五分針入二分可灸三壯銅人攢竹二穴一名始光一名光明一名圓柱在兩眉頭陷中針入一分留三呼瀉五吸禁不可灸宜以細三稜針刺之宣泄熱氣三度刺目大明銅人睛明二穴一名淚孔在目內眥頭外一分銅人在目內眥紅肉陷中入門針入一寸五分留三呼禁不可灸銅人明堂云針入一分半蓋面部宜淺刺是一分半為正銅人誤也資生
