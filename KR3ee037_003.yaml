body:
  text: 卷三十二經脈流注腧穴十二經者手三陰手三陽足三陽足三陰合為十二經也節之交三百六十五會所言節者神氣之所遊行出入也非皮肉筋骨也又曰神氣者正氣也神氣之所遊行出入者流注也井滎輸經合者本腧也靈樞十二經一脈也略為十二分而已也東垣手太陰肺經共十一穴中府在周榮上二寸少外開三分去中行六寸針三分留五呼灸三壯五壯主治肺急胸滿喘逆善噎食不下肺膽寒熱咳嘔膿血肺風面腫汗出肩息背痛涕濁喉痹少氣不得臥飛尸遁注癭瘤此穴主瀉胸中之熱其治多與大杼缺盆風府同身體煩熱針中府上氣咳逆短氣氣滿食不下灸五十壯千金同意舍能治胸滿哽噎百證賦雲門在巨骨穴下四寸微向內橫氣戶二寸璇璣旁六寸大些針三分灸五壯針太深令人逆息甲乙灸五十壯千金主治傷寒四肢熱不已咳逆短氣上衝心胸脅肋煩滿徹痛喉痹癭氣臂不得舉此穴主瀉四肢之熱其治與肩髃委中腰俞大同病癭上氣胸滿灸百壯千金天府距腋下三寸在臂上前廉直對尺澤相距七寸半針四分留三呼禁灸灸之令人氣逆主治暴痹內逆肝邪相搏卒中惡風邪氣血溢口鼻飛尸惡注鬼語悲泣善忘喘息不得安臥痎瘧寒熱目痃癭氣身重嗜臥不自覺灸五十壯針三分補之病癭惡氣灸五十壯千金兼合谷可追鼻中衄血百證賦俠白在尺澤上五寸大些針四分留三呼灸五壯主治心痛氣短乾嘔煩滿尺澤在肘中約紋上屈肘橫紋筋骨罅中動脈應手厥陰前直寸口針三分留三呼灸三壯五壯甄權云不宜灸主治嘔吐上氣喉痹鼓頷心煩身痛不得汗舌乾咳唾膿血心痛氣短肺積息賁痎瘧汗出中風肩背痛灑淅寒熱風痹肘攣四肢腫痛不得舉脅痛腹脹小便數溺色變遺矢無度面白善嚏悲愁不樂及小兒慢驚風可灸一壯邪病四肢重痛諸雜候尺澤主之一名鬼堂嘔吐上氣灸三壯七壯氣短不語灸百壯千金理筋急兼曲池療肘臂攣痛玉龍賦吐血定喘須補此穴靈光賦治五般肘痛又須針清冷淵以收功席弘賦孔最在腕上七寸尺澤下三寸半針三分留三呼灸五壯主治熱病汗不出灸三壯即汗出及咳逆肘臂痛屈伸難吐血失音頭痛咽痛列缺在腕後一寸五分行向外針二分留三呼灸三壯慎酒面生冷等物主治偏風口眼喎斜手肘痛無力半身不遂口噤不開痎瘧寒熱煩躁咳嗽喉痹嘔沫縱唇健忘驚癇善笑妄言妄見面目四肢癰腫小便熱痛實則肩背暴腫汗出虛則肩背寒栗少氣不足以息四肢厥逆瘛瘲尸厥若患偏風灸至百壯若患腕勞灸七七壯甚妙男子陰中疼痛尿血精出灸五十壯千金兼太淵治咳嗽風痰玉龍賦頭部痛須尋之痰涎壅塞咽乾宜此攔江賦氣刺兩乳求太淵未應須瀉此穴偏正頭痛求此又須重瀉太淵無不應席弘賦堪治咳嗽寒痰通玄賦頭項須尋列缺四總穴後溪並列缺治胸項有痛千金善療偏頭患遍身風痹麻痰涎頻上壅口噤不開牙若能明補瀉應手疾如拿馬丹陽經渠在腕後五分居寸脈上針三分留三呼禁灸灸則傷人神明主治痎瘧寒熱胸背拘急膨脹喉痹咳逆上氣數欠傷寒熱病汗不出心痛嘔吐兼大都治熱病汗不出百證賦太淵在寸口前橫紋上與經渠甚近針二分留二呼灸三壯主治胸痹氣逆咳嗽嘔噦飲水肺脹喘息不休噫氣咳血心痛咽乾煩躁狂言不得臥目痛生翳赤筋口噼缺盆痛肩背痛引臂膊溺色變遺矢無度治牙痛手腕無力疼痛可灸七壯神農經兼列缺治咳嗽風痰玉龍賦治氣刺兩乳求太淵未應之時針列缺偏正頭痛尋列缺重瀉太淵無不應五般肘痛尋尺澤太淵針後卻收功席弘賦魚際在太淵上一寸少大指本節後內側陷中本者根也乃掌內肉中骨節非手指外節針二分留三呼灸三壯主治酒病身熱惡風寒虛熱舌上黃頭痛咳噦傷寒汗不出痹走胸背痛不得息目眩煩心少氣寒栗喉咽乾燥嘔血吐血心痹悲恐腹痛食不下乳癰肢滿肘攣溺出及瘧方欲寒針手足太陰陽明出血兼承山崑崙治轉筋目眩席弘賦兼液門能治喉痛百證賦兼經渠通里可治汗不出者便得淋漓更兼三間三里便得汗至遍身一傳齒痛不能食飲左患灸右右患灸左男三女四少商大指外側去爪甲角如韭葉針一分留三呼五吸宜用三稜針刺微出血泄諸臟之熱不宜灸甲乙經云灸一壯一云三壯忌生冷主治項腫喉痹煩心嘔噦心下滿汗出咳逆痎瘧振寒腹脹腸滿雀目不明唇乾唾沫引飲食不下寒栗鼓頷手攣指痛小兒乳蛾唐刺史成君綽忽項腫如升喉閉水粒不下甄權以三稜針刺之微出血立愈此為十井穴凡初中風卒暴昏沉痰涎壅盛不雀人事牙關緊閉藥水不下急以三稜針刺此穴及少衝中衝關衝少澤商陽使血氣流行乃起死回生急救之妙穴乾坤生意男子痃癖取少商太乙歌兼曲澤治血虛口乾百證賦專治指痛攣急天星祕訣手太陰肺經流注手太陰之脈起於中焦中府穴下絡大腸環循胃口上膈屬肺從肺系橫出腋下天府穴下循臑內肩下臂上通名曰臑行少陰心主之前下肘中臂上臑下緩處曰肘即尺澤穴循臂內臑下掌上名曰臂臂有二骨上骨下廉入寸口經渠穴太淵穴上魚循魚際魚際穴出大指之端少商穴其支者列缺穴從腕後直出次指內廉出其端交入手陽明是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘喝煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息盛者寸口大三倍於人迎虛者則寸口反小於人迎也靈樞每朝寅時從中府起循臂下行至少商穴止入門手太陰肺經左右凡二十二穴少商二穴在手大指端內側去爪甲角如韭葉手太陰脈之所出為井針入一分留三呼瀉五吸禁不可灸銅人出血以瀉諸臟之熱靈樞以三稜針刺之微出血泄諸臟熱湊咽中腫塞水粒不下針之立愈資生魚際二穴在手大指本節後內側散脈中手太陰脈之所溜為滎針入二分留三呼禁不可灸入門太淵二穴一名大泉在手掌後橫紋頭陷中一云在魚後一寸陷者中手太陰脈之所注為輸針入二分可灸三壯銅人經渠二穴在寸日脈中手太陰脈之所行為經針入二分留三呼禁不可灸灸之則傷人神銅人列缺二穴在去腕側上一寸五分以手交叉中指末兩節兩骨罅中手太陰絡則走陽明針入二分留三呼瀉五吸可灸七壯資生孔最二穴在側腕上七寸宛宛中手太陰之郤針入三分可灸五壯銅人尺澤二穴在肘約紋中銅人肘中之動脈也又云肘中約紋上動脈中綱目在臂屈伸橫紋中筋骨罅陷中又云肘中約上兩筋動脈中資生手太陰脈之所入為合針入三分可灸五壯銅人一云不宜灸入門俠白二穴在天府下在肘上五寸動脈中針入三分可灸五壯銅人天府二穴在腋下三寸臑臂內廉動脈中舉手以鼻取之針入三分留三呼禁不可灸銅人雲門二穴在巨骨下挾氣戶旁二寸陷中動脈應手舉臂取之銅人在人迎下第二骨間相去二寸四分資生可灸五壯針入三分刺深則使人氣逆故不宜深刺甲乙中府二穴肺之募也一名膺中俞在雲門下一寸陷中乳上三肋間動脈應手仰而取之手足太陰之會也針入三分留三呼可灸五壯銅人手陽明大腸經共二十穴商陽手食指內側去爪角如韭葉針一分留一呼灸三壯主治胸中氣滿喘咳熱病汗不出耳鳴耳聾寒熱痎瘧口乾頤腫齒痛目盲惡寒肩背肢臂腫痛相引缺盆中痛灸三壯左取右右取左如食頃立已兼太溪治寒瘧有驗百證賦此為十井穴凡初中風跌倒卒暴昏沉痰盛不省人事牙關緊閉藥水不下急以三稜針刺此穴及少商中衝少衝使血氣流通乃急救回生之妙穴乾坤生意二間在食指本節前第三節後紋頭陷中針三分留六呼灸三壯主治頤腫喉痹肩背臑痛鼻衄齒痛目黃口乾口眼歪斜飲食不通振寒傷寒水結治牙疼妙玉龍賦兼陽溪治牙疼腰痛咽痹席弘賦兼陰郤能疏通寒栗惡寒百證賦治目昏不見通玄賦兼三里治牙疼頭痛喉痹天星祕訣三間在食指本節後陷中去二間一寸針三分留三呼灸二壯主治鼽衄熱病喉痹咽中如梗下齒齲痛嗜臥胸腹滿腸鳴洞泄寒熱瘧唇焦口乾氣喘目眥痛善驚寒熱結水多唾兼腎俞善除背痛風勞席弘賦兼攢竹治目中之漠漠百證賦治身熱氣喘口乾目急捷徑合谷在手大指次指歧骨間陷中動脈應手針三分留六呼灸三壯主治傷寒大渴脈浮在表發熱惡寒頭痛脊強風疹寒熱痎瘧熱病汗不出偏正頭痛面腫目翳唇吻不收喑不能言口噤不開腰脊引痛痿躄小兒乳蛾一云能下死胎婦人妊娠補合谷即墮胎産後脈絶不還針合谷入三分急補之千金治鼻衄目痛不明牙疼喉痹疥瘡可灸三壯至七壯神農經傷寒無汗瀉合谷補復溜若汗多不止便補合谷瀉復溜神效攔江賦兼太衝治手連肩脊痛難忍兼曲池治兩手不如意睛明治眼若未效合谷光明不可缺冷嗽先宜補合谷又須針瀉三陰交席弘賦兼天府治鼻衄百證賦兼三陰交治脾病血氣兼內庭治寒瘧面腫及腸鳴天星祕訣面口合谷收四總穴曲池兼合谷可徹頭疼千金療頭疼並面腫瘧病熱還寒體熱身汗出目暗視茫然齒齲鼻衄血口噤不開言針入五分深能令病自安馬丹陽陽溪在手腕橫紋上側兩筋間陷中直合谷針三分留七呼灸三壯主治狂言喜笑見鬼熱病煩心掌中熱汗不出目赤爛翳厥逆頭痛胸滿不得息寒熱痰瘧嘔沫喉痹耳鳴齒痛驚掣肘臂不舉痂疥兼二間治牙疼腰痛喉痹席弘賦兼解溪治驚悸怔忡兼肩髃能消癮風之熱極百證賦偏歷腕後三寸針三分留七呼灸三壯主治痎瘧寒熱癲疾多言目視䀮䀮耳鳴喉痹口喎咽乾鼻衄齒痛汗不出針偏歷利小便治大人水蠱標幽賦溫溜腕後五寸針三呼灸三壯主治傷寒噦逆噫隔氣閉寒熱頭痛喜笑狂言見鬼吐沫口舌腫痛喉痹面虛腫腸鳴腹痛四肢腫疼肩不得舉兼期門治傷寒項強百證賦下廉腕後六寸行微向外曲池下四寸針五分留五呼灸三壯主治勞瘵狂言頭風痹痛飧泄小腹滿小便血小腸氣面無顏色痃癖腹痛不可忍食不化氣喘涎出乳癰此穴主瀉胃中之熱與氣衝三里巨虛上廉治同上廉腕後七寸曲池下三寸三里下一寸微外些針五分灸五壯主治腦風頭痛胸痛喘息半身不遂腸鳴小便澀大腸氣滯手足不仁此穴主瀉胃中之熱與氣衝三里巨虛下廉治同三里曲池下二寸腕後八寸針三分灸三壯主治中風口癖手足不遂五勞虛乏羸瘦霍亂遺矢失音齒痛頰腫瘰癧手痹不仁此穴治腰背痛連臍不休下針麻重須瀉得氣不用留手足上下針三里食癖氣塊憑此取席弘賦兼少海治手臂頑麻百證賦專治肩背痛通玄賦曲池在肘外側橫紋頭針七分留七呼灸三壯一云百壯主治傷寒振寒餘熱不盡胸中煩滿熱渴目眩耳痛瘰癧喉痹不能言瘛瘲癲疾繞踝風手臂紅腫肘中痛偏風半身不遂風邪泣出臂膊痛筋緩無力屈伸不便皮膚乾燥痂疥婦人經脈不通治手肘臂膊疼細無力半身不遂發熱胸前煩滿可灸十四壯神農經兼人中可治痿僕兼尺澤治肘痛玉龍賦兼肩井甄權針臂痛而復射標幽賦遠達陽陵治半身不遂兼少衝治發熱驗百證賦兼合谷治兩手不如意席弘賦治癭惡氣諸癮疹灸隨年壯十三鬼穴此名鬼臣若遇百邪癲狂當於第十二次下火針此與合谷可徹頭疼千金主大人小兒遍身風疹痂疥秦承祖善治肘中痛偏風手不收挽弓開不得臂瘓莫梳頭喉痹促欲死發熱更無休偏身風癬癩針著即時瘳肘髎在曲池上外斜一寸橫直天井針三分灸三壯主治肘節風痹臂痛不舉麻木不仁嗜臥五