body:
  text: 卷一制九針法內經曰虛實之要九針最妙者為其各有所宜也注云熱在頭身宜鑱針分肉氣滿宜圓針脈氣虛少宜匙針瀉熱出血發泄痼病宜鋒針破癰腫出膿血宜鈹針調陰陽去暴痹宜圓利針治經絡中痛痹宜毫針痹深居骨解腰脊節腠之間者宜長針虛風舍於骨解皮膚之間者宜大針此之謂各有所宜也針形有九敘之於下一曰鑱針長一寸六分頭大末鋭主瀉陽氣靈樞平半寸長一寸六分頭大末鋭主熱在頭分易老二曰圓針長一寸六分針如卵形揩摩分間不得傷肌肉以瀉分氣易老鋒如卵形肉分氣病宜用此易老三曰匙針長三寸半鋒如黍粟之鋭主按脈勿陷以致其氣易老脈氣虛少者宜此易老四曰鋒針長一寸六分刃三隅以發痼疾易老瀉熱出血發泄痼疾易老五曰鈹針長四寸廣二分半末如劍鋒以取大膿易老一名破針用以破癰腫出膿血易老六曰圓利針長一寸六分大如氂且圓且鋭中身微大以取暴氣易老尖如毫且圓利調陰陽去暴氣易老七曰毫針長三寸六分尖如蚊虻喙靜以徐往微以久留以取痛痹易老尖如蚊虻喙調經絡去痛痹易老八曰長針長七寸鋒利身薄可以取遠痹易老鋒利故取痹深居骨解腰脊節腠之間者易老九曰大針長四寸尖如挺其鋒微圓以瀉機關之水易老一名焠針取風虛舍於骨解皮膚之間者易老煉針法取久用馬銜鐵作針最妙精要煮針取烏頭巴豆肉各一兩麻黃五錢木鱉子肉十個烏梅五個上將針藥同入銀石器內水煮一日出洗之再用止痛藥沒藥乳香當歸花蕊石各半兩又如前水煮一日取出以皂角水洗之再於犬肉內煮一日仍用瓦屑打磨淨端直松子油塗之常近人氣為妙得效四時針法春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中是故邪氣者常隨四氣之氣血而入客也必從其經氣闢除其邪則亂氣不生反之則生亂氣相淫並焉內經病有浮沉刺有淺深各至其理無過其道過之則內傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟後生大病內經春夏刺淺秋冬刺深者蓋春夏陽氣在上人氣亦在上故當淺刺之秋冬陽氣在下人氣亦在下故當深取之也難經針刺淺深法足陽明刺深六分留十呼足太陽刺深五分留七呼足少陽刺深四分留五呼足太陰刺深三分留四呼足少陰刺深二分留三呼足厥陰刺深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼靈樞凡上體及當骨處針入淺而灸宜少凡下體及肉厚處針可入深灸多無害入門火針法性畏艾灸者當用火針以針置火中令熱刺之即火針也資生凡諸穴忌灸之處以針置火中令熱繆刺之即效乃知火不負人之説資生內經有燔針法即火針也內經點穴法凡點穴時須得身體平直四肢無令拳縮坐點無令俯仰立點無令傾側孔穴不正則徒燒其肌肉虛忍痛楚無益於事千金凡點穴坐點則坐灸立點則立灸臥點則臥灸坐立皆宜端直若一動則不得真穴入門古者用繩度量繩多出縮取穴不準今以薄竹片點量分寸療病準的亦有用蠟紙條量者但薄篾易折蠟紙亦黏手惟取稻稈心量卻易尤勝於用紙之伸縮也資生人有老少體有長短膚有肥瘦皆須精思商量準而折之又以肌肉紋理節解縫會宛陷之中及以手按之病者快然如此仔細安詳用心者乃得真穴耳千金吳蜀多行灸法有阿是穴之法言人有病即令捏其上若果當其處不問孔穴下手即得便快即云阿是灸刺皆驗入門云天應穴是也資生量分寸法取病人男左女右中指第二節內度兩橫紋相去為一寸應取穴及作炷分寸並依此法局方取男左女右中指第二節內庭兩橫紋相去為一寸是謂同身寸療病多愈今以為準的銅人曰取中指內紋為一寸內經曰同身寸是也資生竇漢卿同身寸法以中指大指相屈如環取內側交兩角為一寸取中指內側為同身寸者大法也若取頭部膺腧部背部腹部同身寸外又各有活法不可執一也綱目手足部並用同身寸取之神應頭部寸前髮際至後髮際折作十二節為一尺二寸前髮際不明者取眉心上行三寸後髮際不明者取大椎上行三寸前後髮際不明者共折作一尺八寸神應頭部橫寸以眼內眥角至外眥角為一寸並同此法神庭至曲差曲差至本神本神至頭維各一寸半自神庭至頭維共四寸半神應膺腧部寸兩乳橫折作八寸並用此法取之自天突至膻中直折作六寸八分下行一寸六分為中庭上取天突下至中庭共折作八寸四分神應背部寸大椎穴下至尾骶骨共二十一椎通折作三尺上七椎每椎一寸四分一釐共九寸八分七釐中七椎每椎一寸六分一釐十四椎前與臍平共二尺一寸一分四釐下七椎每一寸二分六釐背第二行挾脊各一寸半除脊一寸共折作四寸分兩旁背第三行挾脊各三寸除脊一寸共折作七寸分兩旁神應腹部寸自中行心蔽骨下至臍共折作八寸人若無心蔽骨者取歧骨下至臍心共折作九寸臍中至毛際橫骨折作五寸取之膺部腹部橫寸並用乳間八寸法取之神應人身尺寸人有長七尺五寸者發以下至頤一尺結喉至𩩲骭鳩尾骨也一尺三寸𩩲骭至天樞八寸天樞穴名至橫骨六寸半橫骨至內輔上廉一尺八寸內輔骨上廉至下廉三寸半內輔下廉至內踝一尺三寸內踝至地三寸又膝膕至跗屬一尺六寸胕屬至地三寸又肩至肘一尺七寸肘至腕一尺二寸半腕至中指本節四寸本節至末四寸半靈樞一夫法凡量一夫之法覆手並舒四指對度四指上下節橫過為一夫也資生制艾法艾葉主灸百病三月三日五月五日採葉暴乾以覆道者為佳經陳久方可用入門端午日日未出時於艾中以意求其似人者輒採之以灸殊有效又云三月三日艾用灸極妙類聚取陳久黃艾葉不以多少入臼內用木杵輕搗令熟以細篩隔去青滓再搗再篩直至柔細黃熟為度用之局方艾熟搗去青取白入硫黃揉之用尤妙入門作艾炷法艾炷根下廣三分長亦三分若減此則不覆孔穴不中經脈火氣不行亦不能除病強壯人亦可稍增令大小兒則可如小麥大或如雀糞大局方艾炷依小竹箸頭作之其病脈粗細狀如巨線但令當脈灸之艾炷雖小亦能愈疾如腹內疝瘕痃癖氣塊伏梁等疾惟須大艾炷也入門取火法古來用火灸病忌八般木火松桑棗柏竹枳榆橘今則不用木火只以清油點燈燈上燒艾莖點灸兼滋潤灸瘡至愈以來且無疼痛用蠟燭更佳又火珠耀日以艾承之遂得火出此火灸病為良次有火照耀日以艾引之便得火出此火亦可火照即火鏡也局方凡取火者宜敲石取火今人以鐵鈍刀擊石先以紙灰為火丸在下承之亦得火可用資生下火灸時法凡下火灸時皆以日正午以後乃可下火灸之之時謂陰氣未至灸無不著午前平旦穀氣虛令人癲眩不得針灸慎之慎之其大法如此卒急者不可用此例也若遇陰雨風雪暫時且停候待晴明乃可灸之灸時不得傷飽大飢飲酒食生冷硬物及思慮愁憂嗔怒呼罵喪葬嘆息一切不祥忌之大吉千金灸法治病大法冬宜溫及灸仲景凡病藥之不及針之不到必須灸之入門靈樞曰陷下則灸之東垣云陷下者皮毛不任風寒知陽氣下陷也又曰陷下則徒灸之徒灸謂不針只灸也綱目經云陷下則灸之者天地間無他惟陰與陽二氣而已陽在外在上陰在內在下今言陷下者陽氣下陷入陰血之中是陰反居其上而復其陽脈證俱見寒在外者則灸之內經云北方之人宜灸焫為冬寒太旺伏陽在內皆宜灸之東垣虛者灸之使火氣以助元陽也實者灸之使實邪隨火氣而發散也寒者灸之使其氣之復溫也熱者灸之引鬱熱之氣外發火就燥之義也入門頭面諸陽之會胸膈二火之地不宜多灸背腹雖云多灸陰虛有火者不宜惟四肢穴最妙入門凡灸當先陽後陰言從頭向左而漸下次後從頭向右而漸下乃先上後下也千金先灸於上後灸於下先灸於少後灸於多明堂灸則先陽後陰先上後下先少後多入門壯數多少法著艾一炷如人丁壯之力故謂之壯凡頭頂止於七壯至七七壯而止鳩尾巨闕雖是胸腹穴灸不過四七壯若灸多令人永無心力如頭上穴若灸多令人失精神臂腳穴若灸多令人血脈枯竭四肢細而無力既失精人又加細瘦即令人短壽資生四肢但去風邪不宜多灸灸七壯至七七壯止不得過隨年數資生凡小兒七日以上周年以下不過七壯炷如雀屎資生發灸瘡法凡著灸療病雖然數足若不得瘡發膿出其疾不愈如灸瘡不發取故履底炙令熱尉之三日即發膿出自然愈疾局方又取赤皮蔥三五莖去其青於煻灰火中煨熟拍破熱尉灸瘡十餘遍三日自發膿出即愈局方凡著艾灸得灸瘡發所患即差不得瘡發其疾不愈灸後過數三日不發可於瘡上再灸二三壯即發資生療灸瘡法凡著灸治病才住火便用赤皮蔥薄荷煎湯溫溫淋洗灸瘡令驅逐風氣於瘡口內出兼令經脈往來不滯於瘡下若灸瘡退痂後取東南桃枝及青嫩柳枝等分煎湯溫洗灸瘡能護灸瘡中諸風若瘡內黑爛潰者加胡荽煎洗自能生好肉若疼痛不可忍加黃連煎洗立有神效局方凡貼灸瘡春用柳絮夏用竹膜秋用新棉冬用兔腹下白細毛貓兒腹下毛更佳資生灸瘡不差牛屎燒熱灰敷之白茅香花搗敷之楸葉或根皮搗為末敷之本草灸瘡久不合黃連甘草節白芷黃丹香油同煎膏貼之丹心灸瘡腫痛取薤白切與豬脂及苦酒浸經宿微火煎去渣敷之伏龍肝煎水令熱淋漬之本草灸瘡出血不止藍青布燒灰敷之鱧腸草搗敷之百草霜蚌粉為末干糝本草灸瘡久不差宜用內托黃耆丸止痛生肌散諸方內托黃耆丸治針灸傷經絡流膿不止久不差黃耆八兩當歸三兩肉桂木香乳香沉香各一兩上為末以緑豆粉四兩薑汁煮糊和丸梧子大熟水下五七十丸得效止痛生肌散治同上牡蠣粉五錢寒水石煅滑石各二錢上為末先以藥水洗後糝之資生調養法凡灸預卻熱物服滋腎藥及灸選其要穴不可太過恐氣血難當灸氣海及煉臍不可臥灸素火盛者雖單灸氣海亦必灸三里瀉火灸後未發不宜熱藥已發不宜涼藥常須調護脾胃俟其自發不必外用藥物發時或作寒熱亦不可妄服藥餌落痂後用竹膜紙貼三五日次以麻油米粉煎膏貼之膿多者一日一易膿少者二日一易使膿出多而疾除也務宜撙節飲食戒生冷油膩魚蝦筍蕨量食牛肉少雞長肉時方可量用豬肚老鴨之類謹避四氣七情六欲入門灸後忌食豬魚酒面動風生冷等物雞肉最毒而房勞尤甚也亦忌飲水及將水濯手足資生針灸不可並施內經言針而不灸灸而不針庸醫針而復灸灸而復針後之醫者不明軒岐之道針而復灸灸而復針者有之殊不知書中所言某穴在某處或針幾分或灸幾壯此言若用針當用幾分若用灸當用幾壯謂其穴灸者不可復針針者不可灸矣今之醫者凡灸必先灸三壯乃用針復灸數壯謂之透火艾之説是不識書中軒岐之旨也神應昔宏綱先生嘗言惟腹上用針隨灸數壯以固其穴他處忌之云此亦醫家權變之説也神應問針經云即靈樞也針幾分灸幾壯針訖而後灸何也曰針則針灸則灸若針而不灸若灸而不針綱目灸而勿針針而勿灸針經為此常叮嚀庸醫針灸一齊用徒施患者炮烙刑入門不耐針灸帝問曰針石火焫之痛何如少俞曰人之骨強筋弱肉緩皮膚厚者耐痛帝曰其耐火焫者何以知之少俞曰加以黑色而美骨者耐火焫帝曰其不耐針石之痛者何以知之少俞曰堅肉薄皮者不耐針石之痛也靈樞用針須合天時天溫日明則人血淖液而衛氣浮故血易瀉氣易行天寒日陰則人血凝澀而衛氣沉月始生則血氣始精衛氣始行月廓滿則血氣實肌肉堅月廓空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是以天寒無刺天溫無凝月生無瀉月滿無補月廓空無治是謂得時而調之故日月生而瀉是謂臟虛月滿而補血氣揚溢絡有留血命曰重實月廓空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起內經針補瀉法必先度其形之肥瘦以調其氣之虛實實則瀉之虛則補之必先去血脈而後調之無問其病以平為期內經補虛者必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神呼盡納針靜而久留以氣至為故候吸引針氣不得出各在其處推闔其門令神氣存大氣留止命曰補瀉實者吸則納針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉內經知為針者信其左不知為針者信其右當刺之時必以左手壓按其所針滎腧之處彈而怒之抓而下之其氣之來如動脈之狀順針而刺之得氣因推而納之是謂補動而伸之是謂瀉難經補者隨經脈推而納之左手閉針孔徐出針而疾按之瀉者迎經脈動而伸之左手開針孔疾出針而徐按之隨而濟之是謂補迎而奪之是謂瀉難經刺虛者須其實刺實者須其虛解云刺實須其虛者為針阻氣隆至針下寒乃去針也刺虛須其實者為針陽氣隆至針下熱乃去針也注云要以氣至而有效也內經候氣有二一曰邪氣二曰穀氣邪氣來也緊而疾穀氣來也徐而和緊而疾者補而未實瀉而未虛也徐而和者補而已實已當作易瀉而已虛也脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣也靈樞左手重而切按欲令氣散右手輕而徐入不痛之因也綱目用針宜審順逆帝曰形氣之逆順奈何岐伯曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也靈樞刺不知順逆真邪相搏滿而補之則陰陽四溢腸胃充廓肝肺內䐜陰陽相錯虛而瀉之則經脈空虛血氣枯竭腸胃㒤僻皮膚薄者毛腠夭焦預之死期故曰用針之要在於知調陰與陽調陰與陽精氣乃光合形與氣使神內藏故曰上工平氣中工氣脈下工絶氣危生故曰下工不可不慎也靈樞五奪勿用針瀉帝曰何謂五奪岐伯曰形肉已脫是一奪也大失血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産下血之後五奪也皆不可針瀉靈樞針法有瀉無補針刺雖有補瀉之法豫恐但有瀉而無補焉經謂瀉者迎而奪之以針迎其經脈之來氣而出之固可以瀉實也謂補者隨而濟之以針隨其經脈之去氣而留之未必能補虛也不然內經何以曰無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗無刺大勞人無刺大飢人無刺大渴人無刺新飽人無刺大驚人又曰形氣不足病氣不足此陰陽皆不足不可刺刺之則重竭其氣老者絶滅壯者不復矣若此等語皆有瀉無補之謂也凡虛損危病久病俱不宜用針入門灸補瀉法灸法有補瀉火若補火艾滅至肉若瀉火不要至肉便掃除之用口吹之風主散故也丹心以火補者毋吹其火其火須自滅也火瀉者疾吹其火傳至艾須其火滅也靈樞針灸禁忌凡針刺之禁新內勿刺已刺勿內已刺勿醉已醉勿刺新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者臥而休之如食頃乃刺之出行來者坐而休之如行十里久乃刺之靈樞無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人內經微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也脈浮應以汗解用火灸之則邪無從出因火而盛從腰以下必重而痹名曰火逆脈浮熱甚而反灸之此為實實虛虛因火而動必咽燥吐唾血仲景針要得術五臟之有疾也譬猶刺也猶汙也猶結也猶閉也善用針者取其疾也猶拔刺也猶雪汙也猶解結也猶決閉也疾雖久猶可畢也言不可治者未得其術也靈樞寒與熱爭能合而調之虛與實鄰知決而通之左右不調犯而行之上氣不足推而揚之下氣不足積而從之陰陽皆虛火自當之靈樞針有上工中工上工治未病中工治已病者何謂也曰所謂治未病者見肝之病則知肝當傳之於脾故先實其脾氣無令得肝之邪也故曰治未病焉中工見肝之病不曉相傳但一心治肝故曰治已病也難經針入著肉帝曰針入而肉著者何也岐伯曰熱氣因於針則針熱熱則肉著於針故堅焉靈慪針灸法內經曰無刺大勞無刺大飢無刺大飽無刺大醉無刺大驚無刺大怒人又曰形氣不足者久病虛損者針刺則重竭其氣又曰針入如芒氣出如車軸是謂針之有瀉無補也凡灸平朝及午後則穀氣虛乏須施於日午大概脈絡有若細線以竹箸頭作炷但令當脈灸之亦能愈疾是以四肢則但去風邪不宜多灸故七壯至七七壯而止不得過隨年數臍下久冷疝瘕氣塊伏梁積氣之證則宜艾炷火故曰腹背宜灸五百壯如巨闕鳩尾雖是胸腹之穴灸不過七七壯而止若大炷多灸則令人永無心力頭頂穴多灸則失精神臂腳穴多灸則血脈枯竭四肢細瘦無力又失精神蓋穴有淺深淺穴多灸則必傷筋力故不過三壯五壯七壯而止可不慎哉禁忌生冷雞豬酒面房勞炙煿等物灸後治法灸瘡無汗則未易發膿用薄荷桃柳葉煎湯淋洗因用鹽湯和麥末如泥形如厚棋子著布上敷貼灸瘡若干更用鹽湯水潤其布上即膿俗名灸花灸後