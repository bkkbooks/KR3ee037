之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也靈樞手少陰之別名曰尾通里去腕一寸半別走太陽循經入於心中系舌本屬目系實則支膈虛則不能言取之所別也靈樞足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下別貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也靈樞手厥陰之別名曰內關去腕二寸別走少陽出於兩筋之間循經以上繫於心包絡心系實則心痛虛則為頭項強取之所別也靈樞足厥陰之別名曰蠡溝在內踝上五寸別走少陽其別者循經上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也靈樞手太陽之別名曰支正在腕後五寸別走少陰其別者上走肘絡肩髃實則節弛肘廢虛則生疣取之所別也靈樞足太陽之別名曰飛揚在外踝上七寸別走少陰實則鼻窒頭背痛虛則鼽衄取之所別也靈樞手少陽之別名曰外關在腕後二寸外別走心主繞臂注胸中其病實則肘攣虛則不收取之所別也靈樞足少陽之別名曰光明在外踝上五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也靈樞手陽明之別名曰偏歷在腕後三寸別走太陰其別者上循臂繞肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也靈樞足陽明之別名曰豐隆在外踝上八寸別走太陰其別者循經骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹卒喑實則狂癲虛則足不收脛枯取之所別也靈樞任脈之別名曰尾翳下鳩尾散於腹其病實則腹皮痛虛則瘙癢取之所別也靈樞督脈之別名曰長強在脊骶端挾膂上項散頭上下當肩胛左右別走太陽入貫膂其病實則脊強虛則頭重取之所別也靈樞脾之大絡名曰大包在淵腋下三寸布胸脅其病實則身盡痛虛則百節皆縱此脈若羅絡之血者皆取之脾之大絡脈也靈樞脈病有是動有所生病難經曰經脈有是動有所生病一脈輒變為二病者何也然經言是動者氣也所生病者血也邪在氣氣為是動邪在血血為所生病氣主煦之血之濡之氣留而不行者為氣先病也血滯而不濡者為血後病也故先為是動後為所生病也脈有經脈絡脈孫絡脈經脈為里支而橫者為絡絡之別者為孫絡盛而血者疾誅之盛者瀉之虛者飲藥以補之靈樞經徑也徑直者為經經之支派旁出者為絡入門絡穴俱在兩經中間乃交經過絡之處也入門刺臟腑經絡四病皆不同十五絡病至淺在表也十二經病次之六腑病又次之五臟病至深在裡也故治法有難易焉至於絡又各不同十五絡之絡乃陰經別走陽經陽經別走陰經而橫貫兩經之間者所為支而橫者為絡是也繆刺之絡乃病邪流溢大絡不得入貫經腧而其痛與經脈繆處乃絡病經不病者也血絡之絡乃皮膚所見或赤或青或黑之絡而小者如針大者如箸也以淺深言之血絡至淺繆刺者次之十五絡近里而貫經腧也綱目十二經血氣多少夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多血少氣少陰常多氣少血太陰常多血少氣此天之常數也故曰刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出血惡氣刺厥陰出血惡氣刺少陰出氣惡血也靈樞足陽明太陰為表裡足少陽厥陰為表裡足太陽少陰為表裡手陽明太陰為表裡手少陽心主為表裡手太陽少陰為表裡也靈樞十二經行度部分手之三陰從臟走至手手之三陽從手走至頭足之三陽從頭走至足足之三陰從足走至腹靈樞人之經絡三陽三陰分布一身大陽少陰在身之後陽明太陰在身之前少陽厥陰在身之側丹心氣行有街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭進止之於腦氣在胸者止之於膺與背俞氣在腹者止之背俞與衝脈於臍左右之動脈者氣在脛者止之於氣街與承山踝上以下取此者用毫針得氣乃刺之靈樞針法有巨刺繆刺散刺經曰左盛則右病右盛則左病右痛未已而左脈先病左痛未已而右脈先病如此者必巨刺之此五穴井滎輸經合臨時變合刺法之最大者也巨刺者刺經脈也入門經曰邪氣大絡者左注右右注左上下左右其氣無常不入經腧命曰繆刺繆刺者刺絡脈也言絡脈與經脈繆處身有蜷攣疼痛而脈無病刺其陰陽交貫之道也入門散刺者散針也因雜病而散用其穴因病之所宜而針之初不拘於流注即天應穴資生經所謂阿是穴是也入門邪客於經痛在於左而右脈先病者巨刺之必中其經非絡脈也絡病者其痛與經脈繆處故命曰繆刺皆左取右右取左又曰身形有痛九候莫病則繆刺之繆刺皆取諸經之絡脈也綱目奇經八脈脈有陽維陰維有陽蹻陰蹻有沖有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也難經奇經病非自生蓋因諸經溢出而流入之也比於聖人圖設溝渠以備水潦之溢溝渠滿溢則流於深湖人脈隆盛入於八脈而不環周故其受邪氣蓄則腫熱砭射之也綱目督沖任三脈並起而異行皆始於氣衝穴名一源而分三歧督脈行背而應乎陽任脈行腹而應乎陰衝脈自足至頭若沖沖而直行於上上為十二經脈之海總領諸經氣血三脈皆起於氣衝氣衝又起於胃脈其源如此則知胃氣為本矣入門陽維起於金門穴名以陽交為郤與手足太陽及蹻脈會於肩腧與手足少陽會於天髎及會肩井與足少陽會於陽白上本神下至風池與督脈會於啞門此陽維之脈起於諸陽之交會也入門陽維為病苦寒熱又曰陽維維於陽陰維維於陰陰陽不能相維則悵然失志溶溶不能自收持綱目陰維陰維之郤曰築賓穴名與足太陰厥陰會於府舍期門又與任脈會於廉泉天突此陰維起於諸陰之交會也入門陰維為病苦心痛綱目陽蹻陽蹻脈者起於跟中循外踝上行申脈穴入風池陽蹻之病陽急而狂奔入門蹻者捷也言此脈之行如蹻捷者之舉動手足也入門陰蹻陰蹻脈者亦起於跟中循內踝上行照海穴至咽喉交貫衝脈陰蹻之病陰急而足直入門衝脈衝脈行身之前挾任脈兩旁東垣云衝脈起於會陰穴名根於氣街為二道入於腹中央發臍兩旁上行附足陽明之脈至胸前而散綱目衝脈為病逆氣而裡急內經言衝脈並足少陰之經難經言並足陽明之經以此推之則衝脈起自氣街在陽明少陰二經之內挾臍上行其理明矣綱目督脈始終行身之後出於會陰根於長強上行脊裡至於巔附足太陽之脈謂之督者以其督領諸經也綱目督脈為病脊強而反折綱目任脈任脈始終行身之前東垣云任脈起於會陰根於曲骨入前陰中出腹裡過臍上行附足厥陰之經謂之任者女子得之以妊養也綱目任脈為病其內苦急男子為七疝女子為瘕聚綱目衝脈任脈皆於胞中上循腹裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口綱目帶脈帶脈者起於季脅回身一周難經經云帶脈周回季脅間注云回繞周身總束諸脈如束帶然起於季脅即章門穴乃脅下接腰骨之間也入門帶脈為病腹滿溶溶若坐水中入門子午八法子者陽也午者陰也不曰陰陽而曰子午者正以見人身任督與天地子午相為流通故地理南針不離子午乃陰陽自然之妙用也八法者奇經八穴為要乃十二經之大會也入門公孫衝脈內關陰維臨泣帶脈外關陽維後溪督脈申脈陽蹻列缺任脈照海陰蹻其陽蹻陽維並督脈屬陽主肩背腰腿在表之病其陰蹻陰維任沖帶屬陰主心腹脅肋在裡之病入門周身三百六十穴流於手足六十六穴六十六穴又統於八穴故謂之奇經八穴入門子午流注流者往也注者住也神氣之流行也十二經每經名得五穴井滎輸經合也手不過肘足不過膝陽於三十六穴陰於三十穴共成六十六穴陽於多六穴者乃原穴也入門大腸合又有巨虛上廉小腸合又有巨虛下廉三焦合又有委陽也綱目五臟之腑所屬五輸五行心不主令故代以心包五輸陰陽配合陰井木陽井金陰滎火陽滎水陰輸土陽輸木陰經金陽經火陰合水陽合土陰陽皆不相同其意何也然是剛柔之事也陰井乙木陽井庚金者乙之剛乙者庚之柔故為配合焉他仿此難經五輸主病五臟六腑各有井滎輸經合皆何所主然經言所出為井所流為滎所注為輸所行為經所入為合井主心下痞滿肝邪也滎主身熱心邪也輸主體重節痛脾邪也經主喘咳寒熱肺邪也合主氣逆而泄腎邪也此所主病也難經五輸針隨四時春刺井夏刺滎季夏刺輸秋刺經冬刺合者何也蓋春刺井者邪在肝也夏刺滎者邪在心也季夏刺輸者邪在脾也秋刺經者邪在肺也冬刺合者邪在腎也難經井合有義所出為井所入為合奈何蓋井者東方春也萬物始生故言所出為井也合者北方冬也陽氣入臟故言所入為合也難經五臟六腑有疾當取十二原五臟有六腑六腑有十二原十二原出於四關主治五臟五臟有疾當取之十二原十二原者五臟之所以稟三百六十五節氣味也五臟有疾應出十二原而原各有出陽中之少陰肺也其原出於太淵陽中之太陽心也其原出於大陵陰中之少陽肝也其原出於太衝陰中之至陰脾也其原出於太白陰中之太陰腎也其原出於太溪膏之原出於鳩尾肓之原出於氣海此十二原主治五臟六腑之有疾也靈樞四關者合谷太衝穴也十二經原皆出於四關入門臟腑要穴五臟腧二十五穴六腑腧三十六穴並巨虛上下廉共六十四腧實切要之穴也臟腑有病此六十四穴皆主之其太淵大陵太衝太白太溪為五臟之原其三里巨虛上下廉委中委陽陽陵泉為六腑之合又切要中之切要而醫所最當先者也臟腧二十五腑腧三十六合為六十一腧加委陽上廉下廉是為六十四腧也綱目六合所出所入帝曰滎腧與合各有名乎岐伯曰滎腧治外經合治內腑帝曰合各有名乎岐伯曰胃合入於三里大腸合入於巨虛上廉小腸合入於巨虛下廉此三腑皆出足陽明也三焦合入於委陽膀胱合入於委中此二腑皆出足太陽也膽合入於陽陵泉此一腑出足少陽也帝曰取之奈何岐伯曰取三里者低跗取之取巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正豎膝豫之齊下至委陽之陽取之靈樞足三焦別脈足三焦者足太陽之別也上踝五寸別入貫腨腸出於委陽穴名並太陽之正入絡膀胱約下焦其病實則閉癃虛則遺溺遺溺則補之閉癃則瀉之靈樞八會穴腑會太倉中脘穴臟會季脅章門穴筋會陽陵泉穴名髓會絶骨陽輔穴血會膈腧穴名骨會大杼穴名脈會太淵穴名氣會三焦外一筋直兩乳內也膻中穴腑會中脘腑病治此臟會章門臟病治此筋會陽陵泉筋病治此髓會絶骨髓病治此血會膈腧血病治此骨會大杼骨病治此脈會太淵脈病治此氣會膻中氣病治此難經六經標本足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅陰之間標在窗籠之前窗籠者耳也足少陰之本在內踝下上三寸中標在背腧與舌下兩脈也足厥陰之本在行間上五寸所標在背腧也足陽明之本在厲兌標在人迎頰挾頏顙也足太陰之本在中封前上四寸之中標在背腧與舌本也手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽明之本在肘骨中下至別陽標在顏下合鉗上也手太陰之本在寸口之中標在腋內動也手少陰之本在鋭骨之端標在背腧也手心主之本在掌後兩筋之間二寸中標在腋下三寸也凡候此者下虛則厥下盛則熱上虛則眩上盛則熱痛靈樞人身四海腧穴胃為水穀之海其腧上在氣街下在三里衝脈為十二經之海其腧上在於大杼下出於巨虛之上下廉膻中為氣之海其腧上在於柱骨之上下前在於人迎腦為髓之海其腧上在於其蓋下在風府蓋即百會穴也靈樞大接經經曰留瘦不移節而刺之使十二經無過絶假令十二經中是何經絡不通行當刺不通凝滯經俱令氣過節無間期數以平為期大接經治中風偏枯從陽引陰從陰引陽皆取十二經井穴也綱目主病要穴大概上部病多取手陽明中部病取足太陰下部病取足厥陰前膺取足陽明後背取足太陽因各經之病而取各經之穴者最為要訣百病一針為率多則四針滿身針者可惡入門膏肓俞三里湧泉百病無所不治入門若要安丹田三里不曾干資生禁針灸身之穴三百六十有五其三十穴灸之有害七十九穴刺之為憂叔和用針者先明孔穴補虛瀉實勿失其理針皮膚腠理勿傷肌肉針肌肉勿傷筋脈針筋脈勿傷骨髓針骨髓勿傷諸絡傷筋膜者愕視失魂傷血脈者煩亂失神傷皮毛者上氣失魄傷骨髓者呻吟失志傷肌肉者四肢不收失智此為五亂有死之憂也資生刺中五臟死候五臟主藏神不可傷傷之則死刺中心一日死其動為噫刺中肺三日死其動為咳刺中肝五日死其動為語一作欠刺中脾十日死其動為吞刺中腎六日死一作三日其動為嚏刺中膽一日半死其動為嘔刺中隔為傷中其病雖愈不過一歲必死內經失針致傷刺跗上中大脈血出不止死刺陰中大脈血出不止死刺面中溜脈不幸為盲刺客主人上關穴內陷中脈為內漏為聾刺頭中腦戶入腦立死刺膝臏出液為跛刺舌下中脈太過出血不止為喑刺臂太陰脈出血多立死刺足布絡中脈血不出為腫刺足少陰脈重虛出血為舌難於言刺郤中大脈令人僕脫色刺膺中陷中肺為喘逆仰香刺氣衝中脈血不出為腫鼠僕刺肘中內陷氣歸之為不屈伸刺脊間中髓為傴刺陰股下三寸內陷令人遺尿刺乳上中乳房為腫根蝕刺腋下脅間令人咳刺缺盆中內陷氣泄令人喘咳逆刺小腹中膀胱尿出令人小腹滿刺手魚腹內陷為腫刺眶上陷骨中脈為漏為盲刺關節中液出不得屈伸內經刺上關者呿不能欠刺下關者欠不能呿刺犢鼻者屈不能伸刺兩關者伸不能屈靈樞禁針穴神庭腦戶囟會玉枕絡卻承靈顱息角孫承泣神道靈臺雲門肩井膻中缺盆上關鳩尾五里青靈合谷神闕橫骨氣衝箕門承筋三陰交水分會陰石門三陽絡人迎乳中然谷伏兔入門禁灸穴啞門風府天柱承光臨泣頭維攢竹睛明素髎禾髎迎香顴髎下關人迎天牖天府周榮淵液乳中鳩尾腹哀肩貞陽池中衝少商魚際經渠陽關脊中隱白漏谷條口地五會犢鼻陰市伏兔髀關申脈委中陰陵泉殷門心俞承扶承泣瘛脈絲竹空耳門石門氣衝腦戶白環俞奇穴不出在靈樞內經故謂之奇穴取膏肓腧穴法此穴主陽氣虧弱諸虛痼冷夢遺上氣咳逆嚏膈狂惑忘誤百病尤治痰飲諸疾須令患人就床平坐曲膝齊胸以兩手圍其足膝使胛骨開離勿令動搖以指按四椎微下一分五椎微上二分點墨記之即以墨平畫相去二寸許四肋三間胛骨之裡肋間空處容側指許摩膂肉之表筋骨空處按之患者覺牽引胸戶中手指痹即真穴也灸後覺氣壅盛可灸氣海及足三里瀉火實下灸後令人陽盛當消息以自保養不可縱欲入門又法令病人兩手交在兩膊上則胛骨開其穴立見以手揣摸第四椎骨下兩旁各開三寸四肋三間之中按之酸是穴灸時手搭兩膊上不可放下灸至百壯為佳回春取患門穴法主少年陰陽俱虛面黃體瘦飲食無味咳嗽遺精潮熱盜汗心胸背引痛五勞七傷等證無不效先有蠟繩一條以病人男左女右腳板從足大拇趾頭齊量起向後隨腳板當心貼肉直上至膝腕大橫紋中截斷次令病人解發勻分兩邊平身正立取前繩子從鼻端齊引繩向上循頭縫下腦後貼肉隨脊骨垂下至繩盡處以墨點記此不是灸穴也別用稈心按於口上兩頭至吻卻鉤起稈心中心至鼻端根如人字樣齊兩吻截斷將此稈展直於先點墨處取中橫量勿令高下於稈心兩頭盡處以墨記之此是灸穴初灸七壯纍灸至百壯初只灸此兩穴入門一法治虛勞羸瘦令病人平身正直用草於男左女右自腳中趾尖量過腳心下向上至曲䐐大紋處切斷卻將此草自鼻尖量從頭正中須分開頭心發貼肉量至脊以草盡處用墨點記別用草一條令病人自然合口量闊狹切斷卻將此草於墨點上平折兩頭盡處量穴灸時隨年多灸一壯如年三十灸三十一也纍效資生此法與上法略同類聚取四花穴法治病同患門令病人平身正立稍縮臂膊取蠟繩繞項向前平結喉骨後大杼骨俱墨點記向前雙垂與鳩尾穴齊即切斷卻翻繩向後以繩原點大杼墨放結喉墨上結喉墨放大杼骨上從背脊中雙繩頭貼肉垂下至繩頭盡處以墨點記不是灸穴別取稈心令病人合口無得動喉橫量齊兩吻切斷還於背上墨記處折中橫量兩頭盡處點之此是灸穴又將循脊直量上下點之此是灸穴初灸七壯纍灸百壯逮瘡愈病未愈依前法復灸故云纍灸百壯但當灸脊上兩穴切宜少灸凡一次可灸三五壯多灸則恐人蜷背灸此等穴亦要灸足三里以瀉火氣為妙入門崔知悌四花穴法以稻稈心量口縫切斷以如此長裁紙四方當中剪小孔別用長稻稈踏腳下前取腳大趾為止後取三曲䐐橫紋中為止斷了卻環在結喉下垂向背後肩稈止處即以前小孔紙當中安分為四花蓋灸紙四角也又一法先橫量口吻取長短以所量草就背上三椎骨下直量至草盡處兩頭用筆點了再量中指長短為準卻將量中指草橫直量兩頭用草圈四角其圈者是穴不圈者不是穴可灸七七壯止資生此灸法皆陽虛所宜華他云風虛冷熱唯有虛者不宜灸但方書云虛損勞瘵只宜早灸膏肓四花乃虛損未成之際如瘦弱兼火雖灸亦只宜灸內關三里以散其痰火早年欲作陰火不宜灸入門騎竹馬灸法專主癰疽發背腫毒瘡瘍瘰癧癘風諸風一切無名腫毒灸之疏瀉心火先從男左女右臂腕中橫紋起用薄篾條量至中指齊肉盡處切斷卻令病人脫去上下衣裳以大竹槓一條跨定兩人徐徐扛起足要離地五寸許兩旁更以兩人扶定勿令動搖不穩卻以前量竹篾貼定竹槓豎起從尾骶骨貼脊量至篾盡處以墨點記不是穴也卻比病人同身寸篾二寸平折放前點墨上自中橫量兩旁各開一寸方是灸穴可灸三七壯極效入門別穴不出於銅人而散見諸書故謂之別穴入門神聰四穴在百會左右前後四面各相去各一寸主頭風目眩風癇狂亂針入三分膝眼四穴在膝蓋骨頭下兩旁陷中主膝臏痠痛針入五分留三呼禁不可灸旁廷二穴在腋下四肋間高下正與乳相當乳後二寸陷中俗名注布舉腋取之主卒中惡飛尸遁疰胸脅滿針入五分灸五十壯長杏二穴在脅臍旁相去各五寸一名循元主泄痢不嗜食可灸三十壯下腰一穴在八髎正中央脊骨上名三宗骨主泄痢下膿血灸五十壯腸繞二穴挾玉泉相去二寸主大便閉灸隨年數環岡二穴在小腸俞下二寸橫紋間主大小便不通灸七壯八關八穴在手十指間治大熱眼痛睛欲出針刺出血即愈闌門二穴在玉莖旁二寸治疝氣衝心欲絶針入二寸半灸二七壯獨陰二穴在足第二趾節下橫紋一云在足大趾次趾下中節橫紋當中主心腹痛及疝痛欲死當中灸五壯男左女右極妙胞門子戶各一穴胞門在關元左旁二寸子戶在關元右旁二寸俱主婦人無子各灸五十壯金津玉液二穴在舌下兩旁脈主舌腫喉痹以三稜針出血即愈大骨空二穴在手大指第二節尖上可灸九壯如下法小骨空二穴在手小指二節尖上治眼疾及爛弦風灸九壯以口吹火滅太陽二穴在兩額角眉後紫脈上治頭風及偏頭痛針出血一云即瞳子髎也明堂一穴在鼻直上入髮際一寸主頭風鼻塞多涕針入二分一云即上星穴也眉沖二穴一名小竹當兩眉頭直上入髮際主五癇頭痛鼻塞針入二分不可灸營池二穴在足內踝前後兩邊池中脈一名陰陽穴主赤白帶下針入三分灸三十壯漏陰二穴在足內踝下五分微有動脈主赤白帶下針入一分灸三十壯中魁二穴在手中指第二節尖上主五噎吞酸嘔吐灸五壯以口吹火滅血郤二穴即百蟲窠在膝內廉上膝三寸陷中主腎臟風瘡針入二寸半灸二七壯止腰眼二穴令病人解去上體衣服於腰上兩旁微陷處謂之腰眼穴直身平立用筆點定然後上床合面而臥每灼小艾炷七壯灸之瘵蟲或吐出或瀉下即安此法名遇仙灸治瘵捷法也丹心先一日點定腰眼穴至半夜子時交癸亥日期便灸七壯若灸九壯至十一壯尤妙醫鑑通關二穴在中脘旁各五分主五噎針入八分左捻能進飲食右捻能和脾胃此穴一針有四效凡下針後良久覺脾磨食覺針動為一效次針破病根腹中作聲為二效次覺流入膀胱為三效又次覺氣流行腰後骨空間為四效綱目胛縫二穴在背端骨下直腋縫尖及臂主肩背痛連胛針入三分瀉六吸二白二穴在掌後橫紋上四寸手厥陰脈兩穴相併一穴在兩筋中一穴在大筋外主痔漏下血癢痛針入三分瀉兩吸回氣一穴在背脊穹骨上主五痔便血失屎灸百壯氣端十穴在足十趾端主腳氣日灸三壯神效鶴頂二穴在膝蓋骨尖上主兩足癱瘓無力灸七壯龍玄二穴在列缺上青脈中主下牙痛灸七壯陰獨八穴在足四趾間主婦人月經不調須待經定為度針三分灸三壯通理二穴在足小趾上二寸主婦人崩中及經血過多針入二分灸二七壯氣門二穴在關元旁三寸主婦人崩漏針入五分陰陽二穴在足拇趾下屈里表頭白肉際主婦人赤白帶下灸三七壯精宮二穴在背第十四椎下各開三寸專主夢遺可灸七壯神效直骨二穴在乳下大約離一指頭看其低陷之處與乳直對不偏者是穴也婦人按其乳直向下看乳頭所到之處正穴也主遠年咳嗽炷如小豆大灸三壯男左女右不可差誤其咳即愈如不愈不可治交儀二穴在足內踝上五寸主女子漏下赤白灸三十壯當陽二穴在目瞳子直上入髮際一寸主風眩卒不識人鼻塞針入三分魚腰二穴一名印堂在兩眉中主眼疾針入二分奪命二穴在曲澤上主目昏暈針入三分禁灸以上穴散出諸方諸藥灸法豉餅灸法治疽瘡不起發取豆豉和椒薑鹽蔥搗爛捏作餅子厚薄折三錢以來安瘡頭上灸之若覺大熱即抬起又安其上若餅子干更換新者灸之若膿已成慎不可灸精義硫黃灸法治諸瘡久不差變成瘻取硫黃一塊可瘡口大小安之別取少許硫黃於火上燒用叉尖挑起點硫黃令著三五遍取膿水乾差為度精義隔蒜灸法治癰疽腫毒大痛或不痛麻木先以濕紙覆其上候先干處為瘡以獨頭蒜切片三分厚安瘡頭上艾炷灸之每五炷換蒜片如瘡大有十餘頭作一處生者以蒜搗爛攤患處鋪艾灸之若痛灸至不痛不痛灸至痛此援引郁毒之法的有回生之功若瘡色白不起發不作膿不問日期最宜多灸入門桑枝灸法治發背不起發不腐桑枝燃著吹息火焰以火頭灸患處日三五次每次片時取瘀肉腐動為度若腐肉已去新肉生遲宜灸四圍如陰瘡臁瘡瘰癧流注久不愈者尤宜灸之入門附子灸法治腦瘻諸癰腫堅牢削附子令如棋子厚正著腫上以小唾濕附子艾灸附子令熱徹附子欲干輒更唾濕之常令附子熱徹附子欲干輒更之氣入腫中無不愈資生黃土灸法凡發背率多於背兩胛間初如粟米大或痛或癢人皆慢忽不為治不過十日逐至於死急取淨黃土和水為泥捻作餅子厚二分闊一寸半貼瘡上以大艾炷安餅上灸之一炷一易餅子若粟米大時灸七餅即差如錢許大可日夜不住灸之以差為度資生雞足針法靈樞云病重者雞足取之其法正入一針左右斜入二針如雞之足有三爪也綱目擇針灸吉日法欲行針灸先知行年宜忌及人神所在不與禁忌相應即可矣若遇卒急暴病不可拘於此法通人達士豈拘此哉資生千金云凡癰疽疔腫喉痹客忤尤為急覺病即宜便治又中風卒急之證須速救療此論甚當夫急難之際命在須臾必待吉日後治則已論於鬼録矣此所以不可拘於避忌也惟平居治病於未形選天德月德等日服藥針灸可也資生太乙徙立於中宮朝八風占吉凶帝曰候八正奈何少師曰候此者當以冬至之日太乙立於葉蟄之宮其至也天必應之以風雨所謂風者皆髮屋折樹木揚沙石起毫毛發腠理者也風從太乙所居之方來者為實風主生長萬物其從沖後來者為虛風主殺害傷人故聖人謹候虛風而避之今言風從南方來者夏至為實風太乙所居之方故也冬至為虛風者以其沖太乙者故也余方仿此靈樞其以夜半至者萬民皆臥而不犯也故其歲民少病其以晝至者萬民懈惰而皆中於虛風故多病靈樞風從南方來名曰大弱風其傷人也內舍於心外在於脈其氣主為熱夏至為實風冬至為虛風靈樞風從西南來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱立秋為實風立春為虛風靈樞風從西方來名曰剛風其傷人也內舍於肺外在於皮膚其氣主為燥秋分為實風春分為虛風靈樞風從西北來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死立冬為實風立夏為虛風靈樞風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒冬至為實風夏至為虛風靈樞風從東北來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節立春為實風立秋為虛風靈樞風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身溫春分為實風秋分為虛風靈樞風從東南來名曰弱風其傷人也內舍於胃外在於肌肉其氣主體重立夏為實風立冬為虛風靈樞八正謂八節之正氣也虛邪者謂八節之虛風也以從虛之鄉來襲虛而入為病故謂之八正虛邪也以身之虛逢時之虛兩虛相感其氣至骨入則傷五臟故聖人避風如避矢石焉靈樞太乙神名常以冬至之日居葉蟄之宮四十六日明日居天留之宮四十六日明日居倉門宮四十六日明日居陰洛宮四十五日明日居上天宮四十六日明日居玄委宮四十六日明日居倉果宮四十六日明日居新洛宮四十五日明日復居葉蟄宮數所在日從一處至九日復還於一常如是無已終而復始靈樞始自八節得主之日從其宮至所在之處首一終九日徙一宮至九日復返於一周而復始如是次而行之計每宮各得五日九之則一節之日悉備矣銅人身形應九野帝曰身形應九野奈何岐伯曰請言身形之應九野也左足應立春其日戊寅己丑左脅應春分其日乙卯左肩應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑膈下五臟應中州其大禁大禁太乙所在之日及諸戊己是謂天忌日也靈樞太乙遊八節日數立春節自立春入節日起計至春分通計四十五日而止或除一日則棄之不用以下仿此一日十日十九日二十八日三十七日忌左腳足二日十一日二十日二十九日三十八日忌頭首喉膺三日十二日二十一日三十日三十九日忌腰尻下竅四日十三日二十二日三十一日四十日忌右肩臂五日十四日二十三日三十二日四十一日忌右脅六日十五日二十四日三十三日四十二日忌左肩臂七日十六日二十五日三十四日四十三日忌臟腑膈下八日十七日二十六日三十五日四十四日忌右腳足九日十八日二十七日三十六日四十五日忌右脅春分節自春分入節日始計至立夏通計四十五日一日十日十九日二十八日三十七日忌左脅二日十一日二十日二十九日三十八日忌左肩臂三日十二日二十一日三十日三十九日忌臟腑膈下四日十三日二十二日三十一日四十日忌右腳足五日十四日二十三日三十二日四十一日忌右脅六日十五日二十四日三十三日四十二日忌左腳足七日十六日二十五日三十四日四十三日忌頭首喉膺八日十七日二十六日三十五日四十四日忌腰尻下竅九日十八日二十七日三十六日四十五日忌右肩臂立夏節自立夏入節日始計至夏至通計四十五日一日十日十九日二十八日三十七日忌左肩臂二日十一日二十日二十九日三十八日忌臟腑膈下三日十二日二十一日三十日三十九日忌右腳足四日十三日二十二日三十一日四十日忌右脅五日十四日二十三日三十二日四十一日忌左腳足六日十五日二十四日三十三日四十二日忌頭首喉膺七日十六日二十五日三十四日四十三日忌腰尻下竅八日十七日二十六日三十五日四十四日忌右肩臂九日十八日二十七日三十六日四十五日忌左脅夏至節自夏至入日始計至立秋通計四十五日一日十日十九日二十八日三十七日忌頭首喉膺二日十一日二十日二十九日三十八日忌腰尻下竅三日十二日二十一日三十日三十九日忌右肩臂四日十三日二十二日三十一日四十日忌左脅五日十四日二十三日三十二日四十一日忌左肩臂六日十五日二十四日三十三日四十二日忌臟腑膈下七日十六日二十五日三十四日四十三日忌右腳足八日十七日二十六日三十五日四十四日忌右脅九日十八日二十七日三十六日四十五日忌左腳足立秋節自立秋入節日始計至秋分通計四十五日一日十日十九日二十八日三十七日忌右肩臂二日十一日二十日二十九日三十八日忌左脅三日十二日二十一日三十日三十九日忌