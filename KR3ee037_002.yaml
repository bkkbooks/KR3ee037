body:
  text: 卷二折量法頭有頭部尺寸腹有腹部尺寸橫直尺寸俱不同各有其要惟背部手足部並以同身寸取之頭面部頭者諸陽之會故曰頭無冷痛欲以針治宜刺手足諸陽經不宜頭部者何也針者能於引氣若刺頭部則諸陽之氣並鬱於頭其熱難可止抑或為不省人事者必須引瀉手足諸陽經故曰揚湯止沸莫如抽薪若氣不能引氣者或痰厥頭痛者必灸頭部穴乃能獲痊者何則艾之性熱者灸之則使其熱發散寒者灸之則使其寒溫和入藥則上行艾灸則下行故也手之三陽從手走之頭足之三陽從頭走之足足陽明胃經面絡入上齒挾口下交承漿下頤前至耳前循喉嚨手陽明大腸經入下齒挾口交人中左之右右之左上挾鼻孔上下陽明經皆挾鼻孔也欲瀉諸陽之氣先刺百會次引諸陽熱氣使之下行比之如開硯滴之上孔也若熱極不能下氣者以綢繫頸則頭額太陽及當陽血絡自現即以三稜針貫刺其血絡棄血如糞神效此法與惜血如金之言大不同然奇效良方之法也老人不宜多出血然可以出血者施頭痛及眼疾赤目等症全用瀉去其他諸症宜平補平瀉傷風為熱者乃風為木木生火故也頭目臃腫胸脅支滿肘內血絡及陷谷多出血立差偏頭痛目鑱鑱不可忍風池頭維本神患左治右患右治左皆留針十呼引氣即差神效兩眼外眥上鋭發動脈各灸三壯立效面蒼黑行間中封腎俞肝俞尺澤合谷下三里頭面風癢發作一二日赤腫形如火爛突起如榛子或如潤大因漸廣大氣息奄奄急以三稜針亂刺當處及四畔赤暈不計其數多出惡血片時即蘇色變如常翌日更觀未盡處及新暈針刺隨腫隨針則神效宜臨機應變耳部耳屬腎左主氣右主血耳塞噪者九竅不通又曰心主竅心氣通耳氣通於腎故心病則耳噪而鳴不能聽遠聲耳鳴不能聽遠心俞三十壯耳痛耳鳴以葦筒長五寸切斷一頭插耳孔以泥面密封於筒之口畔而外出筒頭安艾灸七壯左取右右取左又方取蒼朮以四稜鐵銷穿孔如竹筒一如前葦筒法灸三七壯有大效耳聾先刺百會次刺合谷腕骨中渚後溪下三里絶骨崑崙並久留針腎俞二七壯至隨年為壯虛勞羸瘦耳聾腎俞三七壯心俞三十壯目部目屬肝心主血肝藏之目得血而能視掌得血而能握足得血而能步目睛屬五臟精采黑睛屬肝白睛屬肺白黑間屬脾胃瞳子屬腎眼胞屬脾上弦膀胱下弦脾胃內眥屬膀胱及大腸外眥膽與小腸內外眥並屬心經各隨其經治之無不神效迎風冷淚睛明腕骨風池頭維上星迎香風目眶爛太陽當陽尺澤皆針棄血如糞神效目生白翳先看翳膜出處隨經逐日通氣則無不神效又方肝俞七壯第九椎節上七壯合谷外關睛明崑崙並久留針大牢骨九壯吹火滅手大指內側橫紋頭各三壯手小指本節尖各三壯耳尖七壯不宜多灸目睛痛無淚中脘內庭皆久留針即瀉神效眼眶上下有青黑色尺澤針三分神效瞳子突出湧泉然谷太陽太衝合谷百會上髎次髎中髎下髎肝俞腎俞大人小兒雀目肝俞七壯手大指甲後第一節橫紋頭赤白肉際各灸一壯口部口屬脾鼻屬肺上齒上齶齦及唇屬胃下齒下齦及唇屬大腸督脈任脈主中行各隨其經治之萬無一失胃熱則主口臭肺熱喉辛脾熱口甜膽熱口苦嘔苦心熱口苦肝熱口酸腎熱口咸胃熱口淡口中生瘡承漿勞宮唇腫內關神門合谷下三里內庭三陰交口中如膠太溪口中出血不止上星五十壯風府針三分口鼻並出血亦灸上星唇吻不收合谷下三里口苦下三里絶骨然谷神門重舌舌裂舌強舌者心之竅也神門隱白三陰交口噤牙車不開上關頰車阿是鼻部鼻屬肺主聲音五臭心焦肝燥脾香肺腥腎腐鼻中瘜肉上星百壯迎香合谷神門肺俞心俞尺澤囟會鼻塞百會上星囟會臨泣合谷厲兌並皆灸之鼽衄水出曰鼽血出曰衄風府迎香上星二七壯太衝絶骨合谷大陵尺澤神門鼻不聞香臭囟會天柱水溝並灸衄血不止喑不能言肝俞合谷間使太溪靈道風府太衝咳嗽凡痰喘因熱而上謂火氣炎上故也咳逆不止自大椎至五椎節上灸隨年壯又方期門三壯立止又方在乳下容一指許正與乳相直肋間陷中灸三壯女人則屈乳頭取之灸男左女右到肌立止失音魚際合谷間使神門然谷肺俞腎俞唾喘上星七壯合谷三壯太淵後溪然谷天突嘔吐不下食中脘然谷針心俞二十壯喘急上星合谷太溪大陵列缺下三里久留針下其氣哮喘天突五壯又以細索套頸量鳩尾骨尖其兩端旋後脊骨上索盡處點記灸七壯或三七壯翻胃酒及粥湯皆吐間使三壯中脘針神效痰喘膏肓俞灸肺俞灸腎俞灸合谷針太淵針天突灸七壯神道三七壯膻中七七壯乾嘔期門三壯肺癰咳嗽上氣天突膻中膏肓俞肺俞皆灸騎竹馬穴七壯諸穴之效無逾於此穴也咳喘飲水太淵神門支溝中渚合谷喘嘔欠伸太淵中脘下三里三陰交併針唾血內損魚際瀉尺澤補間使神門太衝肺俞百壯肝俞百壯脾俞三壯下三里痰涎然谷復溜腎俞並灸喘脹不能行期門五壯中脘下三里並針合谷上星並灸結積留飲膈俞五壯照海三壯中脘針留十呼而出咽喉前頸後咽咽以咽物喉以候氣咽接三脘以通胃故以之咽物喉通五臟以系肺故以之候氣氣喉谷咽是也若腑寒則咽門破而聲嘶噎者皆由於陰陽不恆三焦隔絶津液不利故令人氣隔成噎也足陽明胃經肺經心經小腸經皆絡於喉嚨凡治者各隨其經應手針之萬無一失單蛾天窗穴在頸大筋前曲頰端下陷中以針深刺患邊一二寸許至喉內當處而後即出然使病人吞涎無礙神效雙蛾天窗尺澤神門下三里太溪並針少商及大姆指爪甲後根排刺三針如病急一日再針神效咽喉不腫而熱塞吞飲從鼻還出久不愈然谷合谷並久留針即瀉喉痛胸脅支滿尺澤太溪神門合谷內關中渚絶骨頰頸項屬胃經膽經凡病痛者為實癢者為虛醫者宜臨機應變牙頰痛合谷下三里神門列缺龍玄三壯在手側腕上交叉脈呂細二七壯在足內踝尖項強風門肩井風池崑崙天柱風府絶骨詳其經絡治之兼針阿是穴隨痛隨針之法詳在於手臂痠痛之部能行則無不神效齒部齒者骨之餘骨者腎之精千金云凡人患齒者多由於日食夜飲食所致也上齒痛下三里灸七壯下齒痛合谷灸七壯上下齒痛並灸手表腕上踝骨尖端三壯若不愈更灸七壯左痛灸右右痛灸左神效又方灸痛齒七壯慎勿加灸必患附骨疽又方取片瓦畫人口形又明計病人上下齒之原數以墨筆盡記於畫口內仍察痛齒第幾而當於畫齒上灸三七壯不數日立差神效齒齲痛合谷列缺厲兌中渚神門下三里齒齦腐合谷中脘下三里並針承漿七壯勞宮一壯心胸手三陰經主之資云心邪實則心中暴痛虛則心煩惕然失智心惕惕失智內關百會神門胸腹痛或痰厥胸痛量三椎下近四椎上從脊骨上兩旁各五分灸三七壯至七七壯立差神效卒心胸痛汗出間使神門列缺大敦刺出血胸滿逆氣悶熱心俞二七壯膈俞三壯厥陰俞隨年壯積年胸痛足大趾爪甲之本根爪甲之半當中灸七壯男左女右太衝三壯獨陰五壯章門七壯立愈若或不愈更灸真心痛爪甲俱青只得半日活朝發夕死夕發朝死不可治蓋心者一身君主故也胸痛吐冷酸水太衝三壯內關二壯獨陰五壯足大趾內初節橫紋中三壯尾窮骨灸五十壯心熱不寐解溪瀉湧泉補立愈胸痛如刺手卒青間使內關下三里支溝太溪少衝膈俞七壯冷氣衝心痛內關太衝三壯獨陰五壯臍下六寸兩旁各一寸灸三七壯又以蠟繩量患人口兩角為一寸作三折成三角以一角安臍心兩角在臍下兩旁盡處點記灸二七壯立差驚恐心痛神門少衝然谷陽陵泉內關心恍惚天井心俞百會神道胸腹痛暴泄大都陰陵泉太白中脘針心痛嘔涎有三蟲則多涎上脘七壯心痛面蒼黑欲死尺澤針支溝瀉下三里留針合谷二七壯大陵三壯太衝心悲恐煩熱神門大陵魚際通里太淵公孫肺俞隱白三陰交陰陵泉心風心俞三十壯中脘曲澤並針風眩臨泣陽谷腕骨申脈胸引兩脅痛肝俞內關魚際絶骨胸痛口噤期門三壯大陵神門陰囊下十字紋三壯胸連脅痛期門章門絶骨神門行間湧泉胸中瘀血下三里內關神門太淵胸噎不嗜食間使關衝中脘針期門三壯然谷腹脅直寸用中行寸橫寸用乳間寸方曰腹無熱痛治在足三陰經及五臟俞穴若冷氣留注痛針刺敷缸灸法在腹脅門末胃脘痛肝俞脾俞下三里膈俞太衝獨陰兩乳下各一寸灸三十壯飲食不下腹中雷鳴大便不節小便黃赤中脘針大腸俞膀胱俞魂門在九椎下兩旁各三寸半可灸三壯冷熱不調繞臍攻注疼痛氣海三七壯天樞百壯大腸俞三壯太溪三壯腹脹堅臍小腹亦堅水分中極各百壯三焦俞膈俞各三壯腎俞以年壯太溪太衝三陰交脾俞中脘針腸鳴痛三陰交公孫腹脅及諸處流注刺痛不可忍用體長缸而缸口以手三指容入乃能吸毒也隨其痛每一處以三稜針刺四五穴併入缸口內敷缸灸七壯隨痛隨針亦敷缸灸纍處神效腫脹滿身卒腫面浮洪大內踝下白肉際三壯立效水腫腹脹水分三陰交陰交併百壯並治五臟俞穴中脘針後按其孔勿令出水陰蹻七壯四肢面目浮腫照海人中合谷下三里絶骨曲池中脘針腕骨脾俞胃俞三陰交浮腫及鼓脹脾俞胃俞大腸俞膀胱俞水分中脘針下三里小腸俞三陰交浮腫鼓脹乃脾胃不和水穀妄行皮膚大小便不利之致也方書云針水分水盡則斃然而水脹甚則不能飲食腹如抱鼓氣息奄奄心神悶亂死在頃刻當其時若不救急則終未免死亡愚自臆料以謂等死莫如救急針水分出水三分之二脹下至臍未至臍水急用血竭末或寒水石末塗敷針穴即塞止水未針之前預備急用如無血竭即以槐花炒黃不至過黑作末以熱手滿握敷貼慎勿動手移時成痂乃塞止水且百草霜末敷接亦能止水出水三日觀風稍歇便治上諸穴效且浮腫之人或有外腎及腎囊亦致腫者針刺腎皮囊皮多出黃水則安如或出血則不吉之兆也蓋針外腎出水者乃通利小便之義也吉針手足出水者妄行皮膚之義也凶凡病加與少愈都在慎攝而已脈法止脈雀啄脈蝦遊脈皆危也針中脘穴手法方書云中脘穴針入八分然而凡人之外皮內胞各有淺深銘念操心納針皮膚初似堅固徐徐納針已過皮膚針鋒如陷空中至其內胞忽覺似固病人亦致微動然後停針留十呼徐徐出針凡諸穴之針則或間一日行針而中脘則每間七八日而行針針後雖頻數食之慎勿飽食不爾則有害積聚心之積伏梁肺之積息賁肝之積肥氣脾之積痞氣腎之積奔豚積主臟病聚主腑病積者飲食包結不消聚者痰伏膈上主頭目眩痛多自唾涎或致微熱痰積成塊肺俞百壯期門三壯奔豚氣小腹痛也氣海百壯期門三壯獨陰五壯章門百壯腎俞年壯太衝太溪三陰交甲根各三壯小腹積聚腰脊周痹咳嗽大便難腎俞以年壯肺俞大腸俞肝俞太衝各七壯中泉獨陰曲池腹中積聚氣行上下中極百壯懸樞三壯在第十三椎節下間伏而取之又方痛氣隨往隨針敷缸灸必以三稜針缸灸之法在腹部痞塊專治痞根穴在十二椎下兩旁各三寸半多灸左邊若左右俱有塊並灸左右又方塊頭上一穴針入二寸半灸二七壯塊中一穴針入一二寸灸三七壯塊尾一穴針入三寸半灸七壯臍下結塊如盆關元間使各三十壯太衝太溪三陰交各三壯腎俞以年壯獨陰五壯伏粱及奔豚積聚章門脾俞三焦俞中脘獨陰太衝手臂脾主四末四末即四肢也手足諸瘡腫痛皆屬脾胃凡痛癢瘡瘍皆屬心火也寒多則筋攣骨痛熱多則筋緩骨消治在三陰三陽之脈病在左治右在右治左在裡治表在表治里在上治下在腹治背是謂從陽引陰從陰引陽之法也手臂筋攣痠痛專廢食飲不省人事者醫者以左手大拇指堅按筋結作痛處使不得動移即以針貫刺其筋結處鋒應於傷筋則痠痛不可忍處是天應穴也隨痛隨針神效不然則再針凡針經絡諸穴無逾於此法也針傷筋則即差針不傷筋即蹇即還刺其穴則少歇矣手足指節蹉跌痠痛久不愈屈其傷指限皮骨內縮即以圓利針深刺其約紋虛空而拔諸節傷同肘節痠痛使病人屈肘曲池穴至近橫紋空虛以針深刺穿出肘下外皮慎勿傷筋不至十日自差神效肩痛纍月肩節如膠連接不能舉取肩下腑上兩間空虛針刺針鋒幾至穿出皮外一如治肘之法慎勿犯骨兼刺筋結處神效落傷打撲傷各隨其經針刺又取天應穴針刺後多入艾氣使其瘀血和解兩臂及胸轉筋大陵七壯膻中巨闕尺澤並治手足筋急臂細無力肩髃曲池列缺尺澤支溝中渚肘腕痠痛重內關外關絶骨神門合谷中脘針若筋急刺天應穴無不即效手臂善動曲澤七壯太衝肝俞神門手掌熱內關列缺曲池通里神門後溪臂內廉痛皮癢曲池肺俞脾俞神門針中脘針手五指不能屈伸曲池下三里外關支溝合谷中脘針絶骨中渚又手大指內廉第一節橫紋頭一壯神效腋腫行間神門太淵絶骨膽俞腕骨左手足無力神闕百壯如不愈加灸五百壯兩手大熱如在火中湧泉灸五壯立效腰背腰背痛者腎氣虛弱而當風坐臥觸冷之致也臟病不離其處腑病居處無常膀胱經及肝膽經主之宜用缸灸每處針刺每處缸灸七次神效腰痛不能屈伸腎俞委中尾窮骨上一寸七壯自處左右各一寸七壯又方曲蘇橫紋頭四處各三壯四穴並一時吹火使之一時自滅一處灸不到其疾不愈又方令患人正立以竹柱地而豎量臍記之將其竹著後脊骨於其竹上灸隨年壯後即藏其竹勿令病人得知腰脊疼痛溺濁章門百壯膀胱俞腎俞委中次髎氣海百壯腰痛腹鳴胃俞年壯大腸俞三陰交太溪太衝神闕百壯老人腰痛命門三壯腎俞年壯腰背傴僂肺俞期門各三七壯風池七壯又方脊骨旁左右突起浮高處以針深刺灸五百壯至七八百壯若病歇則不必盡其數矣腰腫痛崑崙委中太衝通里章門腳膝所患皆由於腎氣虛弱而寒冷外束之致也諸節皆屬膽諸骨皆屬腎四末屬脾胃腳痠不能屈伸難久立陰蹻三壯中脘針兩曲蘇橫紋頭五壯兩人分左右同吹滅火一處灸不到則其疾不療也腳足轉筋不忍內筋急內踝尖七壯外筋急外踝尖七壯承山在兌腨腸分肉間陷中二七壯腳足內外踝紅腫日久不膿不差灸騎竹馬穴七壯若不愈更灸和介氏之法神效腳氣中脘針三陰交灸針後勿為飽食經七日更針神效又方腹下股間有結核以針貫刺灸針孔三七壯立效手足筋攣蹇澀以圓利針貫刺其筋四五處後令人強扶病人病處伸者屈之屈者伸之以差為度神效鶴膝風膝如大瓢而膝之上下皆細身熱痛中脘委中風池並針神效足掌疼崑崙針骨髓冷痛大杼絶骨復溜申脈厲兌腎俞腳足寒冷不可忍以熱手久按冷徹於手則是痼冷也腎俞大杼下三里絶骨太衝太溪陰蹻各七壯至三七壯或用灸瓦上安艾尉之肌膚溫而病人自言寒冷不可忍者是氣不通也即針十宣八邪穴立效一身同然膝上腫痛身屈不行陰陵泉七壯至七七壯中脘針無不效諸節痛陰陵泉膽俞風池絶骨便毒太衝太溪照海僕參並針又方當處以墨筆書其病人之父姓名則不數日不膿立差又方以圓針貫刺其核灸三七壯永差四肢不收怠惰嗜臥脾俞三陰交章門照海中脘針解溪四肢轉筋湧泉委中絶骨大杼太衝合谷下三里風部諸風掉眩皆屬肝木正氣引邪為喎僻乃酒色過度飲食失節之致也肥人多濕瘦人多火凡人未中風之前足脛痠疼頑痹良久乃解此將中風之候也急灸三里絶骨左右四穴各三壯用薄荷桃柳葉煎水淋洗使灸瘡發膿若春好秋更灸秋好春更灸灸忌生冷豬雞酒面房勞等物慎觸風又忌發怒若不慎攝則雖鬼莫能救言語蹇澀半身不遂百會耳前髮際肩井風市下三里絶骨曲池列缺合谷委中太衝照海肝俞支溝間使觀症勢加減患左灸右患右灸左口眼喎斜合谷地倉承漿大迎下三里間使灸三七壯又方以葦筒長五寸一頭插於耳孔以泥面密封筒之四畔令不得泄氣其一頭上按艾灸七壯至二七壯一如上法換治偏風口喎間使左取右右取左灸三七壯立差神效灸後令患人吹火則乃知口正此其驗也卒惡風不語肉痹不知人神道在第五椎節下間俯而取之灸三百壯立差遍身癢如蟲行不可忍肘尖七壯曲池神門針合谷三陰交歷節風風池絶骨膽俞中風口噤痰塞如引巨聲氣海關元各三壯又灸哮喘套頸法在咳嗽部角弓反張天突先針膻中太衝肝俞委中崑崙大椎百會中風眼戴上及不能語者灸第二椎並五椎上各七壯同灸炷如半棗核大夫中風有五不治者開口閣眼散手遺尿魚口氣喘喉中雷鳴直視摸衣皆惡症也風者百病之長也至其變化各不同焉或中臟或中腑或痰或氣或怒或喜逐其源而來害中臟者不省人事痰涎上壅喉中雷鳴四肢癱瘓不知疼痛言語蹇澀是也中腑者半身不遂口眼喎斜知疼痛言語不變是也先看形體及臟腑之症候詳察治之肝中無汗惡寒色青名曰怒中心中多汗驚怕色赤名曰思慮中肺中多汗惡風色白名曰氣中腎中多汗身冷色黑名曰氣勞中脾中多汗身熱色黃名曰喜中膽中眼目牽連甜睡不醒色緑名曰驚中胃中飲食不下痰涎上壅色淡黃名曰食後中五臟之病各灸五臟俞穴太息善悲行間丘墟神門下三里日月在期門下五分癲癇癲癇百會神庭各七壯鬼眼三壯陽溪間使三十壯神門心俞百壯肺俞百壯申脈尺澤太衝皆灸曲池七壯又方陰莖頭尿孔上宛宛中三七壯著火哀乞即差不問男女重者七七壯輕者五壯七壯又方足大趾本節內紋及獨陰穴各七壯狂言喜笑陽溪下三里神門陽谷水溝列缺大陵支溝神庭間使百勞鬼邪間使仍針後十三穴一鬼宮人中穴二鬼信手大指甲下入肉三分三鬼壘足大趾爪甲下入肉二分四鬼心太淵穴入半寸若是邪蠱便自言説由來往驗有實求去與之男從左起針女從右起針若數穴不言便通下排穴五申脈火針七鋥二三下六鬼枕大椎上入髮際一寸七鬼床耳前髮際穴八鬼市承漿穴九鬼營勞宮穴十鬼堂上星穴火針七鋥十一鬼莊陰下縫灸三壯十二鬼臣曲池火針十三鬼封舌下一寸縫見鬼陽谷夢厭商丘三陰交善哭百會水溝風癲及發狂欲走稱神自高悲泣呻吟謂邪祟也先針間使後十三穴罵詈不息身稱鬼語心俞百壯鬼眼後溪大陵勞宮湧泉各三壯風府又方灸唇吻頭白肉際一壯又灸唇里中央肉弦上一壯狐魅顛狂鬼眼三七壯神庭百壯羊癇吐舌目瞪聲如羊鳴天井巨闕百會神庭湧泉大椎各灸又九椎節下間三壯手大指爪甲合結四隅各三壯妙牛癇直視腹脹鳩尾大椎各三壯馬癇張口搖頭反張僕參風府臍中各三壯金門百會神庭並灸犬癇勞宮申脈各三壯雞癇善驚反折手掣自搖靈道三壯金門針足臨泣內庭各三壯豬癇如尸厥吐沫崑崙僕參湧泉勞宮水溝各三壯百會率谷腕骨各三壯內踝尖三壯五癇吐沫後溪神門心俞百壯鬼眼四穴各三壯間使狀如鳥鳴心悶不喜問語鳩尾灸目戴上不識囟會行間巨闕皆灸厥逆痰厥頭痛者必灸頭部能安之者乃痰凝經絡氣不流行故也吐痰厥逆從男左女右以繩圍患人肘還至起端處截斷以其繩頭從大椎尖下行脊骨上繩頭盡處五十壯尸厥謂急死也人中針合谷太衝皆灸下三里絶骨神闕百壯若脈微似絶灸間使針復溜久留神效四肢轉筋厥逆內庭列缺竅陰至陰承山三七壯合谷太衝又內筋急灸內踝尖一壯外筋急灸外踝尖上一壯善恐小氣厥逆章門少衝合谷太衝氣海百壯傳尸骨蒸肺俞灸膏肓俞灸四花穴腰眼穴並灸腎厥頭痛筋攣驚恐不嗜臥關元腎俞絶骨內關膽俞並灸急死中惡百會三七壯間使年壯承漿七壯心俞七壯人中五十壯隱白一壯囊下十字紋三壯諸穴中神闕百壯下三里七壯最神溺水死即解死人衣服以其腹伏著於馬鞍之上使其水泄後後艾灸臍中百壯即活神效縊死心下有微溫一日以上者猶可活徐解縊索及衣服安臥溫處厚裹緊填肛門一人緊摩兩肩臂引頭髮勿令縱又一人摩擦胸肩令數屈伸無數又兩人分坐以竹管吹兩鼻中即活中暑幾死急灸兩乳頭各七壯痢疾中氣虛弱三焦不和之致若大便祕結取巴豆肉作餅安臍中灸三壯水痢不止中脘針神效赤白痢臍中百壯神效泄痢小腹痛大腸俞膀胱俞各三壯關元百壯丹田穴一名石門二七壯至百壯止冷痢食不化脾俞年壯天樞五十壯胃俞三壯臍中一名神闕百壯脫肛久不愈臍中年壯百會三七壯膀胱俞三壯溏泄如鴨之泄故曰溏泄中脘針三陰交脾俞各三壯至三七壯痔疾五痔便血失尿尻痛尾窮骨百壯二白三七壯在別穴中秩邊在二十椎下兩旁各三寸半灸三壯腸風下血痔二白三七壯承山在足跟上兌腨腸下分肉間陷中五壯神效又對臍脊骨上灸三七壯又其兩旁各一寸三七壯又十四椎下各開一寸半二七壯年深者最有效痔乳頭灸痔凸肉百壯即平神效療痔昔人所傳曰令患人齊足正立以竹柱地量臍折斷將其竹移後準脊骨以墨點記從點處下量一寸艾灸五十壯每行此法無不效陰疝腎氣虛弱常處冷地兼食冷物是謂如石投水之狀疝氣上衝心腹急痛呼吸不通太衝內太衝各三壯獨陰五壯甲根針一分灸三壯內太衝甲根穴在於別穴中針灸神效奔豚氣繞臍上衝照海太衝各三壯獨陰五壯石門七壯又臍下六寸兩旁各一寸灸三七壯又量口吻如一字作三折如此樣以一角按臍心兩角在臍下兩旁盡處是穴二七壯兩丸蹇縮亦灸左取右右取左氣衝七壯疝氣衝心以面末和水作孔餅按臍上以炒鹽填厚五分灸大炷以微溫為限百壯至五百壯每歲春秋灸畢連九日處密室慎勿出入戒酒色冷物神效陰痿然谷三壯陰谷三陰交各三壯氣衝曲骨各三七壯腎俞年壯膏肓俞百壯曲泉七壯在膝內橫紋頭陰頭痛大敦太衝腎俞陰交陰腫挺出曲骨大敦氣衝獨陰陰蹻崑崙疝氣繞臍沖胸氣海石門太衝獨陰並換治俱痛俱灸天樞百壯在挾臍旁各開二寸㿗疝令患人騎碓軸以陽莖伸置軸上與陽莖頭齊點記灸軸木上隨年壯效淋濁五淋復溜絶骨太衝氣海中極百壯曲骨在橫骨上毛際陷中七壯至七七壯石淋氣衝在挾臍旁二寸直下五寸之下鼠鼷之上一寸動脈宛宛中七壯至三七壯止又方以禾稈量患人口吻如一字樣一端按尾窮骨端向上稈盡脊上點記將其稈中折墨記橫著於脊點左右稈兩端盡處三七壯溺白濁照海期門陰蹻腎俞三陰交皆灸霍亂脾胃及三焦不和上吐下泄胸腹痛悶是關格者不得吐瀉也四關穴主之四關謂合谷太衝是也霍亂悶亂即以柔物回縛男左女右之肩下臂上側臥壓縛臂入睡則即止效又方臍中七壯下火即差又臍上三寸三壯三焦俞合谷太衝並針關衝刺出血立差中脘針亦能治霍亂吐瀉轉筋霍亂手中關衝皆刺出血至陰絶骨太衝霍亂心胸滿痛吐食腸鳴中脘內關關衝出血列缺三陰交暴泄大都崑崙期門陰陵泉中脘針乾嘔間使七壯若不差更灸霍亂遺矢下三里中脘針陰陵泉霍亂頭痛胸痛呼吸喘鳴人迎內關關衝三陰交下三里霍亂已死而有暖氣者承山在腳腨腸中央分肉間去腳跟七寸起死穴灸七壯又方以鹽填臍中灸二七壯仍灸氣海穴百壯大敦穴瘧疾四節不攝榮衛不和之致或先寒後熱者或先熱後寒者或頭痛引飲者或腰背先痛者或腳足先痛者察其病源治之瘧病從頭頂發者當痛日未發前一寸預灸百會大椎尖頭各三壯從手臂發者預灸三間間使各三壯從腰背發者腎俞百壯委中一日一發於午前者邪在陽分也或間日或三日或午後或夜間發者邪入陰分也或間日或日夜亂髮者氣血俱虛也溫瘧中脘針神效痎瘧謂老瘧也作於子午卯酉者少陰瘧也神道七壯絶骨三壯作於辰戌醜未者太陰瘧也後溪膽俞作於寅申巳亥者厥陰瘧也諸瘧先針間使仍針鬼邪十三等穴而雖勿用火鋥只用針刺纍施神效瘧母痰水及瘀血成塊腹脅脹而痛每上下弦日章門針後即灸三七壯虛勞五勞謂五臟之勞七傷謂憂愁思慮悲驚恐心腎受邪五內不足緩急濕痹偏枯不仁四肢拘攣也邪實則痛虛則癢也虛勞羸瘦耳聾尿血小便濁或出精陰中痛足寒如冰崑崙腎俞年壯照海絶骨身有四海氣海血海照海髓海臟氣虛憊真氣不足一切氣病氣海百壯夢與人交泄精三陰交三七壯夢斷百日後更灸五十壯則無復泄精夢遺失精曲泉百壯太衝照海腎俞三陰交關元膏肓俞精宮一名志室在十四椎下橫量左右各三寸半灸七壯患門穴主年少人陰陽俱虛體瘦面黃飲食無味咳嗽遺精潮熱盜汗心胸背引痛五勞七傷等症灸有效取穴之法用蠟繩或禾稈一條以男左女右從足大拇趾頭比齊循足掌當心向後貼肉引繩上至曲䐐大橫紋切斷令病人解發勻分兩邊次將以先量足繩子一頭按鼻尖引繩從頭上正中貼肉至脊繩頭盡處墨記此非灸穴別用稈心一條令患人自然開口橫量齊口吻切斷中折墨記將此稈壓於脊點處橫布左右稈兩端盡處墨記灸隨年壯加灸一壯一云百壯勞瘵腹中有蟲惱人至死相傳於族類而殺害是也勞瘵症灸腰眼穴穴法載別穴中其名遇仙灸人脈微細或時無者以圓利針刺足少陰經復溜穴深刺以候回陽脈生方可出針虛勞百損失精勞症肩井大椎膏肓俞肝俞腎俞脾俞下三里氣海四花穴治勞瘵症第一次二穴先令患人平身正立取一細蠟繩勿令展縮以繩頭於男左女右足大拇趾端比齊循足掌向後至曲䐐大橫紋截斷令患人解發分兩邊要見頭縫至腦後又令患人平身正坐將先比繩子一頭於鼻尖上按定引繩向上循頭縫至腦後貼肉垂下當脊骨至正中繩頭盡處以墨點記之是非灸穴或婦人纏足不明者當於右肩髃穴點定以繩頭按其穴上伸手引繩向下至手中指盡處截斷而用男子之足不明者亦佳卻令患人微合口以短繩一頭先自口左角按定鉤起繩子向上至鼻根斜下至口右角作此樣截斷將此繩展令折中墨記將繩墨點壓於脊骨上先點處而橫布左右取平勿令高下繩兩頭盡處以墨圈記此則灸穴二次二穴令患人平身正坐稍縮肩膊取一蠟繩繞項向前雙垂與鳩尾尖齊鳩尾是心蔽骨也人無心蔽骨者從胸前歧骨下量取一寸是鳩尾穴也即雙截斷將其繩之中心著於喉嚨結骨上引繩兩端向後令於脊骨正中繩頭盡處以墨記之是則非灸穴也卻令患人合口以短蠟繩橫量口兩吻如一字樣截斷中折墨記壓於脊骨上先點處如前橫布繩子兩頭盡處以墨記之此是四花穴之橫二穴也已上第二次點穴通共四穴同時灸各七壯至二七壯至百壯或一百五十壯為妙候灸瘡初發時依後法又灸二穴三次二穴以第二次量口吻一字樣短繩中折之墨記壓於第二次脊點上正中上下直放繩頭上下盡處以墨點記之此四花穴之上下二穴也已上第三次點穴謂之四花穴也灸兩穴各百壯三次共六穴取火日灸之百日內慎飲食房勞安心靜處將息一月後仍覺未差復於初灸穴上再灸食不化飢飽失時脾胃不和之致脾胃實則消穀善飢脾胃虛則癖食不消飲食倍多身漸羸瘦痃癖腹痛脾俞三壯至年壯章門期門太白中脘針腹脹不嗜食食不化中脘針肝俞七壯胃俞年壯脾俞三壯飲食困憊四肢怠惰煩熱嗜臥脾俞然谷腎俞解溪嘔逆不得食心俞百壯只針中脘穴神效食積善渴勞宮中渚支溝中脘惡聞食氣下三里中脘針傷飽瘦黃章門中脘針神效翻胃公孫中脘針黃疸多因脾胃不和通身面目悉黃或大便黑血小便黃食疸者頭眩心煩酒疸者目黃鼻塞心中及足下熱女勞疸者額黑身黃小腹滿急小便難難治也大概諸疸口淡怔忡耳鳴腳軟寒熱小便白濁渴則難治不渴則可治也腎疸風門五壯腎俞年壯少澤一壯三陰交三壯至三十壯合谷三壯黃疸百勞三七壯下三里中脘針神效酒疸身目俱黃心痛面赤斑小便不利公孫膽俞至陽委中腕骨中脘神門小腸俞三十六黃疸方云先灸脾俞心俞各三壯次灸合谷三壯次灸氣海百壯只針中脘穴神效女勞疸公孫關元腎俞然谷至陽在七椎下俯而取之三壯食疸下三里神門間使列缺中脘針瘡腫痛癢瘡瘍皆屬心火主治在各隨其經及心經癰者陽滯於陰為腫有嘴高起皮肉光澤者是疽者陰滯於陽為腫無嘴內暈廣大皮膚起紋不澤者是欲知疽口以濕紙敷貼腫上先干處是疽口也癰疽疔癤之初出看其經絡部分各隨其經行針無旬日如或針旬日則無效矣勿論擇日諸忌逐日針刺或一日再刺以瀉其毒則不至十日自安若針旬日或針五六度而病者為苦半途而廢至於死亡或如不死腐惡內生新肉延於纍月艱苦萬狀連針十餘日之苦與其死亡或至辛苦孰輕孰重悔之無及若病人不欲針治者急灸騎竹馬穴七壯無不神效又方初出三日前用手第四指納口浸津涎洽塗腫上晝夜不輟使不幹不過四五日自安方藥無逾於此也癰疽毒腫初出三日前急灸其腫嘴三七壯自安千方萬藥無逾於此其初發至小如粟故人皆忽待至其發毒必至死域追悔莫及若已過三日即灸騎竹馬穴各七壯無不神效癰疽諸腫或不癢不痛色青黑者內先死終不救其初發急灸騎竹馬穴各七壯髮際腫唇腫面腫最難危症慎勿輕破須各隨其經絡逐日行針以瀉其毒氣效若未能針治敷自腐藥以待膿潰兼用蟾膾五六個連食已潰或未潰皆效背腫亦行逐日針經絡自安然而未能善治竟至熟膿以大針決破裂過赤暈之裔即取大蟾六七個作膾用薑芥汁連食惡肉消盡而新肉已生可以起死回生背腫當處狀如粟米者亂出於腫上自作穿孔以手指揉按則自其各孔膿汁現出按休則其各孔膿汁還入是為熟膿矣以大針裂破赤暈之裔凡大小腫不問日數即灸騎竹馬穴七壯無不效者騎竹馬穴法以直杻先量患人尺澤穴橫紋此起循肉至中指端截斷令患人解衣裙露體騎坐於直竹之上瘦人用細竹肥人用大竹當尾窮骨可堪接坐然後將其先量杻從脊豎立於坐竹之上杻端盡處脊上點記此則非灸穴也更用禾稈量病人男左女右中指中節兩紋為一寸又加一寸合為二寸將其二寸中折墨記著於先點脊上橫布稈兩端盡處是灸穴也各灸七壯止不可多灸以此灸之則無不愈者蓋此二穴心脈所過凡癰疽之疾皆由於心氣留滯故生此毒灸此則心脈流通即時安愈可以起死回生矣諸危惡症目直視摸衣魚口氣喘命難全病人氣實則易治虛則難治凡腫不熱不痛不高低陷破爛肉色紫黑為內發肉先死必死之疾也五逆症察色察眼目白睛黑眼胞約小一逆納藥嘔吐二逆腹痛渴甚三逆肩項不便四逆聲嘶色脫或痢疾五逆無此五逆者順也肺癰胸脅引痛呼吸喘促身熱如火咳嗽唾痰不能飲食晝歇夜劇即灸騎竹馬穴七壯尺澤太淵內關神門並針刺通氣以泄毒氣若不愈更灸騎竹馬穴七壯腫脈宜洪緊數滑欲知膿計自初痛日過四十五十日後察病人眼目白睛無精采亦微蒼黑細如絲赤血絡縱橫亂纏於白睛則已膿矣即以邊刃大針刺破痛邊乳旁腋下向前肋間使之出膿後即插紙捻插與拔逐日行之使不塞孔兼用石衣岩上青白苔是不拘多少濃煎連服限差脈蝦遊脈雀啄脈皆危脈也危病則難治陰腫或臀腫陰腫或臀腫或腳肉色如常而漸至浮大者或有微浮者苦痛於骨肉之間晝歇夜劇不省人事幾至四五十日而成膿然而夏月則易膿冬月則不易膿外見其痛處形如赤絲粗細血絡縱橫亂鋪於其上則是熟膿矣人或未詳其膿先以細針刺試未及膿境而抽針膿汁緣何而出乎自謂不膿抑曰此濕痰凝滯萬方治療終不見效遷延日月漸至回骨而死須針未危之前用手之法以邊刃大針先刺皮膚漸漸深插至其膿境針鋒易入如陷虛空已入膿處然後仍舉針鋒裂破而出使之出膿膿汁既歇即以紙捻插於針孔使不閉孔逐日拔插使出惡汁惡肉自腐新肉自生則紙捻漸至減入自出黃汁然後獲痊矣雖至蘇境慎勿發怒與酒色不然則更作腫痛腫脈宜滑數急緊最危者蝦遊脈雀啄脈二動一止三動一止者不數日死回骨症回骨之後針破無益然與其必死莫若針破冀獲僥幸萬一當與病家商議僉曰諾然後針破出膿而使不快出不然則危矣故徐徐出汁出膿之後未滿十日而死者膿無一毫間隔者也過十日而生者肉有毫髮未膿處也凡小癤腫有嘴鋭者或無嘴者多發於耳下及臂或腳苦痛十餘日或至十五日後成膿然不可以一例論之大概先以手指按探腫暈而當處堅固且有指痕成凹趁不解者是不膿也按指漸至膿處忽覺指陷舉指復起正似執繭成凹舍則復起之狀是乃膿也腸癰小腹連腰痛或蹇一腳身熱如火小便數而欠晝歇夜劇三十餘日後成膿未膿前預灸騎竹馬穴各七壯神效已膿後肘尖百壯膿汁注下一二鉢神效疔腫生面上口角合谷下三里神門疔腫生手上曲池穴三七壯疔腫生背上肩井七壯委中靈道觀病之輕重重者倍數灸之並灸騎竹馬穴七壯縷疔狀如以蒿草裹雞卵個個間結之形長而紅發於肘內而痛日久則成膿膿後則針破出膿未膿前灸騎竹馬穴各七壯即愈手足同治凡人手足及一身之中骨節腫膿針破後膿雖盡出而浮氣未消之前則病人悶其疼痛不忍屈伸以待自差則膿汁與脂膜填滿於骨臼筋膠於骨節伸者終不得屈屈者終不得伸平生永為病廢之人須及於膿汁未盡出而黃汁不止之際即令旁人強扶屈伸頻數限差則免廢諸藥灸癰疽法隔蒜灸法腫毒大痛或不痛麻木先以濕紙覆其腫上先干處乃是腫頭也即用獨頭蒜切作片厚三分許安腫頭上以艾炷灸之每行五炷改蒜片如瘡連十餘頭當一處以蒜爛搗攤於患處鋪艾蒜上灸之初灸痛灸之不痛不痛灸至痛此乃引發郁毒之法且有回生之功也若腫色白而不作膿者不問日期宜多灸之附子灸法腦瘻及諸癰腫堅牢者即削附子厚如棋子正著腫上唾濕附子以艾炷安著附子上灸之令熱徹附子欲干更唾令濕灸常令熱徹附子屢干輒改又令艾氣徹腫則無不愈者黃土灸法腫發背兩胛間初似粟米大或痛或癢人皆慢忽不治則不過十日遂至於死急取淨黃土和水作泥捻作餅子厚二分闊一寸半貼腫上以大艾炷安土餅上灸一炷一易腫如粟米大時灸七餅即差腫或如錢大許大炷日夜不輟以差為度諸瘡胬肉如蛇頭出數寸用硫黃研末於胬肉上薄塗即縮腫堅有根名曰石癰灸當處上百壯如石子碎出龍瘡尺澤五壯湧泉委中並刺出血立愈騎竹馬穴各七壯又煙燻一如治白癩法尉治之治法見於白癩條下手足或一身狀如桃栗不紅而痛三四日間成膿針破出膿汁名走馬疳瘡附骨疽二白穴在間使後一寸灸隨年壯立差風丹及火丹毒以三稜針無間亂刺當處及暈畔多出惡血翌日更看赤氣所在如初亂刺棄血如糞神效諸處痰腫不癢不痛久作成膿針破膿色與血相和或有蒼色則吉也只有白色而不稠正似腐糊者死也遍身疥瘡肺俞神門曲池大陵腋腫馬刀挾纓絶骨神門神效熱風癮疹曲池曲澤合谷列缺肺俞魚際神門內關皮風瘡自少瘙癢不止如粟米者多發於臂及足脛外邊與背部而絶不發胸腹及臂及腳內邊故名曰皮風瘡逢秋氣尤癢成瘡俗名年疥瘡曲池灸二百壯神門合谷三七壯白癩先針周匝當處四畔無間後即用熟艾按作長條繼作環圓數重於爐灰上次用信石作末播其環艾之上放火於艾端又以穿孔大瓢覆其上則煙出瓢孔即以白癩照熏於其煙而初不愈如初針後又照熏如初神效風癩一名大風瘡傷於隆冬心肺受邪鼻塞面熱夜寢自鼻出血眉毛墮落一身瘙癢成瘡以三稜針間一二日亂刺身上肉黑處至肉汗出百日又針至骨如初汗出百日鬚眉還生後即止灸亦隨於肉黑處亦佳調攝則一依針灸法慎勿觸風寒有大效治穴委中尺澤太衝皆刺出血曲池神門中渚合谷內關申脈太淵照海絶骨崑崙心俞肺俞胃俞脾俞癰疽疔癤瘰癧等瘡八穴灸法頭部二穴諸瘡發於頭部用禾稈量自左耳尖起端右旋經右耳尖還至起端處截斷令患人男左女右用針經一夫之法以手四指橫握其稈兩端之末截斷將稈中折中心墨點著於結喉下左右兩旋後會於脊骨上點記是則非灸穴也別用禾稈男左女右量中指中節為一寸又加一寸中折墨記壓於先點脊骨上橫布左右稈兩端盡處是灸穴也瘡出左灸左出右灸右出左右並灸左右手部二穴瘡發於手部用禾稈自肩髃穴至第三指頭爪端截斷以其稈中心當於結喉下至項後稈兩端會於脊骨點記如頭部法背部二穴自大椎上至尾窮骨為背部自天突穴至陰毛際為腹部兩腋亦屬背腹部瘡發於背或腹用禾稈自左乳頭起端周身經右乳還至起端處截斷以稈中心當結喉下稈兩端旋後會於脊骨上點記如頭部法足部二穴瘡發於足部並立兩足亦令相著齊立以杆從足大拇趾頭起端從足際右旋至右足大拇趾端還至左起端處斷之以其稈中心當結喉下旋背雙垂一如頭部法初灸痛灸至不痛不痛則灸至痛或五百壯或七八百壯大炷多灸尤妙癰疽等瘡始發而灸則不潰而自愈已潰而灸則生肌止痛亦無再發矣汞毒瘡用藥天疱瘡離卻年久後汞毒例出於足脛內廉骨上或胸或面形如桃栗如石如骨纍月或纍年而成瘡針刺出膿汁用殺蟲當藥瘰癧聯珠瘡百勞三七壯至百壯肘尖百壯又先問審知初出核以針貫核正中即以石雄黃末和熟艾作炷灸核上針穴三七壯諸核從此亦消矣癭瘤癭瘤之病不可針破針則肆毒肉瘤肉瘤針灸則皆殺人血瘤針則出血不止而死瘰癧繞項起核名蟠蛇癧天井風池肘尖百壯換治下三里百勞神門中渚外關大椎灸延生胸前連腋名瓜藤癧肩井膻中大陵支溝陽陵泉外關左耳根生名惠袋癧翳風後溪肘尖外關右耳根生名蜂窠癧翳風頰車後溪合谷外關又方取繩子繞項雙垂兩端會於鳩尾骨尖截斷繩兩端旋後會於脊骨上繩頭盡處點記又量患人口兩吻如一字樣中折墨記橫著於脊點記左右兩端盡處各灸百壯又方以繩子周回病人項還至起端處截斷將此繩一頭從大椎上垂下脊骨繩頭盡處點記又量患人口吻如一字樣中折墨記橫布脊點上兩端盡處灸百壯大效蠱毒蠱毒巨闕上脘足小趾尖三壯有物因所食下出三蟲痛胸多涎上脘在鳩尾下二寸灸二七壯至百壯未差宜倍灸蟲咬心痛或上或下時作時止善渴嘔吐噁心涎出面色白斑紅唇乍青白乍白赤痛定後能食是也以手緊按堅持勿令得移以針刺蟲久待蟲不動乃出針上半月蟲頭向上下半月蟲頭向下每食前先嚼肉而不吞則蟲頭向上然後用針藥眠睡不得安臥不能睡皆心熱也昏睡困憊腎脾虛熱之致也治心脾腎經穴多睡肝俞七壯肺俞二間少商百會囟會又方解溪湧泉無睡陰交在臍下一寸灸百壯譩嘻在第六椎下兩旁相去各三寸半以手按之則病者言譩嘻二七壯至百壯內傷瘀血胸中瘀血巨闕下三里肺俞膏肓俞內關消渴三焦不和五臟津液焦渴水火不能交濟之致也消渴飲水人中兌端隱白承漿然谷神門內關三焦俞腎虛消渴然谷腎俞腰俞肺俞中膂俞在第二十椎下兩旁各二寸挾脊起肉端灸三壯食渴中脘針三焦俞胃俞太淵列缺針皆瀉汗部表氣虛弱則自汗也寒氣外束則無汗也肺主皮毛表虛則自汗是吐血衄血皆因肺熱心血妄行皮膚須瀉心肺熱氣也轉筋汗不出竅陰太淵孔最三壯陽陵泉膽俞兩臂轉筋穴互相加減用煩心汗不出孔最三壯曲差心俞太淵神門巨闕又手足指間針骨寒熱汗注復溜下三里神門汗出鼻衄承漿合谷崑崙上星神門太衝身熱如火汗不出命門中脘膽俞孔最三壯肺俞太溪合谷支溝盜汗肺俞三壯陰都挾巨闕旁一寸五分直下又二寸灸二壯虛汗合谷瀉復溜下三里並補陰都曲泉並三壯照海魚際咳嗽汗不出魚際竅陰膽俞商陽上星肺俞心俞肝俞曲泉三壯孔最三壯傷寒及瘟疫冬傷於寒春必病瘟太陽經病一日二日發熱惡寒頭痛腰脊強痛尺脈俱浮屬膀胱經陽明經病二日三日身熱目痛鼻乾不得臥尺脈俱長屬胃土少陽經病三日四日胸脅痛而耳聾或口苦舌乾或往來寒熱而嘔尺脈俱弦屬膽木太陰經病四日五日腹滿咽乾手足自濕或自痢而渴或腹痛尺脈俱沉細屬脾土少陰經病五日六日口燥舌乾而惡寒尺脈俱沉屬腎水厥陰經病六日七日煩悶囊縮尺脈俱微緩屬肝木是三陰三陽症也方書云初起只傳足經不傳手經又云五行順傳者生逆傳者亡順金生水水生木木生火火生土土生金逆金剋木木剋土土剋水水剋火火剋金又云一日治風府穴二日治三間穴三日治中渚臨泣四日治少商隱白五日治神門太溪六日治靈道中封間使穴在表主腑陽谷支溝陽溪陽輔在裡主臟商丘復溜經渠靈道間使痓病似中風症中濕症口噤反張又似癇症以傷寒逐日例行針傷寒流注太衝內庭穴針此二穴總治能退寒熱在手太衝內庭手三里並針在足太衝內庭並針在背太衝內庭間使並針在腹太衝內庭下三里並針傷寒犯色發熱飲食咽塞而還出鼻孔然谷針使之飲食即吞神效陰症傷寒彌留不能退熱乃中氣不足之致臍中百壯不愈加灸五十壯或填鹽煉臍傷寒過六日不解者期門關元太衝下三里內庭餘熱未盡曲池合谷太衝下三里內庭傷寒悲恐太衝內庭少衝通里挾脊痛太衝內庭委中崑崙口乾曲澤神門項強目瞑風門委中太衝內庭下三里三陰交熱病煩心足寒多汗先針然谷太溪行間皆補熱病煩心汗不出中衝勞宮少衝關衝大陵陽溪曲澤孔最三壯至五壯即汗又方五日以上汗不出太淵留針一時若未滿五日曲澤穴禁針熱病極熱頭痛引飲三日以柔索纏肩下臂上左右尺澤穴上下青絡血貫刺多出血棄如糞汁神效出血與汗出同故也蝦蟆瘟兵亂之後殺氣彌滿觸犯傷人瘟熱大熾咽腫閉塞口噤不語不食頷下也腫形如蝦蟆之頷氣息奄奄第三日而死故曰蝦蟆瘟其熱傳染或作大頭瘟或無病人傳染者下必氣絶或有作熱仍成大腫而斃者急以三稜針貫刺頭額上當陽血絡及太陽血絡多出惡血繼以綢系其肩下臑上即針刺左右尺澤大小血絡及委中血絡並棄血如糞則不日而飲水神效大頭瘟形如赤絲之氣如虹橫帶於額顙如一字樣仍腫滿面耳目口鼻頓無各體有同肉塊不聲不語氣息奄奄第六七日而死是熱犯心肺也治法如上而並急治未危之前大小便膀胱有寒三焦熱結小便不利關格不通者邪在六腑則陽脈盛邪在五臟則陰脈盛合谷太衝大小便不通膀胱俞三壯丹田二七壯胞門五十壯營沖在足內踝前後陷中三壯經中穴在臍下寸半兩旁各三寸灸百壯大腸俞三壯大小便不利大腸俞營沖三壯小腸俞三壯經中在臍下寸半兩旁各三寸灸百壯中髎小便黃赤不禁腕骨膀胱俞三焦俞承漿小腸俞小便狀如散火關元百壯復溜五壯小便不通臍下冷膀胱俞胞門丹田神闕營沖皆灸小便難灸對臍脊骨上三壯小便色變青取湧泉赤取然谷黃取太溪白取復溜列缺黑取陰谷尻重百會委中尿血胃俞關元曲泉勞宮三焦俞腎俞氣海年壯太衝三壯少府三壯膀胱俞小腸俞腸鳴溏泄腹痛神闕百壯三陰交三壯身部心腎受邪水火不能交濟積聚緩急周痹不仁偏枯四肢拘攣致令無子邪實則痛虛則癢身有四海氣海血海照海髓海謂絶骨穴也臟氣虛憊真氣不足一切氣疾皆灸氣海身體不仁先取京骨後取中封絶骨皆針瀉之痹胸背魚際煩滿商丘反折肝俞癱瘓合谷曲池下三里崑崙太衝周痹膈俞臨泣振寒足臨泣穴如解湧泉脾俞嗜臥太溪照海天井脾俞肝俞三陰交腨痹風市崑崙須宜元穴及諸症穴參考加減嘔吐心腹痛而嘔者寒熱或痰飲客於腸胃也凡嘔吐陰氣上逆而陽不勝故也上吐下閉關格宜瀉四關穴謂合谷太衝是嘔吐中脘內關並針三陰交留針神效乾嘔尺澤章門間使關衝中渚隱白乳下一寸三壯吐血魚際天樞勞宮行間神門大陵尺澤上星七壯加症後録煩心間使神門魚際寒熱心俞絶骨脾俞上氣肺俞天突即灸哮喘套頸法神效氣隔膈俞膻中間使腸鳴曲池大腸俞悶亂虎口三焦俞大陵嗜臥照海不吐心俞嘔噎陰交虛者補氣海穴嘔吐乍寒乍熱心煩中脘商丘大椎中衝膽俞絶骨婦人經水無期而來者血虛有熱也經水將來作痛者血實氣滯也經候過多色瘀黑甚呼吸小氣臍腹極寒汗出如雨任脈虛衰風令客乘胞中不能固之致關元穴百壯月事帶下惡露肝俞氣海年壯中脘曲骨五十壯陰挺出陰蹻曲骨曲泉照海大敦太溪三壯蒼汗陰痛下髎中髎太衝獨陰血塊月事不調關元間使陰蹻天樞皆針石門禁針針之無子灸七壯至百壯惡露成塊石門七壯至百壯血閉無子曲泉癥瘕腸鳴泄痢繞臍絞痛天樞百壯章門大腸俞曲泉曲池對臍脊骨上三七壯灸宜先陽後陰臍下冷疝太衝氣海獨陰陰交在臍下一寸灸百壯赤白帶下曲骨七壯太衝關元復溜三陰交天樞百壯轉胞小便難關元二七壯月經不通合谷陰交血海氣衝崩漏太衝血海陰谷三陰交肝俞支溝漏白帶三陰交曲骨七壯至七七壯血淋丹田七壯至百壯胞衣不下足小趾尖三壯中極肩井淋瀝照海曲泉小腸俞如妊陰谷湧泉催孕下三里至陰合谷三陰交曲骨七壯至七七壯即有子無子胞門子戶曲骨商丘中極灸百壯至三百壯或四度針即有子潰尿曲骨七七壯胞中惡血痛石門二七壯至百壯陰都挾巨闕一寸五分直下二寸三壯禁針針之終身無子四滿在挾臍旁五分直下二寸三壯難産手先出曰橫生足先出曰逆生即用細針刺兒手心或足心一二分三四處即以鹽塗針穴擦磨後輕輕入送則兒縮順生仍以鹽塗母腹上正産又足小趾尖灸三壯即順生墮胎後手足如冰厥冷太衝合谷肩井針五分若針深則悶亂急以針刺三里穴下其氣死胎三陰交合谷崑崙太衝産後諸疾期門五壯子上逼心悶亂補合谷瀉三陰交巨闕針留七呼灸七壯至七七壯欲斷産足外踝上一寸三壯即斷産石門一名丹田針刺乳腫乳癰足臨泣神門太溪下三里內關膈俞騎竹馬穴各七壯奶岩年四十以前猶可治年四十以後則難治是早年寡婦及無産女患此則死産後腹痛氣海百壯因産惡露不止中極陰交百壯石門七壯至百壯無乳汁膻中七壯至七七壯禁針少澤補數落胎每三日內即灸三陰交七壯中極曲骨各五十壯臍中三百壯陰中干痛惡合陰陽曲骨五十壯血漏赤白營沖五十壯尿血膈俞針三分留七呼灸三壯後溪腕骨月事不斷陰蹻三壯陰交百壯小兒小兒初産七日內臍中胞系自枯自落其日即以熟艾形如牛角內空灸臍中七壯其艾炷每火至半即去永無腹痛小兒胎癇奶癇驚癇灸鬼眼四穴各三壯每次四處一時吹火盡燒火丹毒謂遊風入胸腹則死即用利針周匝紅處多出惡血翌日更觀紅赤處如上針刺效脫肛百會七壯臍中年壯或五十壯或百壯雀目手大指甲後第一節內橫紋頭白肉際各一壯肝俞九壯囟門不合灸臍中上下各三壯灸痂未落囟門先合效羸瘦食不化胃俞長谷挾臍旁各二寸灸七壯陰卵偏大入腹太衝獨陰氣衝三陰交關元驚風神道在第五節間灸七壯至百壯即效又危急難救灸兩乳頭三壯男左女右睡驚手掣目不合手大指次指端各三壯間使合谷太衝太淵胎癇鬼眼各三壯間使三十壯百會九壯陰莖頭七壯小便不通百會七壯營沖各三壯丹田三七壯湧泉三壯胞門五十壯又用巴豆肉搗作餅或炒鹽按填臍中灸五十壯口噤然谷驚癇腕骨頂中央旋毛中三壯耳後青絡脈三壯太衝三壯痎瘧神道在五椎節下間一名莊俞灸七壯善驚然谷多哭百會卒疝太衝兩目眥赤合谷崑崙神門風池絶骨兩眼白翳每到春秋遮瞳第九椎節上七壯又取肝俞穴七壯蝕齦臭穢沖人勞宮各一壯臍腫灸對臍脊骨上灸三壯或七壯卒肘皮青黑灸臍四邊各半寸並鳩尾骨下一寸各灸三壯風癇目戴上灸第五椎節上七壯百會七壯崑崙三壯四五歲不言心俞足內踝尖上各灸三壯陰腫崑崙太衝太溪赤白痢疾臍中七壯至百壯三陰交七壯遺尿氣海百壯大敦三壯吐乳中庭在膻中下一寸六分灸五壯斑瘡入眼大杼七壯至三七壯詳看犯處各治其經絡達夜啼呼使其兒父負其兒持刀潛斫鄰家籬帶勿使人知之兒啼即止然後潛還系其砍帶則永勿啼呼浮腫水分三壯三陰交三十壯脾俞三壯久瘧鬼眼三壯內庭七壯吐沫尸厥巨闕七壯中脘五十壯兒生一七日內多啼客風中於臍至心脾合谷太衝神門列缺七壯承漿七壯先驚後啼百會七壯間使齦交角弓反張百會七壯天突七壯五癇食癇先寒熱灑淅乃發者屈指如數物形鳩尾上五分三壯間使神庭三壯三陰交豬癇尸厥吐沫巨闕三壯太淵犬癇勞宮申脈各一壯雞癇善驚反折手掣自搖絶骨申脈內庭百會間使太衝太淵羊癇吐舌目瞪羊鳴大椎三壯解溪又第九椎下間三壯牛癇直視腹脹鳩尾三壯三陰交大椎三壯馬癇張目搖頭反折馬鳴僕參風府三壯神門金門臍中三壯五癇神門間使鬼眼申脈驚瘛瘲癇崑崙前頂長強神門百會三壯神庭七壯本神腹滿不食中脘針絶骨下三里吐血魚際神門勞宮太衝尺澤心俞五十壯急驚風者因風而作或聞禽獸雞犬聲而作口生潮涎一身搐搦身口皆熱發作暴烈過後惺惺如舊慢驚風者作於大病之餘或大吐之餘脾胃極虛身與口鼻氣出皆冷時時瘛瘲昏睡露睛攝口上急驚兩症氣絶者先診太衝脈不絶者可治百會三壯神庭七壯鬼眼三壯肝俞七壯兩乳頭三壯男左女右第二椎並五椎各七壯或臍中百壯神效痘疹個個突起光澤則無患若痘色如血點且凹漸至黑陷則難救怪疾凡一身之病晝輕夜重者難治各隨其經而病勢漸至加重胸亦煩悶痛怪幻不測者乃陰陽失攝陰邪妄動之致也急用神應經治鬼邪法先刺間使後十三穴必須其次第而行針若失次則無效並針上等穴次針原病之所管經要穴病重者針不過十餘度而愈病輕者針不過四五度而效愈且陰下逢穴纍施無效然後行之且夫申脈上星曲池穴宜火針七鋥而或不施火針只以圓利針或三稜針纍施不失其次第則每有神效七鋥謂該若灸七壯之説也火針亦依其法而針刺入肉不出皮外以針縫稍拔還納依其七數是也大人小兒怪疾同治此法行針必以盛年精神有餘者乃能取效矣咀咒之症亦須用鬼邪之法先針間使後十三穴火鋥一依其法行之雜病蠍蜥蛇犬蜈蚣咬傷痛不可忍者各隨其所傷經絡針刺用瀉法使不欲呼吸者使毒氣隨經而直瀉者也犬咬初日七壯翌日加一壯日灸狂犬咬初灸七壯日灸一壯至百壯蛇咬咬處在左針刺右邊相對處出血又刺頭頂上旋毛中神效又勿論輕重即針不咬邊內太衝及陰陵泉穴大效九宮數坤二兌七乾六離九中五坎一巽四震三艮八戴九履一左三右七二四為肩六八為足是九宮數針灸吉日丁卯丁亥庚子甲戌甲申丙午癸丑丙戌壬午壬子壬戌辛卯戊戌戊甲己亥乙巳丁丑丙申針灸忌日每月初六十六十八二十二二十四小盡日及五辰五酉五未又忌弦望晦朔入節前後各一日凶素問云各五日男忌除戊女忌破已每月諸神值日避忌旁通圖太乙遊八節日數方云通人達士不拘此例云云內景篇針灸身形灸臍法有人年老面顏如童子者蓋每歲以鼠糞灸臍中一壯故也資生經本朝韓雍侍郎討大藤峽獲一賊年逾百歲而甚壯健問其由曰少時多病遇一異人教令每歲灸臍中自後康健云悁精針灸法遺精夢泄心俞白環俞膏肓俞腎俞中極關元等穴或針或灸綱目虛勞失精宜取大赫中封綱目遺精五臟虛竭灸曲骨端一穴四七壯穴在前陰橫骨中央曲如月中央是也綱目便濁失精取腎俞夢泄精取三陰交各灸七七壯神效得效氣針灸法一切氣疾取氣海氣逆取尺澤商丘太白三陰交噫氣上逆取太淵神門短氣取大陵尺澤少氣取間使神門大陵少衝足三里下廉行間然谷至陰肝俞氣海神應上氣灸太衝氣結食不消灸太倉冷氣臍下痛灸關元百壯短氣灸大椎隨年壯肺俞百壯神門二七壯又灸五椎下隨年壯得效短氣取天井大椎肺俞肝俞魚際尺澤甲乙氣亂於心取神門大陵氣亂於肺取魚際太溪氣亂於腸胃取太白陷谷足三里氣亂於頭取天柱大杼通谷束骨氣亂於臂脛取二間三間內庭陷谷液門中渚俠溪臨泣靈樞神針灸法癲癇晝發治陽蹻申脈夜發治陰蹻照海各灸二七壯易老又灸百會風池資生癇病取鳩尾後溪湧泉心俞陽交三里太衝間使上脘凡癰病必先下之乃可灸不然則氣不通能殺人針不拘此綱目癲狂取豐隆期門溫溜通谷築賓陽谷後溪陰谷甲乙又灸間使三十壯得效又灸天樞百壯得效健忘取列缺心俞神門中脘三里少海又灸百會綱目失志癡騃取神門中衝鬼眼鳩尾百會後溪大鐘綱目善恐心惕惕取然谷內關陰陵泉俠溪行間綱目心沾沾大動取大陵三里綱目血針灸法衄吐血下血取隱白大陵神門太溪易老衄血灸囟會上星資生衄宜灸大椎啞門即止丹心衄不止以三稜針於氣衝出血立愈東垣衄血取上星風府啞門合谷內庭三里照海綱目吐血灸大陵得效嘔血取上脘大陵郤門神門東垣關脈芤大便出血數斗者以膈俞傷故也宜灸膈俞脈經虛勞吐血灸中脘三百壯又吐血唾血灸肺俞隨年壯又口鼻出血不止名腦衄灸上星五十壯得效下血不止量臍心與脊骨平於脊骨上灸七壯即止資生夢針灸法膽寒不得睡臥取竅陰沉困睡多無名指第三節尖屈指取之灸一壯綱目驚悸不得眠取陰交不得臥取浮郤甲乙聲音針灸法卒然無音取天突靈樞厥氣走喉不能言取照海靈樞喉痹卒喑取豐隆靈樞暴喑氣喘取扶突廉泉靈樞暴失音取神門湧泉綱目暴喑取合谷陽交通谷天鼎期門支溝湧泉甲乙言語針灸法喑不能言取合谷湧泉陽交通谷天鼎期門支溝甲乙足太陰之脈病舌本強不能言又手少陰之別脈名曰通里虛則不能言取此穴靈樞舌緩不能言取啞門舌下腫難言取廉泉資生津液針灸法盜汗不止取陰郤瀉之綱目汗不止取曲差盜汗取陰都五里間使中極氣海虛損盜汗取百勞肝俞甲乙傷寒汗不出取合谷復溜俱瀉之大妙綱目痰飲針灸法諸痰飲病取豐隆中脘胸中痰飲吐逆不食取巨闕足三里綱目溢飲取中脘甲乙三焦停水氣攻不食取維道中封胃俞腎俞東垣痰涎等疾不一而足惟勞瘵有痰為難治最宜早灸膏肓穴壯數既多當有所下嚨嚨然如流水之壯者是痰下也資生胞針灸法月經不調取陰獨中極三陰交腎俞氣海綱目月經斷絶取中極三陰交腎俞合谷四滿三里崩漏不止取血海陰谷三陰交行間太衝中極綱目赤白帶下取中極腎俞氣海三陰交章門行間赤白帶帶脈穴灸之最奇一女患此灸此穴鬼附身云灸著我我即去俄而即差資生崔氏四花穴治帶下如神綱目赤帶取中極氣海委中白帶取曲骨承陰中極綱目經斷久忽大崩下取豐隆石門天樞中脘氣海綱目蟲針灸法骨蒸傳尸勞瘵宜早灸崔氏四花穴詳見針灸晚則無及矣入門瘵蟲居肺間蝕肺系故咯血聲嘶此所謂膏之上肓之下針之不到藥之不及宜早灸膏肓俞肺俞四花穴為佳入門治勞瘵癸亥夜三更六神皆聚之時解去上體衣服於腰上兩旁微陷處謂之腰眼直身平立以筆點定然後上床合面而臥每灼小艾炷灸七壯蟲或上出或瀉下即安名曰遇仙灸得效先一日點定腰眼穴至半夜子時交癸亥日期便灸七壯或九壯或十一壯尤妙其蟲從大便出即焚之醫鑑骨蒸勞熱灸膏肓三里勞瘵骨蒸或板齒乾燥大椎鳩尾各灸二七壯又膏肓肺俞四花大椎等穴若灸之早百發百中傳尸勞瘵湧泉針三分瀉六吸有血可治無血必危豐隆治痰針入一寸瀉十吸丹田治氣喘針入三分補二呼以上入門小便針灸法癃閉取陰蹻即照海穴大敦委陽大鐘行間委中陰陵泉石門甲乙小便淋閉關元八分三陰交三分即透陰谷陰陵泉氣海太溪陰交綱目石淋取關元氣門大敦東垣血淋取氣海關元東垣熱淋陰陵泉關元氣衝東垣小便滑數中極灸腎俞陰陵泉氣海陰谷三陰交綱目遺尿不禁取陰陵泉陽陵泉大敦曲骨東垣莖中痛行間灸三十壯又取中極太溪三陰交復溜資生白濁灸腎俞又取章門曲泉關元三陰交綱目婦人轉脬不得尿取曲骨關元甲乙婦人陰中痛取陰陵泉甲乙大便針灸法大渴飲水多為滑泄水入即泄泄而復飲此無藥當灸大椎三五壯易老泄瀉三五年不愈灸百會五七壯即愈醫鑑久泄痢灸天樞氣海大能止泄丹溪泄痢不止灸神闕七壯一云三七壯關元三十壯得效溏泄灸臍中為第一三陰交次之資生泄痢灸脾俞隨年壯臍中二十壯關元百壯三報二七壯得效飧泄取陰陵泉然谷巨虛上廉太衝綱目泄瀉如水手足冷脈欲絶臍腹痛漸漸短氣灸氣海百壯得效下痢腹痛便膿血取丹田復溜小腸俞天樞腹哀東垣冷痢關元窮谷灸五十壯東垣裡急後重取合谷外關東垣痢不止取合谷三里陰陵泉中脘關元天樞神闕中極綱目諸下痢者皆可灸大都五壯商丘陰陵泉各三壯綱目大便祕澀取照海針入五分補三呼瀉六吸立通支溝針半寸瀉三吸太白瀉之綱目大便不通取二間承山太白大鐘三里湧泉崑崙照海章門氣海綱目大小便不通取大都環岡水道綱目關格吐逆而小便不通先灸氣海天樞各三七壯吐止然後用益元散以利小便正傳婦人産後腹脹大小便不通取氣海足三里關元三陰交陰谷綱目外形篇針灸頭針灸法眩暈取神庭上星囟會前頂後頂腦空風池陽谷大都至陰金門申脈足三里綱目眩暈怕寒春夏常著綿帽暫去即發取百會上星風池豐隆綱目偏正頭痛取絲竹空風池合谷中脘解溪足三里綱目正頭痛取百會上星神庭太陽合谷綱目腎厥頭痛灸關元百壯資生厥逆頭痛齒亦痛灸曲鬢七壯資生痰厥頭痛取豐隆綱目頭風頭痛針百會立愈又灸囟會前頂上星百會丹心腦痛腦旋腦瀉腦熱腦冷皆灸囟會資生眉稜骨痛取攢竹合谷神庭頭維解溪綱目醉後頭痛取印堂攢竹足三里風門膻中綱目一老婦久患頭痛因視其手足有血絡皆紫黑逐用針刺出血如墨汁後刺受病之經得全愈綱目偏頭痛及正頭痛取阿是穴針之即愈