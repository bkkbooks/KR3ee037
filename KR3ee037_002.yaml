足三里穴針入五分痛立止綱目腹針灸法腹痛取內關支溝照海巨闕足三里綱目臍腹痛取陰陵泉太衝足三里支溝中脘關元天樞公孫三陰交陰谷腹中切痛取公孫靈樞臍中痛溏泄灸神闕即效積痛取氣海中脘隱白綱目臍腹痛甚灸獨陰神效得效腰針灸法腰痛灸腎俞三七壯即差綱目腰曲不能伸針委中出血立愈丹心腰背瘡以針決腰膝句畫中青赤絡脈出血便差得效腰痛不得俯仰令患人正立以竹柱地度至臍斷竹乃以度背脊灸竹上頭盡處隨年壯灸訖藏竹勿令人知資生神仙灸法治腰痛灸曲瞅兩紋頭左右腳四處各三壯每灸一腳二火齊下艾炷才燒至肉初覺疼便用二人兩邊齊吹至火滅午時著灸至人定以來臟腑自動一二行或轉動如雷聲其疾立愈此法神效綱目腎虛腰痛取腎俞人中委中肩井綱目挫閃腰痛取尺澤勿灸委中人中陽陵泉束骨崑崙下髎氣海綱目腰痛崑崙委中出血又取腎俞中膂俞腰俞綱目腰強痛命門崑崙志室行間復溜綱目脅針灸法脅痛取懸鐘竅陰外關三里支溝章門中封陽陵泉行間期門陰陵泉綱目脅並胸痛不可忍取期門章門行間丘墟湧泉支溝膽俞綱目胸脅脹痛取公孫三里太衝三陰交綱目腰脅痛取環跳至陰太白陽輔綱目脅肋痛取支溝外關曲池綱目兩脅痛取竅陰大敦行間內經皮灸法癜風及癧瘍風灸左右手中指節宛宛中灸三五壯凡贅疣諸痣皆效入門肉灸法疣目支正灸之即差綱目凡贅疣諸痣當其上灸三五壯即差綱目脈針灸法傷寒六脈俱無取復溜備之大回六脈合谷中極支溝巨闕氣衝灸七壯綱目又氣海多灸之海藏乾嘔不止四肢厥冷脈絶灸間使三十壯此回生起死之法也得效筋針灸法筋攣骨痛補魂門綱目膝曲筋急不能舒取曲泉綱目筋急不能行內踝筋急灸內踝四十壯外踝筋急灸外踝三十壯立愈千金膝筋攣急不開兩膝內外曲交尖各灸二七壯即委陽穴綱目轉筋而痛瀉承山或灸二七壯綱目肝熱主筋痿補行間瀉太衝綱目筋攣陰縮痛灸中封五十壯資生筋會陽陵泉筋病治此難經骨針灸法骨會大杼骨病治此宜灸之難經筋攣骨痛補魂門綱目脊膂強痛針人中綱目手針灸法靈樞曰手陽明之脈病肩前臑痛大指次指痛不用手太陽之脈病肩似拔臑似折手少陽之脈病肩臑肘臂外皆痛小指次指不用手厥陰之脈病手心熱肘臂攣急腋腫手太陰之脈病臑臂內前廉痛厥掌中熱手少陰之脈病臑臂內後廉痛厥掌中熱痛隨其經針灸之肩髃系兩手之安否資生五指拘攣取二間前谷綱目五指皆痛取陽池外關合谷綱目兩手攣急偏枯取大陵綱目肋攣筋急取尺澤綱目肩不可動臂不可舉取肩髃巨骨清冷淵關衝東垣臂膊痛麻痹取肩髃手三里外關肩井曲池手上廉合谷綱目肘痛不可屈伸取天井尺澤綱目肘臂腕痛取前谷液門中渚綱日臂酸攣取肘髎竅陰尺澤前谷後溪綱目腕痛取陽溪曲池腕骨綱目兩胛痛取肩井支溝綱目足針灸法環跳穴系兩足之安否資生腿膝攣痛或枯黑取風市陽陵泉曲泉崑崙綱目髀脛急痛取風市中瀆陽關懸鐘綱目腰腳痛取委中崑崙人中陰市綱目膝痛足蹶取環跳懸鐘居髎委中綱目髀痛脛酸取陽陵泉絶骨中封臨泣足三里陽輔綱目膝內廉痛取膝關太衝中封綱目膝外廉痛取俠溪陽關陽陵泉綱目足腕痛取崑崙太溪申脈丘墟商丘照海太衝解溪綱目足五趾盡痛取湧泉然谷綱目腳氣一病最宜針有熱者不可灸資生腳氣初發先灸風市次伏兔次犢鼻次三里次上廉次下廉次絶骨日日報灸以百壯為率資生濕熱腳氣紅腫生瘡取中封陽輔風市絶骨資生腳氣取足十趾端名曰氣端去趾奇一分每日灸三壯神效資生膝中痛針犢鼻綱目膝腫以火針刺三里其腫如失又取行間資生腳氣速灸風市三里以瀉毒氣資生腳弱瘦削取三里絶骨絶骨治腳疾神效資生前陰針灸法諸疝取關元灸三七壯大敦灸七壯得效大敦主七疝痛綱目諸疝大法取大敦行間太衝中封蠡溝關門關元水道三陰交足三里綱目卒疝睪腫暴痛取蠡溝大敦陰市照海下巨虛小腸俞綱目陰縮痛灸中封資生狐疝取太衝商丘大敦蠡溝綱目婦人疝瘕痛與狐疝同取天井肋尖氣海中極綱目膀胱氣取委中委陽綱目小腸氣灸風市氣海灸獨陰取太衝又灸臍左右各去一寸五分兩穴各七壯立效名曰外陵穴得效諸疝上衝氣欲絶灸獨陰神效得效㿉疝偏墜取大巨地機中極中封交信湧泉綱目又法以稈量患人口兩角為一折斷如此則三折成三角如樣一角當臍心兩角在臍之下兩旁盡處是穴左偏灸右右偏灸左左右灸亦無害灸四十壯神效綱目氣衝專主㿉資生水㿉偏墜取關門三陰交綱目小兒胎疝卵偏墜囊縫後十字紋上灸三壯春灸夏差夏灸冬差綱目舉重物得㿉灸關元兩旁相去各三寸青脈上灸七壯即愈資生木腎大如升不痛取大敦三陰交水腎紅腫痛取然谷闌門綱目腎臟風濕癢臍取血郤三陰交綱目內經刺㿉疝一節即靈樞所謂鈹針取睪囊中水液是也此法令人亦多能之囊大如斗者中藏穢液必有數升信知此法出於古也綱目後陰針灸法痔疾取足太陽即承山穴取督脈即長強穴靈樞五痔便血灸脊中百壯又灸回氣百壯得效治痔平立量脊與臍平處椎上灸七壯或年深更於椎骨兩旁各一寸灸七壯除根得效痔痛取承筋飛揚委中承扶攢竹會陰商丘甲乙治諸痔及腸風取脊十四椎下各開一寸灸之久痔尤效入門脫肛取大腸俞百會長強肩井合谷氣衝綱目脫肛灸臍中隨年壯又灸橫骨百壯又灸脊窮骨上七壯得效痔瘡先取頭垢捏成餅子安痔頭上其上又安大蒜片以艾灸之丹心痔漏以附子末津唾和作餅子如錢大安漏上以艾灸令微熱干則易新餅再灸明日又灸直至肉平為效丹心一人行路得痔疾狀如胡瓜貫於腸頭熱如火僵仆不能起有人教之先以槐枝濃煎湯洗患處以艾炷灸其上三五壯忽覺一道熱氣入腸中因瀉鮮血雖一時暫痛其疾如失本草雜病篇針灸風針灸法治中風莫如續命湯之類然此可扶持初病若欲要收全功火艾為良中風皆因脈道不利血氣閉塞也灸則喚醒脈道而血氣得通故可收全功得效中風痰盛聲如曳鋸服藥不下宜灸臍下氣海關元二三百壯亦可轉死回生五臟氣絶危證亦宜灸之綱目凡人非時足脛上及手食指次指忽痠疼麻痹良久方解此將中風之候急灸三里絶骨各三壯春秋報灸常令兩腳有灸瘡為妙資生凡人不信此法不肯灸忽然卒死是謂何病曰風入臟故也風病者不可不知綱目凡覺手足或麻或痛良久乃已此將風中腑之候宜灸百會曲鬢肩髃曲池風市三里絶骨資生凡覺心中憒亂神思不怡或手足麻痹此將風中臟之候宜灸百會風池大椎肩井曲池間使三里資生治風七穴百會耳前髮際肩井風市三里絶骨曲池一方加有風池合谷肩髃環跳凡九穴資生凡中風皆灸之卒中風喎斜涎塞不省宜灸聽會頰車地倉百會肩髃曲池風市三里絶骨耳前髮際大椎風池凡十二穴本事中風目戴上不能視灸第二椎骨第五椎骨上各七壯一齊下火立愈綱目口眼喎斜宜灸聽會頰車地倉又法喎向右者灸左喎陷中喎向左者灸右喎陷中各二七壯立愈綱目半身不遂宜灸百會囟會風池肩髃曲池合谷環跳風市三里絶骨資生口噤宜針入中頰車百會承漿合谷翳風灸亦可綱目失音不語宜針啞門人中天突湧泉神門支溝風府綱目半身不遂環跳為要穴綱目治中風偏枯大接經從陽引陰至陰與湧泉中衝與關衝竅陰與大敦少商與商陽厲兌與隱白少衝與少澤大接經從陰引陽少商與商陽厲兌與隱白少衝與少澤至陰與湧泉中衝與關衝竅陰與大敦凡此十二經井穴也羅謙甫治趙僧判中臟刺十二井穴愈又治張安撫中臟灸十二井穴愈寶鑑骨痹取太溪委中筋痹取太衝陽陵泉脈痹取大陵少海肉痹取太白三里皮痹取太淵合谷綱目痹病宜燔針劫刺以知為數以痛為俞言針後以應效為度數痛處為俞穴非取諸經定穴也靈樞治厲節風亦如上法但於痛處灸三七壯亦佳千金百節痠疼實無所知以三稜針刺絶骨出血立愈東垣寒針灸法傷寒初得一二日頭痛寒熱宜灸巨闕上脘中脘各五十壯得效傷寒大熱不止取曲池瀉絶骨補陷谷出血八關大刺十指間出血易老傷寒頭痛刺合谷攢竹綱目傷寒汗不出取合谷針五分遍身汗出即出針此穴發汗大妙復溜瀉商丘腕骨陽谷俠溪厲兌勞宮風池魚際經渠內庭又十二經滎穴皆可刺綱目傷寒汗多不止取內庭合谷復溜俱瀉綱目傷寒頭痛太陽證刺完骨京骨陽明證刺合谷衝陽少陽證刺陽池丘墟風府風池云岐傷寒結胸先使人心蔽骨下正痛處左畔揉之以毫針刺左畔支溝穴次刺左間使穴名曰雙關刺次刺左行間穴左邊結胸立效右亦依上法刺之慢慢呼吸停針立愈綱目傷寒胸痛取期門大陵綱目傷寒脅痛取支溝陽陵泉綱目傷寒陰證腹痛灸足小趾外側上紋尖各三壯男左女右回春傷寒陰毒危極藥餌無功速灸臍中三百壯又灸氣海關元各二三百壯以手足溫暖為效本事又法陰證已極玉莖縮入速令人捉定急將艾丸緑豆大放在陰莖口上灸三壯其莖即出回春傷寒手足厥冷取大都針入一分傷寒六脈俱無取復溜補之大回六脈合谷中極支溝一寸半此穴和脈絶穴巨闕二寸三分氣衝灸七壯綱目傷寒熱退後再發熱取風門合谷行間絶骨云岐傷寒熱病五十九刺法頭上五行行五者以越諸陽熱逆也謂頭中行上星囟會前頂百會後頂五穴也兩旁謂承光通天烙卻玉枕天柱十穴也又兩旁謂臨泣目窗正營承靈腦空十穴也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨委中髓空此八者以瀉四肢之熱也五臟俞旁五此十者以瀉五臟之熱也膺俞即中府穴背俞即風門穴髃骨即肩髃穴髓空即腰俞穴也內經熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死痙者腰折瘛瘲齒噤齘也靈樞濕針法濕病禁艾灸惟濕痹及濕熱腳氣痿證宜施針以通經絡之氣為佳俗方火針灸法骨蒸勞熱取膏肓三里綱目骨蒸勞熱形氣未脫者灸崔氏四花穴無有不安正傳體熱勞瘦取魄戶綱目兩手大熱為骨厥如在火中可灸湧泉三壯或五壯立安海藏骨蒸熱板齒乾燥取大椎灸之綱目身熱如火足冷如冰灸陽輔易老內傷針灸法胃弱不思飲食取三里三陰交三焦邪熱不嗜食取關元綱目全不思食取然谷出血立飢飢不能食飲食不下取章門期門東垣飲食不多心腹膨脹面色萎黃世謂脾腎病宜灸中脘資生食多身瘦名曰食晦先取脾俞後取章門太倉資生飲食不下膈塞不通邪在胃脘刺法在上脘則抑而下之在下脘則散而去之靈樞胃病飲食不下取三里東垣吐宿汁吞酸取章門神光東垣虛勞針灸法五勞羸瘦取足三里體熱勞嗽瀉魄戶虛勞骨蒸盜汗瀉陰郤綱目真氣不足灸氣海資生虛勞百證宜灸膏肓俞穴患門穴崔氏四花穴此針法詳見針灸門無所不療此等灸法皆陽虛所宜華他云風虛冷熱唯有虛者不宜灸但方書云虛損勞瘵只宜早灸膏肓四穴云乃虛損未成之際如瘦弱兼火雖灸亦只宜灸內關三里以散其痰火早年欲作陰火不宜灸入門大病虛脫本是陰虛用艾灸丹田者所以補陽陽生陰長故也丹心霍亂針法乾霍亂刺委中穴名出血或十指頭諸經方穴出血皆是良法正傳絞腸痧證手足厥冷腹痛不可忍者以手蘸溫水於病者膝脘上拍打有紫黑點處以針刺去惡血即愈驗又法用麻弦小行弓蘸香油或熱水刮手足胸背額項即愈驗乾霍亂者乃寒濕太甚脾被絆而不能動氣被鬱而不能行所以卒痛而手足厥冷俗名絞腸痧者蓋言痛之甚也北方刺青筋以出氣血南方刮胸背手足以行氣血俱能散病然出氣血不如行氣血之為愈也丹心又治絞腸痧刺血法詳見救急門入門灸法霍亂轉筋入腹手足厥冷氣欲絶以鹽填臍中大艾炷灸之不計壯數立效得效霍亂已死而腹中有暖氣者作上法灸之亦蘇醫鑑又法灸氣海二七壯妙得效霍亂吐瀉不止垂死灸天樞氣海中脘立愈正傳霍亂諸法不效灸大椎即效綱目霍亂已死但有暖氣者灸承筋七壯立蘇綱目嘔吐針灸法嘔吐無度並乾嘔不止尺澤大陵皆灸三壯又灸乳下一寸三十壯又灸間使三十壯若四肢厥冷脈沉絶灸間使便通此回生起死之法得效善嘔嘔有苦者邪在膽通在胃取三里陽陵泉內經吐食不化取上脘中脘下脘東垣反胃神效膏肓俞灸百壯膻中三里各灸七壯回春又取勞宮中魁腕骨心俞中脘綱目今日食明日吐取心俞膈俞膻中巨闕中脘綱目五噎五膈取天突膻中心俞上脘中脘下脘脾俞胃俞通關中魁大陵三里綱目反胃灸肩井三壯即愈乃神灸也回春又取水分氣海灸之資生咳嗽針灸法咳嗽有痰宜灸無突肺俞以泄火熱瀉肺氣丹心咳嗽上氣多吐冷痰灸肺俞五十壯又灸乳下黑白肉際各百壯咳嗽聲破喉嘶灸無突五十壯得效久患喘嗽夜不得臥夏月亦衣夾溫背心是膏肓病也灸之而愈資生久嗽宜灸膏肓次灸肺俞資生喘急灸肺俞十一壯天突七壯得效傷寒咳甚灸天突即差資生遠年咳嗽灸直骨穴即愈如不愈其病不可治矣艾炷如小豆大灸三壯男左女右醫鑑哮喘灸肺俞又取天突膻中璇璣俞府乳根氣海資生喘滿痰實如膠取太溪咳喘不得臥取雲門太淵綱目咳嗽寒痰取列缺綱目氣逆發噦取膻中中脘肺俞三里行間綱目厄逆服藥無效灸中脘膻中期門必效綱目厄逆灸關元七壯立愈綱目又法乳下一指許正與乳相直骨間陷中婦人即屈乳頭向下度之乳頭齊處是穴艾炷如小豆大灸三壯男左女右火到肌即差一云其穴當取乳下骨間動脈處是也得效咳逆不止灸乳根二穴即止如神又灸臍下氣海五壯或七壯亦立止正傳肺脹痰嗽不得臥但可一邊眠者可左側者灸右足三陰交可右側者灸左足三陰交立安丹心積聚針灸法奔豚上氣心痛欲絶急以溫湯浸手足數數易之仍灸氣海關元期門章門各百壯中極五十壯得效癥瘕灸足踝後宛宛中灸隨年壯又灸氣海百壯中脘二百壯得效癥瘕積塊先於塊上針之甚者又於塊首一針塊尾一針立應針訖灸之又灸三里綱目積聚取中脘懸樞脾俞商曲補尺澤太溪綱目伏梁取上脘三里息賁取巨闕期門奔豚取玉泉即中極穴章門甲乙積塊取章門中脘氣海天樞上脘通谷綱目專治痞塊取痞根穴穴在十三椎下各開三寸半多灸左邊如左右俱有左右俱灸又法用稈心量患人足大趾齊量至足後跟中住將此稈從尾骨尖量至稈盡處兩旁各開一韭葉許在左灸右在右灸左針三分灸七壯神效又法於足第二趾歧叉處灸五七壯左患灸右右患灸左灸後一晚夕覺腹中響動是驗也入門浮腫針灸法四肢及面皆浮腫灸水分氣海即消水腫惟得針水溝余穴則針之水盡即死庸醫多為人針水分殺人多矣唯灸水分最為要穴蓋此穴能分水不使妄行有人患水腫灸水分與氣海翌日面如削矣資生脹滿針灸法腹中膨脹取內庭水蠱取偏歷鼓脹取臍上下左右各刺二寸二分單鼓脹取水分針入一寸半或灸五十壯脹滿取足三里瀉之凡脹皆取三里是脹之要穴也又取中脘氣海或針或灸綱目痎瘧針灸法瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處審候見之在孫絡盛堅而血者皆取之內經謂用三稜針視孫絡出血也正傳凡瘧必先問其病之所先發者先刺之久瘧不愈大椎先針後灸三七壯或云第三骨節諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之凡瘧取間使為妙瘧脈緩大虛便宜用藥不宜用針綱目瘟疫針法治熱病五十九刺者頭上五行行五者以越諸陽之熱逆也頭中行謂上星囟會前頂百會後項五穴也兩旁謂承光通天絡卻玉枕天柱十穴也又兩旁謂臨泣目窗正營承靈腦空十穴也大杼膺俞即中府穴缺盆背俞即風門穴此八者以瀉胸中之熱也氣街三里巨虛上下廉此八者以瀉胃中之熱也雲門髃骨即肩髃穴委中髓空即腰俞穴此八者以瀉四肢之熱也五臟俞旁五穴此十者以瀉五臟之熱也內經邪祟針灸法百邪所病針有十三穴一名鬼宮即人中穴二名鬼信在手大指爪甲下入肉二分三名鬼壘在足大趾爪甲下入肉二分四名鬼心即太淵穴五名鬼路即申脈穴六名鬼枕在大椎入髮際一寸七名鬼床在耳前髮際宛宛中耳垂下五分八名鬼市即承漿穴九名鬼路即勞宮穴十名鬼堂即上星穴十一名鬼藏在陰下縫女人玉門頭十二名鬼臣即曲池穴十三名鬼封在舌下縫針刺貫出舌上又鬼邪發狂灸十指端去爪一分名曰鬼城扁鵲治鬼魅狐惑恍惚振噤以患人兩手大指相併縛定用大艾炷於兩甲角及甲後肉四處騎縫著火灸之若一處不著火即無效灸七壯病者哀告我自去神效此秦承祖灸鬼法也即鬼哭穴入門五尸灸乳後三寸男左女右各二七壯又灸兩大拇指頭七壯得效一切疰先仰臥灸兩乳邊斜下三寸第三肋間隨年壯得效卒狂言鬼語以帶急合縛兩手大指便灸左右脅下對屈肋頭處各七壯須臾鬼自道姓名乞去徐徐問之乃解其縛得效卒中邪魅恍惚灸鼻下人中及兩手足大指爪甲本令艾炷半在爪上半在肉上各七壯不止十四壯得效卒狂鬼語針足大拇趾爪甲下即止得效狐魅兩手大指合縛灸合谷三七壯當狐鳴即差得效癰疽癰疽針法鈹針者末如劍鋒以取大膿靈樞夫癰氣之息者宜以針開除去之注云息與瘜同死肉也內經癰疽成膿以馬銜鐵作針形如韭葉兩面皆利可以橫直開裂以取膿血精要癰疽如椒眼數十粒或如蜂窠蓮房而膿出痛不除宜以鈹針橫直裂之則毒血挾膿出而愈綱目癰疽作膿若不針烙毒氣無從而解膿瘀無從而泄過時不針烙反攻其內欲望其生豈可得乎癤皮薄唯用針以決其膿血兼可烙也精義凡近筋脈骨節處不得亂行針烙癰疽皮厚口小膿水出不快者宜用針烙精義大抵用針只欲引膿如出針刺無膿是氣伏也不可用針烙精義蜞針法癰癤初發漸大以濕紙一片搭瘡上其一點先干處即是正頂先以水洗去人皮醎取大筆管一個安於正頂上卻用大水蛭一條安其中頻以冷水灌之蛭當吮其正穴膿血皮皺肉白是毒散無不差如毒大蛭小須用三四條方見效若吮著正穴蛭必死用水救活纍試奇效如血不止以藕節上泥塗之得效蜞針一法可施於輕小證候若癰疽大毒積在臟腑徒竭其血於外無益也丹心癰疽灸法凡癰疽之發或因內有積熱或因外寒鬱內熱若於生髮之處艾灸以散其毒治之於早可以移深為淺改重為輕諸項灸法皆好唯騎竹馬灸法方見針灸尤為切要此消患於未形之策丹心癰疽已覺微漫腫硬皮不變色脈沉不痛者當外灸之引邪氣出而方止經云陷下者灸之如外微覺木硬而不痛者當急灸之是邪氣深陷也淺者不可灸如有膿水也不可灸當針之保命癰疽初覺腫痛先以濕紙覆其上視之先干處是頭也大蒜切片安頭上以大艾炷灸之三壯即換一蒜痛者灸之不痛不痛者灸至痛乃止大概以百壯為準最要早覺早灸為上如有頭則不必紙復也三因若十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於餅上灸之三因初發小點一二日即以蒜片貼其中心以小艾炷灸五壯而止直指始發一二日十灸十活三四日六七活五六日三四活綱目灸法所以暢達拔引郁毒此從治之意也譬如盜入人家必開門逐之使出萬一門不開無從而出必傷生乃已綱目頭為諸陽之會若有發宜灸艾炷宜小壯數宜少三五壯而已腹背則多灸為妙精要多灸則內服乳粉托裡散防火氣入心丹心有善治癰疽者皆於瘡上灸至二三百壯無有不愈但艾炷小作之小則人不畏灸灸多則作效必矣資生隔蒜灸法豆鼓餅灸法桑枝灸法附子灸法硫黃灸法土餅灸法並治癰疽惡瘡腫毒詳見針灸艾灸治驗一人發背醫療逾月勢益甚有張生者教以艾火灸其上至一百五十壯知痛乃止明日攝去黑痂膿盡潰肉理皆紅不復痛乃以膏藥貼之日一易易時剪去黑爛月餘乃平復本事灸石癰法堅硬不潰名曰石癰當上灸百壯石子當碎出資生灸發頤法此瘡最險頭面腫大牙齒亦脫解開發尋頂螺中灸二十一壯如不達灸至四十九壯而止直指灸疔疽法大蒜爛搗成膏塗瘡四圍留瘡頂以艾炷灸之以爆為度不爆難愈灸百壯無不愈正傳灸便毒法用細草隨患人左右手量中指自手掌盡處橫紋量起通三節至指盡則住不量爪甲切斷卻將此草於手腕橫紋量起引草向臂當中草盡處即是穴艾炷如麥大二三壯腫散痛止即安得效大風瘡針法歷風者素刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食無食他食靈樞病大風骨節重鬚眉墮名曰大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針內經癩風以三稜針看肉紫黑處及委中穴名紫脈出死血但不可令出太過恐損真氣正傳瘰癧灸法治瘰癧以手抑置肩上微舉肘取之肘骨尖上是穴隨患邊灸七壯或二七壯神效得效又法於掌後手腕盡處橫紋量起向臂中心直上三寸半是穴灸三壯即效丹心針法肩尖肘尖二穴即肩髃肘髎二穴宜灸此穴疏通經絡良方癧核上灸七壯隔蒜片灸之尤妙資生癭瘤灸法治癭灸天突三七壯又灸肩髃男左十八壯右十七壯女右十八壯左十七壯妙得效疳瘻灸法久漏瘡足內踝上一寸灸三壯在上則灸肩井鳩尾東垣冷漏多在腿足之間先雖積熱所注久則為寒宜用附子灸法硫黃灸法二法並見癰疽灸瘡成漏膿水不絶去亦宜灸丹心疥癬針灸法治瘡疥頑癬取絶骨三里間使解溪委中或針或灸綱目手疥取勞宮灸大陵綱目渾身瘡疥取曲池合谷三里絶骨行間委中綱目治癬八月八日日出時令患人正當東向戶長跪舉兩手持戶兩邊取肩頭小垂際骨解宛宛中左右兩穴俱下灸七壯十日愈資生一女子兩股間濕癬下至膝癢痛流黃水百藥不效戴人以針當癢時刺百餘處血出盡煎鹽湯洗之四次方除盡濕淫瘀血不可不針也子和臁瘡針法臁瘡色紫黑先以三稜針刺去惡血冷水洗淨乃貼膏藥忌日光火氣陽氣如有黑腫未盡可再出血以紫黑血盡為度綱目犬傷針灸法狂犬咬人當先針刺去惡血仍灸瘡中十壯自後日灸一壯至百日乃止忌飲酒資生被狂犬咬者無出於灸只就咬牙迹上灸之一日三壯灸至一百二十日乃止常食韭菜永不再發千金常飲韭菜自然汁以滓封灸瘡永不再發資生猘犬傷毒不出發寒熱速以艾灸外丘穴三壯又灸所咬之處七壯立愈銅人諸蟲傷灸法凡蛇蟣蜈蚣毒蟲咬傷於傷處灸五壯或七壯即愈丹心被惡蛇螫即貼蛇皮於螫處艾火灸其上引出毒氣即止本草蠱毒灸法灸蠱毒法於足小趾尖上灸三壯即有物出酒飯得之隨酒飯出肉菜得之隨肉菜出即愈神驗皆於灸瘡上出千金卒死針灸法邪客於手足少陰太陰足陽明之絡此五絡俱竭令人身脈皆動而形無知其狀若尸名曰尸厥先刺隱白後刺湧泉後刺厲兌後刺少商後刺神門內經尸厥當刺期門巨闕中極僕參隱白大敦金門卒厥尸厥百會灸四十九壯氣海丹心灸三百壯覺身體溫暖為止中惡客忤卒死灸臍中百壯中惡取人中中脘氣海卒死灸心下一寸臍上三寸臍下四寸各三壯即差又灸手足兩爪後二七壯諸卒死及魘死急於人中及兩腳大拇趾內離爪一韭菜許各七壯即活綱目卒被鬼擊如中箭用桃皮一片安痛上取一匙頭安桃皮上用艾胡桃大安匙頭灸之即差入門婦人針灸法男子無嗣者以鹽填臍艾灸之連日灸至二三百壯必有效綱目婦人絶嗣灸關元三十壯可報灸之婦人妊子不成數墮胎灸胞門子戶各五十壯胞門在關元左邊二寸子戶在關元右邊二寸子戶一名氣門得效又灸子宮三七壯或針入二寸穴在中極旁左右各開三寸綱目無子取陰交石門關元中極湧泉築賓商丘陰廉甲乙催生難産及下死胎取太衝補合谷補三陰交瀉立時分解子上衝逼心取巨闕令産母正坐使人抱頭抱腰微偃針入六分留七呼得氣即瀉立蘇如子掬母心生下兒手心有針痕子頂母心兒人中有針痕向後則枕骨有針痕是其驗也神驗綱目一婦人産後暴卒其母為灸會陰三陰交各數壯而蘇其母蓋名醫女也資生橫生逆産諸藥不效急於産母右腳小趾尖頭上灸三壯即差亦治胞衣不下醫鑑云即至陰穴得效胞衣不下取三陰交中極照海內關崑崙綱目産後血暈取三里三陰交陰交神門關元綱目産後陰下脫灸臍下橫紋二七壯又取照海良方婦人無子或産後久不再孕取稈心一條長同身寸之四寸令婦人仰身舒手足以所量稈心自臍心直垂下盡頭處以墨點記後以此稈心平折橫安前點處兩頭盡處是穴按之自有動脈應手各灸二七壯神驗即上所云胞門子戶穴也醫鑑小兒針灸法小兒初生臍風撮口諸藥不效然谷針入三分或灸三壯立效三因癲癇驚風神庭灸七壯鼻上入髮際三分宛宛中灸三壯炷如小麥大又取百會瘛脈綱目癲癇瘛瘲兩蹻主之男陰女陰晝發治陽蹻申脈夜發治陰蹻照海各灸二七壯易老急慢驚灸印堂急慢驚風危極不可灸者先當兩乳頭黑肉上男左女右灸二壯次灸髮際眉心百會各一壯手足大指當甲角以物縛兩手足一處以灸騎縫灸男近左邊女近右邊半甲半肉之間灸三壯先腳後手亦可治陰陽諸癇艾炷如小麥大得效慢驚慢脾逆惡證候諸藥不效者如有太衝脈則取百會穴灸之神效直指小兒卒然腹皮青黑而死灸臍上下左右去臍各半寸並鳩尾骨下一寸凡五處各灸五壯仍酒和胡粉塗腹上干則易得效小兒龜背灸肺俞膈俞各主五壯止炷如小麥得效小兒龜胸取兩乳前各一寸五分上兩行三骨罅間凡六處各灸三壯炷如小麥春夏從下灸上秋冬從上灸下若不依次法灸之無效綱目囟門不合臍上臍下各五分二穴各灸三壯灸瘡未發先合綱目小兒癖氣中脘章門各灸七壯綱目灸癖法穴在小兒背脊中自屬骶骨將手揣摸脊骨兩旁有白筋發動處兩穴每一穴用銅錢三文壓上穴上以艾炷安孔中各灸七壯此是癖之根貫血之所也回春小兒瘧久不愈內庭灸一壯大椎百會各灸隨年壯綱目小兒霍亂男左女右第二腳趾上灸三壯即愈得效小兒雀目灸兩手大指甲後一寸內廉橫紋頭白肉際各一壯疳眼灸合谷各一壯綱目小兒脫肛灸尾骶骨尖上一壯又灸臍中三壯百會七壯綱目
